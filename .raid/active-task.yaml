# .raid/active-task.yaml — RAID v1.6 active-task config
#
# Declares which RAID task this branch is executing. All RAID scripts read
# this file (via scripts/raid/task_config.py) instead of hardcoded paths.
#
# Per-branch: each branch with a different RAID task commits its own copy.
# Branch: lore-enrichment/foundation
#
# Schema validated by: python scripts/raid/task_config.py validate

task_id: lore-enrichment
task_slug: 2026-05-30-lore-enrichment

# Task-specific docs (under docs/plans/<task_slug>/)
plan_dir: docs/plans/2026-05-30-lore-enrichment
workflow_doc: docs/plans/2026-05-30-lore-enrichment/RAID_WORKFLOW.md
decomposition_doc: docs/plans/2026-05-30-lore-enrichment/CYCLE_DECOMPOSITION.md
locked_qs_doc: docs/plans/2026-05-30-lore-enrichment/OPEN_QUESTIONS_LOCKED.md
pre_flight_doc: docs/plans/2026-05-30-lore-enrichment/PRE_FLIGHT_CHECKLIST.md

# Cross-task runtime state (under docs/raid/ — same dir for all tasks)
brief_dir: docs/raid/cycle_briefs
cycle_log: docs/raid/CYCLE_LOG.md
audit_log: docs/audit/AUDIT_LOG.jsonl
escalations_log: docs/raid/ESCALATIONS.md
in_progress_dir: docs/raid/IN_PROGRESS
quota_log: docs/raid/QUOTA_LOG.jsonl

# Execution parameters
cycle_count: 16
first_cycle: 0
last_cycle: 15
bootstrap_cycle: 0  # C0 = service skeleton; smoke /health gates C0->C1

# Quota profile (per Q3 — see contracts/raid/quota-profile.yaml)
quota_profile: contracts/raid/quota-profile.yaml
