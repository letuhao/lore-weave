<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>00 Landing — PO_001</title>
<link rel="stylesheet" href="style.css">
</head>
<body data-reality="dongphong">
<div class="app-shell" style="max-width: 480px;">
  <div class="nav-strip">
    <a href="index.html" style="color: var(--ink-muted); text-decoration: none; font-size: 0.875rem;">← Wireframe index</a>
    <div class="lang-switch">
      <a href="#" class="active">VI</a><a href="#">EN</a><a href="#">ZH</a>
    </div>
  </div>

  <main style="flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 2rem 0;">
    <div style="text-align: center; margin-bottom: 3rem;">
      <div style="font-family: 'Source Serif Pro', serif; font-size: 3rem; color: var(--accent); letter-spacing: 0.1em; margin-bottom: 0.5rem;">墨</div>
      <h1 style="font-size: 2.5rem; margin: 0 0 0.5rem 0; color: var(--ink);">LoreWeave</h1>
      <p class="heading" style="font-style: italic; color: var(--ink-muted); margin: 0; font-size: 1.125rem;">Bước Vào Thế Giới</p>
      <p class="subtle" style="margin: 0.25rem 0 0 0;">Enter the World</p>
    </div>

    <form style="display: flex; flex-direction: column; gap: 1rem;" onsubmit="event.preventDefault(); window.location.href='01_reality_select.html';">
      <div>
        <label class="label">Email</label>
        <input class="input" type="email" placeholder="ly.minh@example.com" required>
      </div>
      <div>
        <label class="label">Mật khẩu</label>
        <input class="input" type="password" placeholder="••••••••" required>
      </div>

      <button class="btn-primary" type="submit" style="margin-top: 0.5rem;">Tạo tài khoản</button>
      <button class="btn-secondary" type="button" onclick="window.location.href='01_reality_select.html'">Đăng nhập (returning)</button>
    </form>

    <div class="brush-divider" style="margin: 2rem 0;"></div>

    <div style="text-align: center;">
      <p class="subtle" style="margin: 0 0 0.75rem 0;">V1+ OAuth</p>
      <div style="display: flex; gap: 0.5rem; justify-content: center; opacity: 0.4;">
        <button class="btn-secondary" disabled style="cursor: not-allowed;">Google</button>
        <button class="btn-secondary" disabled style="cursor: not-allowed;">Discord</button>
      </div>
    </div>
  </main>

  <footer style="margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--paper-soft); text-align: center;">
    <p class="subtle" style="margin: 0; font-size: 0.75rem;">
      Đăng nhập tức là chấp nhận <a href="#" style="color: var(--accent);">điều khoản</a> + <a href="#" style="color: var(--accent);">chính sách</a>
    </p>
  </footer>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const reality = params.get('reality');
  if (reality) document.body.dataset.reality = reality;
</script>
</body>
</html>
