name: LoreWeave Module 01

on:
  push:
    paths:
      - "contracts/**"
      - "services/**"
      - "frontend/**"
      - ".github/workflows/loreweave-module01.yml"
  pull_request:
    paths:
      - "contracts/**"
      - "services/**"
      - "frontend/**"
      - ".github/workflows/loreweave-module01.yml"

jobs:
  contract:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npx --yes @stoplight/spectral-cli lint api/identity/v1/openapi.yaml

  auth-service:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test -race ./...
      - run: go build -o /tmp/auth-service ./cmd/auth-service

  gateway:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api-gateway-bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
      - run: npm run build

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci
      - run: npm test
      - run: npm run build
