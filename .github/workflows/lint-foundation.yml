# .github/workflows/lint-foundation.yml — L1.K.16
#
# Wires the 15 foundation lints (L1.K.1–L1.K.15) into PR check.
# Q-L1K-1 LOCKED: mix — semgrep for cross-language patterns, shell+grep for
# simple, go vet for Go-specific. V1 ships all-shell since semgrep adds infra
# overhead; semgrep upgrades land per-lint in a follow-on cycle as patterns
# mature.
#
# Each lint runs in parallel via matrix. Total wall-clock target ≤ 3 min
# (per L1.K acceptance).

name: lint-foundation

on:
  pull_request:
    branches: [main, mmo-rpg/foundation-mega-task]
  push:
    branches: [main]

jobs:
  lint:
    name: ${{ matrix.lint }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        lint:
          - meta-write-discipline-lint
          - pii-classify-lint
          - transitions-validation-lint
          - shard-allocation-validation
          - migration-idempotency-validator
          - observability-inventory-lint
          - capacity-budget-lint
          - dep-pinning-lint
          - timeout-discipline-lint
          - language-rule-lint
          - role-grant-validator
          - outbox-event-emit-lint
          - service-acl-matrix-lint
          - prompt-assembly-discipline-lint
          - meta-sensitive-read-bypass-lint
          - read-audit-query-type-drift-lint
          # W3.3 — lifecycle-bound actor fixtures must use UUIDs (the
          # lifecycle_transition_audit.actor_id column is UUID NOT NULL). The
          # script's default mode runs its --selftest bite THEN the lint.
          - meta-actor-uuid-lint
          # W3.4 follow-up — an own-baseline `wg -emit` drill must apply migration
          # 0013 (the emit path stamps events.content_sha256). Default mode runs
          # its --selftest bite THEN the lint.
          - emit-migration-0013-lint
    steps:
      - uses: actions/checkout@v7
      - name: Run ${{ matrix.lint }}
        run: bash scripts/${{ matrix.lint }}.sh

  # P1 security/quality lints (audit P1) — now BLOCKING. Each carries a baseline/
  # allowlist (seeded from today's known offenders) so it passes on current code and
  # fails only on a NEW violation; the baselines are clean, so these are flipped off
  # `continue-on-error` to give the standards teeth (audit P1: "flip advisory →
  # blocking once the baseline is clean"). These are Python scripts
  # (`python scripts/<name>.py`), so they get their own job rather than the
  # `bash scripts/<name>.sh` matrix above. NOTE: `timeout-discipline-lint` is already
  # a BLOCKING leg in the matrix above (its Python extension WARNs internally — the
  # asyncpg-pool `command_timeout` debt is tracked in SESSION_HANDOFF), so it is
  # intentionally not duplicated here.
  p1-lints:
    name: P1 ${{ matrix.lint }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        lint:
          - pagination-cap-lint
          - blocking-in-async-lint
          - raw-sql-lint
          - injection-coverage-lint
          - language-bias-gate
          - sdk-duplication-gate
          - slo-latency-lint
          # Context Budget Law §13c — the §11a Inspector coverage manifest stays
          # un-gameable: every checklist item must bind to an existing proving test.
          # Static (no suite execution); the referenced tests' green-ness is enforced
          # by the normal vitest/pytest CI jobs, and the §13d refute-pass is the net
          # for a gutted test that a static check can't see.
          - context-inspector-checklist-gate
          # Track A / M9a — the central C-TOOL tier gate. The shared kit's ValidateToolMeta
          # checks a tool's tier is VALID (R|A|W|S) but not that it MATCHES the tool — so a
          # WRITE tool mis-tagged Tier-R (auto-runs, no confirm/Undo) passed every per-service
          # test. This asserts, across ALL services, that every write-verb-named tool carries a
          # non-R tier. Stdlib-only; also wired into the pre-commit hook so it runs on EVERY
          # branch's every commit (the byte-compile-only Python CI job never ran the tier tests).
          - tier-tag-gate
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # slo-latency-lint parses YAML; the others are stdlib-only. Installing here is
      # a fast no-op for the stdlib lints and keeps the single shared step simple.
      - name: Install lint deps
        run: python -m pip install --quiet pyyaml
      - name: Run ${{ matrix.lint }}
        run: python scripts/${{ matrix.lint }}.py
