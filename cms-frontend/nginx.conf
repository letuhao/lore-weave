server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # nginx defaults to 1m; book-service accepts uploads up to 200MB
    # (maxImportSize/maxPdfPeekSize) — without this, any PDF/manuscript
    # import over 1MB 413s here before ever reaching the gateway.
    client_max_body_size 200M;

    # Proxy API calls to the api-gateway-bff
    location /v1/ {
        proxy_pass http://api-gateway-bff:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
