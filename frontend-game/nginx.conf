server {
  listen 5174;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Gzip text-like assets (JS/CSS/JSON/SVG). Phaser bundle (~1.9MB raw)
  # compresses well — saves bandwidth on first load.
  gzip on;
  gzip_vary on;
  gzip_types
    text/css
    text/plain
    application/javascript
    application/json
    application/wasm
    image/svg+xml;
  gzip_min_length 1024;
  gzip_comp_level 6;

  # Vite-generated assets have content hashes in filenames → safe to
  # cache aggressively. The HTML shell index.html must NOT be cached
  # (different rule below) so users always get the latest entry script.
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  # index.html: no cache so devs get fresh entry on each visit
  location = /index.html {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header Pragma "no-cache";
    expires 0;
  }

  # Health probe for docker compose. Returns simple JSON matching the
  # shape of other LoreWeave services (tilemap-service, game-server).
  location = /livez {
    add_header Content-Type application/json;
    return 200 '{"status":"ok","endpoint":"livez","service":"frontend-game"}';
  }

  # SPA fallback: any unmatched route (e.g., /play, /login, /world-select)
  # serves index.html so React Router can resolve the route client-side.
  # Static files (with extensions) bypass this via try_files.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
