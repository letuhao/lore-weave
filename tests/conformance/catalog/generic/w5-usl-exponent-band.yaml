id: w5-usl-exponent-band
description: "G2 / structural perf-shape gate — the complexity-exponent band, the per-op-TIME complement to the USL throughput fit. usl.FitComplexityExponent fits the LOG-LOG SLOPE (power-law exponent p in time≈c·N^p) by OLS over ALL sweep points (NOT a 2-point secant), and WithinBand gates p ≤ 1+ε — catching an O(1)→O(n) regression a higher layer can introduce. Gates the SLOPE, NOT the USL γ (γ models contention saturation, not polynomial blow-up). TestComplexityExponent* is the per-PR non-vacuity proof: a clean sub-linear series (true p≈0.80) is RECOVERED and sits within a 1.20 ceiling, while a realistic super-linear BITE (true p≈1.30, just past the ceiling — not a 2× blow-up) is recovered and EXITS the band, so the band DISCRIMINATES. Also pins the all-points OLS (vs an endpoint secant) and the ≥3-distinct-N guard. The LIVE band over a real rig sweep is DEFERRED pending ε calibration (D-G2-USL-BAND-CALIBRATE) — w5-usl-exponent-band.sh --live NOTRUNs rather than ship a wide vacuous band. Pure Go unit test, no infra."
invariant: I-w5-usl-exponent-band
kind: go-test
command: ["bash", "-c", "go -C tests/perf test ./usl/... -run TestComplexityExponent"]
requires: []
skip_when: []
