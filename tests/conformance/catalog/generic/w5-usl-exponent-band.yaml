id: w5-usl-exponent-band
description: "G2 / structural perf-shape gate — the complexity-exponent band, the per-op-TIME complement to the USL throughput fit. usl.FitComplexityExponent fits the LOG-LOG SLOPE (power-law exponent p in time≈c·N^p) by OLS over ALL sweep points (NOT a 2-point secant), and WithinBand gates p ≤ 1+ε — catching an O(1)→O(n) regression a higher layer can introduce. Gates the SLOPE, NOT the USL γ (γ models contention saturation, not polynomial blow-up). TestComplexityExponent* is the per-PR non-vacuity proof: a clean sub-linear series (true p≈0.80) is RECOVERED and sits within a 1.20 ceiling, while a realistic super-linear BITE (true p≈1.30, just past the ceiling — not a 2× blow-up) is recovered and EXITS the band, so the band DISCRIMINATES. Also pins the all-points OLS (vs an endpoint secant) and the ≥3-distinct-N guard. The LIVE band is now ARMED (D-G2-USL-BAND-CALIBRATE cleared 2026-06-15): a pgbench latency-vs-concurrency sweep measured a healthy baseline exponent ≈0.15 (stdev ≈0.01) → committed ceiling 0.50; w5-usl-exponent-band.sh --live (perf-nightly) asserts the real sweep is sub-linear + a live-pipeline bite (synthetic p≈1.5) exceeds the ceiling. This conformance case runs the per-PR Go unit proof. Pure Go unit test, no infra."
invariant: I-w5-usl-exponent-band
kind: go-test
command: ["bash", "-c", "go -C tests/perf test ./usl/... -run TestComplexityExponent"]
requires: []
skip_when: []
