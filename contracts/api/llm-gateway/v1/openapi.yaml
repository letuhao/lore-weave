openapi: 3.0.3
info:
  title: LoreWeave LLM Gateway API
  version: 1.0.0
  description: |
    Unified LLM contract for the LoreWeave platform. Two flavors:

    1. **`POST /v1/llm/stream`** — interactive streaming chat (P1).
       Server-Sent Events end-to-end. **No wall-clock timeout.**
       Token-level deltas reach the caller as the upstream provider
       emits them.

    2. **`POST /v1/llm/jobs`** — fire-and-forget async LLM job (P2).
       Returns 202 with `job_id` immediately. Job runs to completion
       on the gateway side (with chunking, parallel chunk dispatch,
       and aggregation). Completion is signaled out-of-band via the
       caller-supplied callback (RabbitMQ topic or webhook URL); the
       caller never blocks on HTTP for the result. `GET /v1/llm/jobs/{id}`
       is for status polling; `DELETE /v1/llm/jobs/{id}` cancels.

    Every other LLM call site in the monorepo MUST use one of these
    two endpoints (or their `/internal/llm/*` service-to-service
    counterparts). Direct provider-SDK calls (`litellm`, `openai`,
    `anthropic`) are forbidden by the SDK lint layer.

    See [LLM_PIPELINE_UNIFIED_REFACTOR_PLAN.md](../../../docs/03_planning/LLM_PIPELINE_UNIFIED_REFACTOR_PLAN.md)
    for principles, audit findings, and migration phases.

servers:
  - url: http://localhost:3000
    description: API Gateway (BFF) for browser callers
  - url: http://provider-registry-service:8085
    description: Direct gateway URL for in-cluster service-to-service calls (use /internal/llm/* paths)

tags:
  - name: streaming
    description: Interactive streaming LLM operations (chat, voice). No timeout. SSE.
  - name: jobs
    description: Async LLM jobs with notification on completion.
  - name: jobs-internal
    description: Service-to-service async job submission. X-Internal-Token auth.

paths:
  # ──────────────────────────────────────────────────────────────────────
  # Streaming (P1)
  # ──────────────────────────────────────────────────────────────────────
  /v1/llm/stream:
    post:
      tags: [streaming]
      summary: Open a streaming LLM session (chat or completion)
      description: |
        SSE response. The gateway opens an upstream provider connection
        and re-emits the provider's tokens as canonical SSE events.

        **Important properties:**
        - No wall-clock timeout. The connection lives until the upstream
          completes, the caller disconnects, or the upstream errors.
        - Caller cancellation: closing the HTTP connection propagates
          a cancellation signal to the upstream provider call.
        - The gateway re-frames provider-specific delta formats (OpenAI
          `delta.content`, Anthropic `content_block_delta`, etc.) into
          one canonical SSE envelope (see `StreamFormat`).
      operationId: openLlmStream
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamRequest'
      responses:
        '200':
          description: |
            SSE stream. Content-Type is `text/event-stream`. Events follow
            the canonical envelope (see schema descriptions). Keep-alive
            comments (`: ping`) may appear at any time.

            Event sequence (typical):
              event: token   data: <TokenEvent JSON>
              event: token   data: <TokenEvent JSON>
              ...
              event: usage   data: <UsageEvent JSON>
              event: done    data: <DoneEvent JSON>

            On error, the stream terminates with:
              event: error   data: <ErrorEvent JSON>
          headers:
            X-LLM-Trace-Id:
              schema:
                type: string
              description: End-to-end trace identifier for the streaming session.
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamEventEnvelope'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '402':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  /internal/llm/stream:
    post:
      tags: [streaming]
      summary: Service-to-service streaming (X-Internal-Token auth)
      description: |
        Identical semantics to `/v1/llm/stream` but authenticated with
        `X-Internal-Token` and requiring an explicit `user_id` query
        parameter (the user the call is on behalf of, for billing).
      operationId: openInternalLlmStream
      security:
        - internalServiceToken: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StreamRequest'
      responses:
        '200':
          description: SSE stream (see `/v1/llm/stream` response description)
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/StreamEventEnvelope'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  # ──────────────────────────────────────────────────────────────────────
  # Async jobs (P2)
  # ──────────────────────────────────────────────────────────────────────
  /v1/llm/jobs:
    post:
      tags: [jobs]
      summary: Submit an async LLM job
      description: |
        Returns 202 with `job_id` immediately. The job runs on the gateway
        with optional chunking + parallel dispatch + aggregation.

        Completion is signaled via the caller-supplied callback:
        - **RabbitMQ topic** (`callback.kind = "rabbitmq"`): an event is
          published to `routing_key` on the platform's `loreweave.events`
          topic exchange. Preferred for in-cluster consumers.
        - **Webhook URL** (`callback.kind = "webhook"`): an HTTP POST to
          `url` is made with the completed `Job` body. Webhook payloads
          are signed with HMAC-SHA256 (header `X-LLM-Signature`).

        The caller may also poll `GET /v1/llm/jobs/{id}` if no callback
        is registered (callbacks are optional).
      operationId: submitLlmJob
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitJobRequest'
          multipart/form-data:
            # Phase 5b — bytes-mode STT submission. Audio carried inline
            # via multipart file part; metadata in form fields. Only
            # operation=stt is accepted via multipart. The handler
            # uses mime.ParseMediaType to dispatch (case-insensitive
            # per RFC 2045).
            schema:
              $ref: '#/components/schemas/SubmitSttBytesRequest'
      responses:
        '202':
          description: Job accepted. Result available later via callback or polling.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitJobResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '402':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '413':
          # Phase 5b — multipart audio exceeds 25MB cap.
          $ref: '#/components/responses/ErrorResponse'
        '415':
          # Phase 5b — Content-Type neither application/json nor multipart/form-data.
          $ref: '#/components/responses/ErrorResponse'
        '429':
          $ref: '#/components/responses/ErrorResponse'

  /internal/llm/jobs:
    post:
      tags: [jobs-internal]
      summary: Service-to-service async LLM job submission
      operationId: submitInternalLlmJob
      security:
        - internalServiceToken: []
      parameters:
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitJobRequest'
          multipart/form-data:
            # Phase 5b — bytes-mode STT. Same shape as /v1/llm/jobs;
            # both share doSubmitJob handler.
            schema:
              $ref: '#/components/schemas/SubmitSttBytesRequest'
      responses:
        '202':
          description: Job accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitJobResponse'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '413':
          $ref: '#/components/responses/ErrorResponse'
        '415':
          $ref: '#/components/responses/ErrorResponse'

  /v1/llm/jobs/{job_id}:
    get:
      tags: [jobs]
      summary: Get LLM job status / result
      description: |
        Returns the current state of a job. Until terminal, `result` and
        `error` are null. Once terminal (status ∈ {completed, failed,
        cancelled}), the appropriate field is populated.

        Result payload retention defaults to 7 days post-completion;
        polling after that returns 404.
      operationId: getLlmJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '200':
          description: Job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

    delete:
      tags: [jobs]
      summary: Cancel an in-flight LLM job
      description: |
        Best-effort cancel. The gateway sends cancellation to the upstream
        provider where supported. In-flight chunks may still complete and
        be billed (provider-dependent). Returns 204 if the cancel was
        accepted; the job's final status is reflected in subsequent GETs.
      operationId: cancelLlmJob
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/JobId'
      responses:
        '204':
          description: Cancel accepted
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          description: Job already terminal (completed/failed/cancelled) — no-op
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorBody'

  /internal/llm/jobs/{job_id}:
    get:
      tags: [jobs-internal]
      summary: Service-to-service job status fetch
      operationId: getInternalLlmJob
      security:
        - internalServiceToken: []
      parameters:
        - $ref: '#/components/parameters/JobId'
        - name: user_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Job state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Job'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    internalServiceToken:
      type: apiKey
      in: header
      name: X-Internal-Token

  parameters:
    JobId:
      name: job_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

  schemas:
    # ── Common ────────────────────────────────────────────────────────
    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: |
            Stable error code. Common values:
            `LLM_INVALID_REQUEST`, `LLM_AUTH_FAILED`, `LLM_QUOTA_EXCEEDED`,
            `LLM_MODEL_NOT_FOUND`, `LLM_RATE_LIMITED`, `LLM_UPSTREAM_ERROR`,
            `LLM_DECODE_ERROR`, `LLM_BODY_TOO_LARGE`, `LLM_JOB_NOT_FOUND`,
            `LLM_JOB_TERMINAL`.
        message:
          type: string
        retry_after_s:
          type: number
          description: Present on `LLM_RATE_LIMITED` (and `429` responses).
          nullable: true

    # NOTE: `ProviderKind` is defined in the model-registry contract
    # and resolved server-side from `model_ref`. Callers of this gateway
    # never specify it directly, so it's not a schema in this contract.

    ModelSource:
      type: string
      enum: [user_model, platform_model]

    # ── Streaming (P1) ────────────────────────────────────────────────
    StreamFormat:
      type: string
      enum: [openai, anthropic, vercel-ai-ui-v1]
      default: openai
      description: |
        SSE event envelope shape. The gateway translates provider-native
        deltas into the requested format.

        - `openai`: matches OpenAI's chat completions stream (`data: {...}`).
        - `anthropic`: matches Anthropic's messages stream (`event: message_delta`, etc.).
        - `vercel-ai-ui-v1`: Vercel AI SDK UI message stream envelope. Used
          by the FE chat client today (see `chat-service` legacy path that
          this contract replaces).

    StreamRequest:
      oneOf:
        - $ref: '#/components/schemas/ChatStreamRequest'
        - $ref: '#/components/schemas/TtsStreamRequest'
      description: |
        Phase 5a: streaming-mode request shape depends on the `operation`
        field (default `"chat"`). Existing chat callers MAY omit
        `operation`; the gateway treats absent and `"chat"` identically
        (regression-locked by `TestStreamHandler_OperationDefaultIsChat`).
        Variants:
          - `ChatStreamRequest` — `operation: chat`, requires `messages`.
          - `TtsStreamRequest`  — `operation: tts`, requires `input`.

    ChatStreamRequest:
      type: object
      required: [model_source, model_ref, messages]
      properties:
        operation:
          type: string
          enum: [chat]
          default: chat
          description: |
            Phase 5a addition. May be omitted by existing callers — gateway
            defaults to `"chat"` when absent.
        model_source:
          $ref: '#/components/schemas/ModelSource'
        model_ref:
          type: string
          format: uuid
        messages:
          type: array
          description: OpenAI-shaped chat messages array.
          items:
            type: object
            additionalProperties: true
        tools:
          type: array
          description: Optional. OpenAI-shaped tool definitions.
          items:
            type: object
            additionalProperties: true
        tool_choice:
          description: |
            Optional. OpenAI-shaped tool-choice control — the string
            `"auto"` / `"none"` / `"required"`, or an object
            `{"type":"function","function":{"name":"..."}}` to force a
            specific tool. Honored only by providers that support tools
            (currently the OpenAI-compatible adapters). A request that
            sets `tools` or `tool_choice` for a provider without tool
            support is rejected with HTTP 400
            `LLM_TOOLS_NOT_SUPPORTED_FOR_PROVIDER` before the SSE stream
            opens. Optional — omit the field to leave tool selection to
            the model; callers do not send an explicit `null`.
          oneOf:
            - type: string
            - type: object
              additionalProperties: true
        temperature:
          type: number
          minimum: 0
          maximum: 2
          default: 0.0
        max_tokens:
          type: integer
          minimum: 1
          description: |
            Optional max output tokens. **Note for thinking models** (e.g.
            qwen3.x): this caps `output + reasoning` combined; set high
            (≥16k) when prompting a thinking model with substantial input.
          nullable: true
        stream_format:
          $ref: '#/components/schemas/StreamFormat'
        trace_id:
          type: string
          description: Optional caller-supplied trace identifier.
          nullable: true

    TtsStreamRequest:
      type: object
      required: [operation, model_source, model_ref, input]
      description: |
        Phase 5a. Submit text to be synthesized into streamed audio
        chunks. Response is the canonical SSE envelope, with each chunk
        delivered as an `AudioChunkEvent` followed by a `DoneEvent`.
        TTS is intentionally NOT supported via `/v1/llm/jobs` — submitting
        `operation: tts` to that endpoint returns
        `LLM_OPERATION_NOT_SUPPORTED_VIA_JOBS`.
      properties:
        operation:
          type: string
          enum: [tts]
        model_source:
          $ref: '#/components/schemas/ModelSource'
        model_ref:
          type: string
          format: uuid
        input:
          $ref: '#/components/schemas/TtsInput'
        trace_id:
          type: string
          nullable: true

    TtsInput:
      type: object
      required: [text]
      properties:
        text:
          type: string
          minLength: 1
          maxLength: 4000
          description: Text to synthesize. 4k cap matches OpenAI TTS limit.
        voice:
          type: string
          default: alloy
          description: |
            Upstream voice name (e.g. `alloy`, `echo`, `fable`, `nova`,
            `onyx`, `shimmer` for OpenAI). Pass-through to provider; the
            gateway does NOT validate against an allowlist so new voices
            ship via the provider without a gateway change.
        speed:
          type: number
          minimum: 0.25
          maximum: 4.0
          default: 1.0
        format:
          type: string
          enum: [mp3, wav, opus, pcm]
          default: mp3
          description: |
            Audio container. Streamed as raw bytes inside `AudioChunkEvent.data`
            (base64-encoded). Default `mp3` for compatibility with most
            browsers.

    # Canonical SSE envelope (one schema covers all event types via discriminator)
    StreamEventEnvelope:
      oneOf:
        - $ref: '#/components/schemas/TokenEvent'
        - $ref: '#/components/schemas/ReasoningEvent'
        - $ref: '#/components/schemas/UsageEvent'
        - $ref: '#/components/schemas/DoneEvent'
        - $ref: '#/components/schemas/StreamErrorEvent'
        - $ref: '#/components/schemas/AudioChunkEvent'
        - $ref: '#/components/schemas/ToolCallEvent'
      discriminator:
        propertyName: event
        mapping:
          token: '#/components/schemas/TokenEvent'
          reasoning: '#/components/schemas/ReasoningEvent'
          usage: '#/components/schemas/UsageEvent'
          done: '#/components/schemas/DoneEvent'
          error: '#/components/schemas/StreamErrorEvent'
          audio-chunk: '#/components/schemas/AudioChunkEvent'
          tool_call: '#/components/schemas/ToolCallEvent'
      description: |
        Discriminated union representing one SSE event. The actual wire
        format is `event: <name>\ndata: <JSON>\n\n` per the SSE spec; this
        schema describes the JSON payload after `data:`.

        Phase 5a adds `AudioChunkEvent` for `operation: tts` streams.
        Token/Reasoning/Usage/Done/Error events appear on chat streams;
        AudioChunk + Done appear on TTS streams. Mixing event types
        within a single stream is allowed but never observed today
        (TTS doesn't emit token events; chat doesn't emit audio).

    TokenEvent:
      type: object
      required: [event, delta]
      properties:
        event:
          type: string
          enum: [token]
        delta:
          type: string
          description: Incremental text content from the model.
        index:
          type: integer
          description: Optional zero-based event index for ordering verification.

    ReasoningEvent:
      type: object
      required: [event, delta]
      description: |
        Thinking-model intermediate output (Qwen3.x, DeepSeek-R1, OpenAI
        o-series, etc.). Populated when the upstream provider streams a
        `delta.reasoning_content` field. Consumers typically display this
        in a separate UI surface from token events. Indexes are independent
        of TokenEvent indexes — chat-service uses both streams concurrently.
      properties:
        event:
          type: string
          enum: [reasoning]
        delta:
          type: string
          description: Incremental reasoning content from the model.
        index:
          type: integer
          description: Optional zero-based event index for ordering verification.

    ToolCallEvent:
      type: object
      required: [event]
      description: |
        One incremental fragment of a tool call the model is emitting.
        The gateway re-frames provider tool-call deltas (OpenAI
        `delta.tool_calls[]`, Anthropic `input_json_delta`) into this
        canonical event WITHOUT buffering — consumers reassemble by
        `index`. The provider sends `id` + `name` on the FIRST fragment
        for an index (usually with `arguments_delta == ""`); subsequent
        fragments carry only `arguments_delta`. There is no per-index
        terminal marker — completion is known at the `DoneEvent`.
        `arguments_delta` MAY be omitted on the wire when empty (the
        gateway emits the shared chunk struct with `omitempty`);
        consumers treat an absent `arguments_delta` as `""`.
      properties:
        event:
          type: string
          enum: [tool_call]
        index:
          type: integer
          default: 0
          description: |
            Which tool call within the turn (0-based). A semantic call
            identifier, NOT a monotonic event counter. May be omitted on
            the wire when 0; consumers treat an absent `index` as 0.
        id:
          type: string
          description: Provider tool-call id. Present on the first fragment for this index.
        name:
          type: string
          description: Tool/function name. Present on the first fragment for this index.
        arguments_delta:
          type: string
          default: ""
          description: |
            Incremental fragment of the tool-call arguments JSON. MAY be
            omitted on the wire when empty — notably on the first
            fragment, which carries `id`/`name`. Consumers treat an
            absent value as `""`.

    UsageEvent:
      type: object
      required: [event, input_tokens, output_tokens]
      properties:
        event:
          type: string
          enum: [usage]
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        reasoning_tokens:
          type: integer
          minimum: 0
          description: Populated for thinking models (Qwen3.x, OpenAI o-series, etc.).
          nullable: true

    DoneEvent:
      type: object
      required: [event]
      properties:
        event:
          type: string
          enum: [done]
        finish_reason:
          type: string
          enum: [stop, length, content_filter, tool_calls, error]
          nullable: true

    StreamErrorEvent:
      type: object
      required: [event, code, message]
      properties:
        event:
          type: string
          enum: [error]
        code:
          type: string
        message:
          type: string

    AudioChunkEvent:
      type: object
      required: [event, sequence_id, data, final]
      description: |
        Phase 5a. One frame of streamed TTS audio. Caller concatenates
        `data` (base64-decoded) chunks in `sequence_id` order to
        reconstruct the audio container; `final=true` marks the closing
        frame and is followed by a `DoneEvent`.

        SSE wire format is text-only by spec, hence base64. The +33%
        bandwidth cost is acceptable for TTS payloads (typically
        ≤500KB/sentence).
      properties:
        event:
          type: string
          enum: [audio-chunk]
        sequence_id:
          type: integer
          minimum: 0
          description: Monotonic 0-indexed counter within a single SSE stream.
        data:
          type: string
          format: byte
          description: |
            Base64-encoded raw audio bytes in the format negotiated via
            `TtsInput.format`. Empty string when `final=true`
            (end-of-stream sentinel).
        final:
          type: boolean
          description: True on the closing chunk; followed by a `done` event.

    # ── Async jobs (P2) ───────────────────────────────────────────────
    JobOperation:
      type: string
      enum:
        - chat
        - completion
        - embedding
        - stt
        - tts
        - image_gen
        - video_gen
        - audio_gen
        - entity_extraction
        - relation_extraction
        - event_extraction
        - fact_extraction
        - translation
      description: |
        The semantic operation. The gateway uses this to:
        1. Pick the right adapter method per provider
        2. Pick the right per-operation chunker (e.g. `entity_extraction`
           uses paragraph-based chunking; `translation` uses token-based
           chunking with overlap)
        3. Pick the right aggregator (entity dedup-by-canonical-id;
           translation concat; chat concat; embedding stack)

    ChunkingConfig:
      type: object
      required: [strategy]
      properties:
        strategy:
          type: string
          enum: [tokens, paragraphs, sentences, none]
          default: none
          description: |
            - `tokens`: split by token count using `tiktoken cl100k_base`.
            - `paragraphs`: split on blank-line boundaries.
            - `sentences`: split with langdetect-driven sentence segmenter.
            - `none`: pass the input as-is to a single LLM call.
        size:
          type: integer
          minimum: 1
          description: |
            Target chunk size. Units depend on strategy:
            - `tokens`: token count (default 2000)
            - `paragraphs`: paragraph count (default 8)
            - `sentences`: sentence count (default 30)
        overlap:
          type: integer
          minimum: 0
          description: |
            Optional inter-chunk overlap, same units as `size`. Default 0
            for paragraphs/sentences; default 200 tokens for tokens.

    CallbackConfig:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [rabbitmq, webhook]
        routing_key:
          type: string
          description: |
            Required when `kind = rabbitmq`. Topic-exchange routing key
            published on `loreweave.events`. Convention:
            `user.<user_id>.llm.<operation>.<event>`
            Example: `user.019d5e3c-...-1344e148bf7c.llm.entity_extraction.done`
          nullable: true
        url:
          type: string
          format: uri
          description: |
            Required when `kind = webhook`. Webhook payload is the
            completed `Job` body; signed via `X-LLM-Signature: sha256=<hex>`
            using a shared secret (registered out-of-band per caller).
          nullable: true

    SubmitJobRequest:
      type: object
      required: [operation, model_source, model_ref, input]
      properties:
        operation:
          $ref: '#/components/schemas/JobOperation'
        model_source:
          $ref: '#/components/schemas/ModelSource'
        model_ref:
          type: string
          format: uuid
        input:
          type: object
          additionalProperties: true
          description: |
            Operation-specific payload.

            **Streaming-backed ops** (`chat`, `completion`, `entity_extraction`,
            `relation_extraction`, `event_extraction`, `fact_extraction`)
            ALL share the OpenAI chat-completion wire shape:
              `{ messages: [...], tools: [...], temperature, max_tokens, response_format }`
            The operation enum picks the per-op aggregator (chat = concat,
            entity_extraction = jsonListAggregator over `entities`, etc.) —
            it does NOT change the input schema. Callers that want to send
            extraction prompts route them via the `messages` field; the
            extraction op's name only signals which aggregator to apply
            to the streamed JSON output.

            **Other ops** have op-specific input shapes:
            - `embedding`: `{ texts: ["...", "..."] }`
            - `translation`: `{ text: "...", source_lang: "en", target_lang: "vi", glossary: [...] }`
            - `image_gen`: `{ prompt: "...", size: "1024x1024", n: 1 }`
            - `stt`: see `SttInput` (Phase 5a — `{ audio_url, language }`)
            - `tts`: **NOT supported via jobs** — submit via `POST /v1/llm/stream`
              with `operation: tts` instead. Submitting `tts` here returns
              `LLM_OPERATION_NOT_SUPPORTED_VIA_JOBS` with a hint pointing
              at the streaming endpoint. This is intentional: TTS is a
              UX-critical low-latency case that the SSE path serves
              naturally, and forcing it through buffered job-pattern would
              add unwanted wait time before first audio.
        chunking:
          oneOf:
            - $ref: '#/components/schemas/ChunkingConfig'
          nullable: true
        callback:
          oneOf:
            - $ref: '#/components/schemas/CallbackConfig'
          nullable: true
        trace_id:
          type: string
          nullable: true
        job_meta:
          type: object
          additionalProperties: true
          description: |
            Arbitrary caller metadata echoed back in `Job.job_meta`. Use
            for business-job linkage (e.g. `{ extraction_job_id, chapter_id }`).
          nullable: true

    SubmitJobResponse:
      type: object
      required: [job_id, status, submitted_at]
      properties:
        job_id:
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/JobStatus'
        submitted_at:
          type: string
          format: date-time

    JobStatus:
      type: string
      enum: [pending, running, completed, failed, cancelled]

    JobProgress:
      type: object
      properties:
        chunks_total:
          type: integer
          minimum: 0
          nullable: true
          description: Total chunks for the job. Null when chunking is `none`.
        chunks_done:
          type: integer
          minimum: 0
          nullable: true
        tokens_used:
          type: integer
          minimum: 0
          description: Cumulative tokens consumed across all chunks so far.
        last_progress_at:
          type: string
          format: date-time
          nullable: true

    Job:
      type: object
      required: [job_id, operation, status, submitted_at]
      properties:
        job_id:
          type: string
          format: uuid
        operation:
          $ref: '#/components/schemas/JobOperation'
        status:
          $ref: '#/components/schemas/JobStatus'
        progress:
          oneOf:
            - $ref: '#/components/schemas/JobProgress'
          nullable: true
        result:
          type: object
          additionalProperties: true
          description: |
            Operation-specific result payload, populated when
            `status = completed`. Schemas (informal):
            - `chat`: `{ messages: [{role,content}], usage: {...} }`
            - `embedding`: `{ vectors: [[...], ...], model: "..." }`
            - `entity_extraction`: `{ entities: [{name,kind,aliases,confidence}, ...] }`
            - `relation_extraction`: `{ relations: [{subject,predicate,object,confidence}, ...] }`
            - `event_extraction`: `{ events: [{summary,participants,event_date,...}, ...] }`
            - `translation`: `{ translated_text: "...", source_lang, target_lang, usage }`
            - `image_gen`: `{ images: [{url|b64,...}, ...] }`
            - `stt`: see `SttResult` (Phase 5a — `{ text, language, duration_ms }`)
            - `tts`: never populated here — TTS only streams via
              `/v1/llm/stream` and returns no Job.result.
          nullable: true
        error:
          oneOf:
            - $ref: '#/components/schemas/ErrorBody'
          nullable: true
        submitted_at:
          type: string
          format: date-time
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        trace_id:
          type: string
          nullable: true
        job_meta:
          type: object
          additionalProperties: true
          nullable: true

    # ── Audio operation schemas (Phase 5a) ─────────────────────────────
    SttInput:
      type: object
      required: [audio_url]
      description: |
        Phase 5a. Input payload for `SubmitJobRequest` with
        `operation: stt` on the JSON request body. The gateway fetches
        the audio at `audio_url` (HTTPS GET, 30s timeout, 25MB cap) and
        submits to the upstream STT provider.

        Phase 5b adds an ALTERNATIVE multipart bytes-mode entrypoint —
        see `SubmitSttBytesRequest`. Pick exactly one. The adapter
        enforces exactly-one-set as an invariant; sending both via the
        same submission is not possible because Content-Type dispatches
        to one schema or the other.
      properties:
        audio_url:
          type: string
          format: uri
          description: |
            HTTPS URL the gateway can GET to fetch the audio. Caller is
            responsible for upload + URL signing. JSON-mode callers
            without their own staging should consider `SubmitSttBytesRequest`
            (multipart) instead, which avoids the upload+presign step.
            Only `http://` and `https://` schemes are accepted; `file://`
            and `s3://` are rejected (basic SSRF guard).
        language:
          type: string
          default: auto
          description: |
            ISO 639-1 code or `auto` for upstream auto-detection.
            OpenAI Whisper accepts both; `auto` is converted to "omit
            param" at the provider HTTP layer.

    SubmitSttBytesRequest:
      type: object
      required: [operation, model_source, model_ref, audio]
      description: |
        Phase 5b. Multipart variant for STT submission with the audio
        bytes carried inline. The gateway streams the file into a
        per-process buffer (no DB persistence), dispatches the worker,
        and replies 202 with the same `SubmitJobResponse` envelope as
        the JSON variant.

        Only `operation=stt` is accepted on `multipart/form-data`. Other
        operations on multipart return 400 `LLM_INVALID_REQUEST`.

        `chunking` config is NOT accepted on multipart submits — STT
        runs as a single upstream call regardless of audio length. If a
        `chunking` form field is present, the handler returns 400
        `LLM_INVALID_REQUEST: "chunking not accepted on stt multipart submits"`.

        File field name MUST be exactly `audio`. Anything else returns
        400 `LLM_INVALID_REQUEST: "expected file field 'audio'; got [<list>]"`.
      properties:
        operation:
          type: string
          enum: [stt]
          description: Must be `stt`.
        model_source:
          $ref: '#/components/schemas/ModelSource'
        model_ref:
          type: string
          format: uuid
          description: Caller's model UUID (resolved via provider-registry).
        language:
          type: string
          default: auto
          description: |
            ISO 639-1 code or `auto` for upstream auto-detection.
            Mirrors `SttInput.language`.
        trace_id:
          type: string
          nullable: true
          description: Optional correlation ID, mirrors `SubmitJobRequest.trace_id`.
        audio:
          type: string
          format: binary
          description: |
            Audio bytes (any format Whisper accepts: webm, mp3, wav,
            ogg, m4a, flac). 25MB hard cap matches OpenAI Whisper
            upload limit. Bytes > 25MB rejected with 413
            `LLM_AUDIO_TOO_LARGE`. Filename is informational — adapter
            picks the upstream extension via Content-Type.

    SttResult:
      type: object
      required: [text]
      description: |
        Phase 5a. Result payload populated in `Job.result` when
        `operation: stt` and `status: completed`.
      properties:
        text:
          type: string
          description: Transcribed text.
        language:
          type: string
          nullable: true
          description: Detected language. Empty/null if upstream didn't return.
        duration_ms:
          type: integer
          minimum: 0
          nullable: true
          description: |
            Audio duration as reported by upstream (e.g. OpenAI
            `verbose_json` `duration` field). 0/null if absent.

    # ── Image-gen operation schemas (Phase 5c-α) ──────────────────────
    ImageGenInput:
      type: object
      required: [prompt]
      description: |
        Phase 5c-α. Input payload for `SubmitJobRequest` with
        `operation: image_gen`. The gateway forwards to the upstream
        provider's OpenAI-compatible `/v1/images/generations` endpoint.
        Field names + semantics mirror the OpenAI Image API 1:1 so any
        OpenAI-compatible backend (DALL-E, gpt-image-1, local ComfyUI
        services like local-image-generator-service) works without
        per-backend adapter code.
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 32000
          description: |
            Text description of the desired image. Hard cap 32K at the
            gateway (DALL-E 3 accepts 4K; gpt-image-1 32K; local ComfyUI
            models often cap at CLIP encoder limit ≈300–500 tokens —
            upstream validates).
        size:
          type: string
          default: "1024x1024"
          description: |
            Image dimensions. Common: "256x256", "512x512", "1024x1024",
            "1792x1024", "1024x1792", "1536x1024", "1024x1536". Upstream
            validates supported sizes per model.
        n:
          type: integer
          minimum: 1
          maximum: 4
          default: 1
          description: |
            Number of images to generate (1..4). Gateway rejects n>4 at
            handler boundary AND at adapter boundary (belt-and-suspenders).
            DALL-E-3 + gpt-image-1 only accept n=1; DALL-E-2 + local
            backends often accept n>1.
        response_format:
          type: string
          enum: [url, b64_json]
          default: url
          description: |
            How to return image bytes. `url` returns an upstream-hosted
            URL the caller must fetch (typical: ~10 min lifetime).
            `b64_json` returns the bytes inline (≈33% bandwidth bloat).
            Upstream response body is capped at 8MB (`MaxImageResponseBytes`);
            larger responses → LLM_UPSTREAM_ERROR. Use `url` for large
            multi-image flows.
        quality:
          type: string
          enum: [standard, hd, high, medium, low]
          default: standard
          description: |
            Quality tier. Model-dependent: DALL-E-3 accepts standard/hd;
            gpt-image-1 accepts high/medium/low. Upstream validates.
        style:
          type: string
          enum: [vivid, natural]
          nullable: true
          description: DALL-E-3 only. `null` to omit.
        background:
          type: string
          enum: [auto, transparent, opaque]
          nullable: true
          description: gpt-image-1 only. `null` to omit.

    ImageGenResult:
      type: object
      required: [created, data]
      description: |
        Phase 5c-α. Result payload populated in `Job.result` when
        `operation: image_gen` and `status: completed`.
      properties:
        created:
          type: integer
          description: Unix timestamp (seconds) when the generation finished.
        data:
          type: array
          minItems: 1
          maxItems: 4
          items:
            $ref: '#/components/schemas/ImageGenDataItem'

    ImageGenDataItem:
      type: object
      description: |
        Single generated image. Exactly one of `url` or `b64_json` is
        populated based on the request's `response_format`.
        `revised_prompt` is present if the upstream model rewrote the
        prompt (DALL-E-3 + gpt-image-1 do this; local models typically
        don't).
      properties:
        url:
          type: string
          format: uri
          nullable: true
          description: |
            Upstream-hosted image URL. Caller is responsible for fetching
            and storing — gateway does NOT download. URL lifetime is
            upstream-dependent (OpenAI: ~1 hour; local services:
            caller-configured). Caller MUST download immediately after
            polling completed; persistent storage of the upstream URL
            is unsafe.
        b64_json:
          type: string
          nullable: true
          description: Base64-encoded raw image bytes.
        revised_prompt:
          type: string
          nullable: true
          description: |
            If upstream rewrote the prompt (DALL-E-3 safety-rewrite +
            gpt-image-1 caption-rewrite), the rewritten text. `null`
            otherwise.

    # ── Video-gen operation schemas (Phase 5d) ────────────────────────
    VideoGenInput:
      type: object
      required: [prompt]
      description: |
        Phase 5d. Input payload for `SubmitJobRequest` with
        `operation: video_gen`. The gateway forwards to the upstream
        provider's OpenAI-compatible video generation endpoint.

        **Upstream path dispatch (/review-impl(DESIGN) HIGH#1)**:
        when `init_image` is set, adapter POSTs to
        `/v1/videos/generations/image-to-video`; otherwise to
        `/v1/videos/generations/text-to-video`. Matches the actual
        local-image-generator-service routes
        ([G:/Works/local-image-generator-service/app/api/videos.py:168,220]).
        The integration guide's singular `/v1/video/generations` is
        aspirational and unimplemented.
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 32000
          description: |
            Text description of the desired video. Same cap as
            ImageGenInput. Upstream models cap shorter (CLIP encoder
            limits typical at 300-500 tokens for local backends).
        size:
          type: string
          default: "1920x1080"
          description: |
            Video dimensions. Common: "1920x1080", "1080x1920",
            "1080x1080", "1440x1080". Upstream validates supported
            sizes per model.
        duration:
          type: integer
          minimum: 1
          maximum: 60
          default: 5
          description: |
            Video duration in seconds. Gateway caps at 1..60;
            upstream-specific shorter caps surface as LLM_UPSTREAM_ERROR.
        n:
          type: integer
          enum: [1]
          default: 1
          description: |
            Number of videos. **n=1 only** in Phase 5d. Gateway rejects
            n != 1 at handler + adapter. Multi-video deferred to a
            follow-up if a real caller surfaces.
        response_format:
          type: string
          enum: [url]
          default: url
          description: |
            How to return video bytes. **url-only** per
            /review-impl(DESIGN) MED#3 — b64_json is impractical for
            video (realistic clips exceed 8MB MaxImageResponseBytes
            cap). Handler rejects `b64_json` for video_gen with clear
            "use url mode" hint. Asymmetric with image_gen (which
            accepts both) — intentional.
        style:
          type: string
          nullable: true
          description: |
            Optional style hint (model-dependent — Wan/LTX Video have
            their own style vocabularies). `null` to omit.
        init_image:
          type: string
          nullable: true
          description: |
            Optional base64-encoded image for image-to-video models
            (Wan, LTX Video on local-image-generator-service). When
            set, adapter dispatches to image-to-video upstream path.
            Format: raw base64 of PNG/JPG bytes (no data URI prefix).
            Field name `init_image` matches local-image-generator-service's
            VideoGenerateRequest.init_image (NOT `image` per the stale
            integration guide — /review-impl(DESIGN) HIGH#1).

            **Size cap** (/review-impl(DESIGN) MED#2): caller-side
            base64 string capped at 10MB (`MaxImg2VidInputBytes`).
            Handler rejects oversize with
            `LLM_INVALID_REQUEST: "init_image exceeds 10485760-byte cap"`.
            Adapter belt-and-suspenders rejects with `ErrVideoInvalidParams`.

    VideoGenResult:
      type: object
      required: [created, data]
      description: |
        Phase 5d. Result payload populated in `Job.result` when
        `operation: video_gen` and `status: completed`.
      properties:
        created:
          type: integer
          description: Unix timestamp (seconds) when generation finished.
        data:
          type: array
          minItems: 1
          maxItems: 1
          items:
            $ref: '#/components/schemas/VideoGenDataItem'

    VideoGenDataItem:
      type: object
      description: |
        Single generated video. `url` is populated (Phase 5d is
        url-only per MED#3). `revised_prompt` is present if upstream
        rewrote the prompt (rare for video — most local backends don't
        have safety-system prompt rewriting).
      properties:
        url:
          type: string
          format: uri
          description: |
            Upstream-hosted video URL. Caller is responsible for
            fetching and storing — gateway does NOT download. URL
            lifetime is upstream-dependent. Caller MUST fetch
            immediately after polling completed.
        revised_prompt:
          type: string
          nullable: true
          description: Upstream-rewritten prompt, if any. Null otherwise.

    # ── audio_gen (Phase 5e-β.2 — batch TTS) ─────────────────────────
    AudioGenInput:
      type: object
      required: [texts]
      description: |
        Phase 5e-β.2 batch text-to-speech input. Distinct from streaming
        `tts` (which uses /v1/llm/stream for real-time playback);
        audio_gen is job-mode for stored audio (book chapter narration).
        All inputs share the same voice / speed / format / response_format.
      properties:
        texts:
          type: array
          minItems: 1
          maxItems: 10
          description: |
            1..10 strings to synthesize. Cap of 10 (vs Phase 5d's n=1
            and Phase 5c-α's n≤4) chosen to bound double-bill exposure
            on mid-batch failure (TTS is char-billed per upstream
            request). /review-impl(DESIGN) MED#1.
          items:
            type: string
            minLength: 1
            maxLength: 4096
            description: Per-input cap of 4096 chars (matches OpenAI TTS exactly).
        voice:
          type: string
          default: alloy
          description: |
            Upstream voice name. OpenAI canonical: alloy, echo, fable,
            onyx, nova, shimmer. Backend-specific; passed through.
        speed:
          type: number
          minimum: 0.25
          maximum: 4.0
          default: 1.0
        format:
          type: string
          enum: [mp3, opus, aac, flac, wav, pcm]
          default: mp3
        response_format:
          type: string
          enum: [b64_json, url]
          default: b64_json
          description: |
            b64_json: bytes inline in result.data[i].b64_json (default).
            url: gateway stages each audio file in its loreweave-audio-cache
            MinIO bucket and returns a public URL (1-day server-side TTL).

    AudioGenResult:
      type: object
      required: [created, data]
      description: |
        Phase 5e-β.2 batch TTS result. Order-preserving: data[i]
        corresponds 1:1 to input.texts[i] (adapter MUST preserve
        order — invariant for parallel-batch refactors).
      properties:
        created:
          type: integer
          description: Unix epoch (seconds) when generation finished.
        data:
          type: array
          minItems: 1
          maxItems: 10
          items:
            $ref: '#/components/schemas/AudioGenDataItem'

    AudioGenDataItem:
      type: object
      required: [content_type]
      description: |
        Single generated audio. Exactly one of `url` or `b64_json` is
        populated based on input.response_format. `duration_ms` is
        upstream-dependent (typically 0 for OpenAI TTS).
      properties:
        url:
          type: string
          format: uri
          description: |
            Public URL to the staged audio in loreweave-audio-cache.
            Populated when response_format=url. Bucket policy is
            public-read; key contains job_id UUID (unguessable). 1-day
            server-side lifecycle TTL. Caller MUST fetch + store
            permanently (gateway-side staging is throwaway).
        b64_json:
          type: string
          format: byte
          description: |
            Base64-encoded audio bytes. Populated when
            response_format=b64_json (default). Caller decodes +
            stores in its own bucket.
        duration_ms:
          type: integer
          nullable: true
        content_type:
          type: string
          description: MIME type, e.g. "audio/mpeg".
