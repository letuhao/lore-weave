components:
  responses:
    BadRequest:
      description: Malformed request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Caller lacks the required grant on this book
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found in this book
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Conflict:
      description: A conflicting row already exists (use PATCH to edit)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    PreconditionFailed:
      description: If-Match version drift (optimistic-concurrency conflict)
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
    KindSummary:
      type: object
      properties:
        kind_id: { type: string }
        code: { type: string }
        name: { type: string }
        icon: { type: string }
        color: { type: string }
    EntityListItem:
      type: object
      properties:
        entity_id: { type: string, format: uuid }
        book_id: { type: string, format: uuid }
        kind_id: { type: string }
        kind: { $ref: '#/components/schemas/KindSummary' }
        display_name: { type: string }
        display_name_translation: { type: string, nullable: true }
        status: { type: string, enum: [draft, active, archived] }
        tags: { type: array, items: { type: string } }
        short_description: { type: string, nullable: true }
        scope_label: { type: string }
        is_pinned_for_context: { type: boolean }
        chapter_link_count: { type: integer }
        translation_count: { type: integer }
        evidence_count: { type: integer }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    Entity:
      $ref: '#/components/schemas/EntityListItem'
    EntityDetail:
      allOf:
        - $ref: '#/components/schemas/EntityListItem'
        - type: object
          properties:
            chapter_links: { type: array, items: { $ref: '#/components/schemas/ChapterLink' } }
            attribute_values: { type: array, items: { $ref: '#/components/schemas/AttributeValue' } }
    EntityPatch:
      type: object
      description: Partial — any subset of the mutable entity fields.
      properties:
        status: { type: string, enum: [draft, active, archived] }
        tags: { type: array, items: { type: string } }
        short_description: { type: string }
        scope_label: { type: string }
    EntityListResponse:
      type: object
      properties:
        items: { type: array, items: { $ref: '#/components/schemas/EntityListItem' } }
        total: { type: integer }
        limit: { type: integer }
        offset: { type: integer }
    AttributeDef:
      type: object
      properties:
        attr_def_id: { type: string, format: uuid }
        code: { type: string }
        name: { type: string }
        field_type: { type: string }
        is_required: { type: boolean }
        is_system: { type: boolean }
        sort_order: { type: integer }
        options: { type: array, items: { type: string } }
        merge_strategy: { type: string }
    AttributeValue:
      type: object
      properties:
        attr_value_id: { type: string, format: uuid }
        entity_id: { type: string, format: uuid }
        attr_def_id: { type: string, format: uuid }
        attribute_def: { $ref: '#/components/schemas/AttributeDef' }
        original_language: { type: string }
        original_value: { type: string }
        translations: { type: array, items: { $ref: '#/components/schemas/Translation' } }
        evidences: { type: array, items: { $ref: '#/components/schemas/Evidence' } }
        canonical_value: { type: string, nullable: true }
        canonical_dirty: { type: boolean }
    Translation:
      type: object
      properties:
        translation_id: { type: string, format: uuid }
        attr_value_id: { type: string, format: uuid }
        language_code: { type: string }
        value: { type: string }
        confidence: { type: string }
        translator: { type: string, nullable: true }
        updated_at: { type: string, format: date-time }
    EvidenceTranslation:
      type: object
      properties:
        id: { type: string, format: uuid }
        evidence_id: { type: string, format: uuid }
        language_code: { type: string }
        value: { type: string }
        confidence: { type: string }
    Evidence:
      type: object
      properties:
        evidence_id: { type: string, format: uuid }
        attr_value_id: { type: string, format: uuid }
        chapter_id: { type: string, format: uuid, nullable: true }
        chapter_title: { type: string, nullable: true }
        block_or_line: { type: string }
        evidence_type: { type: string }
        original_language: { type: string }
        original_text: { type: string }
        note: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        translations: { type: array, items: { $ref: '#/components/schemas/EvidenceTranslation' } }
    ChapterLink:
      type: object
      properties:
        link_id: { type: string, format: uuid }
        entity_id: { type: string, format: uuid }
        chapter_id: { type: string, format: uuid }
        chapter_title: { type: string, nullable: true }
        chapter_index: { type: integer, nullable: true }
        relevance: { type: string }
        note: { type: string, nullable: true }
        added_at: { type: string, format: date-time }
        mention_count: { type: integer }
    EntityRevisionSummary:
      type: object
      properties:
        revision_id: { type: string, format: uuid }
        revision_num: { type: integer }
        op: { type: string }
        actor_type: { type: string }
        actor_id: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
