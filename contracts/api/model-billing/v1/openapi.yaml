openapi: 3.0.3
info:
  title: LoreWeave Model Billing API
  version: 1.0.0
  description: |
    Module 03 billing and usage contract covering per-request logs, encrypted detail view, quota + credit
    accounting, and admin reconciliation endpoints.

servers:
  - url: http://localhost:3000
    description: API Gateway (BFF)

tags:
  - name: usage-logs
  - name: usage-summary
  - name: account-balance
  - name: admin-billing

paths:
  /v1/model-billing/usage-logs:
    get:
      tags: [usage-logs]
      summary: List usage logs for current user
      operationId: listUsageLogs
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: provider_kind
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ProviderKind'
        - name: model_ref
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageLogListResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /v1/model-billing/usage-logs/{usage_log_id}:
    get:
      tags: [usage-logs]
      summary: Get decrypted usage log detail for owner
      operationId: getUsageLogDetail
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UsageLogId'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageLogDetail'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'
        '404':
          $ref: '#/components/responses/ErrorResponse'
        '409':
          $ref: '#/components/responses/ErrorResponse'

  /v1/model-billing/usage-summary:
    get:
      tags: [usage-summary]
      summary: Get usage and cost summary for current user
      operationId: getUsageSummary
      security:
        - bearerAuth: []
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [last_24h, last_7d, current_month]
            default: current_month
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UsageSummary'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /v1/model-billing/account-balance:
    get:
      tags: [account-balance]
      summary: Get tier quota and credit balance for current user
      operationId: getAccountBalance
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountBalance'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /v1/model-billing/guardrail:
    get:
      tags: [account-balance]
      summary: Get the current user's USD spend guardrail (Phase 6a-γ)
      description: |
        The Subsystem-A daily/monthly USD limits + spend. Spend figures are
        window-aware — a rolled-over calendar window reports 0. No row yet ⇒
        config defaults.
      operationId: getGuardrail
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Guardrail' }
        '401':
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [account-balance]
      summary: Configure the current user's spend-guardrail limits (Phase 6a-γ)
      description: |
        Sets the daily and/or monthly USD limit. Either field may be omitted;
        a supplied limit must be > 0. Lowering a limit below current spend is
        allowed — it bounds new work, never aborts in-flight work.
      operationId: patchGuardrail
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                daily_limit_usd: { type: number, minimum: 0, exclusiveMinimum: true }
                monthly_limit_usd: { type: number, minimum: 0, exclusiveMinimum: true }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Guardrail' }
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /v1/model-billing/platform-balance:
    get:
      tags: [account-balance]
      summary: Get the current user's platform balance (Phase 6a-γ)
      description: |
        The Subsystem-B platform resale ledger — LoreWeave-funded free tier
        + prepaid credits (USD). free_tier_used is window-aware. No row yet ⇒
        config free tier.
      operationId: getPlatformBalance
      security:
        - bearerAuth: []
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformBalance' }
        '401':
          $ref: '#/components/responses/ErrorResponse'

  /v1/model-billing/admin/usage:
    get:
      tags: [admin-billing]
      summary: List usage logs for billing operations (admin)
      operationId: adminListUsageLogs
      security:
        - bearerAuth: []
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: user_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminUsageLogListResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

  /v1/model-billing/admin/reconciliation:
    post:
      tags: [admin-billing]
      summary: Create reconciliation report for usage and credit ledger (admin)
      operationId: createReconciliationReport
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateReconciliationRequest'
      responses:
        '202':
          description: Accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReconciliationReport'
        '400':
          $ref: '#/components/responses/ErrorResponse'
        '401':
          $ref: '#/components/responses/ErrorResponse'
        '403':
          $ref: '#/components/responses/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    UsageLogId:
      name: usage_log_id
      in: path
      required: true
      schema:
        type: string
        format: uuid

  responses:
    ErrorResponse:
      description: Error envelope
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'

  schemas:
    ErrorBody:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
        message:
          type: string

    ProviderKind:
      type: string
      enum: [openai, anthropic, ollama, lm_studio]

    UsageLog:
      type: object
      required:
        - usage_log_id
        - request_id
        - owner_user_id
        - provider_kind
        - model_source
        - model_ref
        - input_tokens
        - output_tokens
        - total_tokens
        - total_cost_usd
        - billing_decision
        - request_status
        - created_at
      properties:
        usage_log_id:
          type: string
          format: uuid
        request_id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        provider_kind:
          $ref: '#/components/schemas/ProviderKind'
        model_source:
          type: string
          enum: [user_model, platform_model]
        model_ref:
          type: string
          format: uuid
        input_tokens:
          type: integer
          minimum: 0
        output_tokens:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
        total_cost_usd:
          type: number
          format: double
          minimum: 0
        billing_decision:
          type: string
          enum: [quota, credits, rejected]
        request_status:
          type: string
          enum: [success, provider_error, billing_rejected]
        policy_version:
          type: string
        input_payload_ciphertext:
          type: string
          description: Encrypted payload envelope (opaque to clients)
        output_payload_ciphertext:
          type: string
          description: Encrypted payload envelope (opaque to clients)
        payload_encryption_key_ref:
          type: string
        payload_encryption_algo:
          type: string
          example: AES-256-GCM
        decrypt_access_audit_count:
          type: integer
          minimum: 0
        created_at:
          type: string
          format: date-time

    UsageLogListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UsageLog'
        total:
          type: integer
          minimum: 0
        limit:
          type: integer
          minimum: 1
        offset:
          type: integer
          minimum: 0

    UsageLogDetail:
      type: object
      required: [usage_log, input_payload, output_payload, viewed_at]
      properties:
        usage_log:
          $ref: '#/components/schemas/UsageLog'
        input_payload:
          type: object
          additionalProperties: true
        output_payload:
          type: object
          additionalProperties: true
        viewed_at:
          type: string
          format: date-time

    UsageSummary:
      type: object
      required:
        - period
        - request_count
        - total_tokens
        - total_cost_usd
        - charged_credits
        - quota_consumed_tokens
      properties:
        period:
          type: string
        request_count:
          type: integer
          minimum: 0
        total_tokens:
          type: integer
          minimum: 0
        total_cost_usd:
          type: number
          format: double
          minimum: 0
        charged_credits:
          type: integer
          minimum: 0
        quota_consumed_tokens:
          type: integer
          minimum: 0

    AccountBalance:
      type: object
      required:
        - tier_name
        - month_quota_tokens
        - month_quota_remaining_tokens
        - credits_balance
      properties:
        tier_name:
          type: string
        month_quota_tokens:
          type: integer
          minimum: 0
        month_quota_remaining_tokens:
          type: integer
          minimum: 0
        credits_balance:
          type: integer
          minimum: 0
        billing_policy_version:
          type: string

    Guardrail:
      type: object
      description: Phase 6a-γ — Subsystem-A USD spend guardrail.
      required:
        - daily_limit_usd
        - monthly_limit_usd
        - daily_spent_usd
        - monthly_spent_usd
        - reserved_usd
        - daily_available_usd
        - monthly_available_usd
      properties:
        daily_limit_usd: { type: number }
        monthly_limit_usd: { type: number }
        daily_spent_usd: { type: number }
        monthly_spent_usd: { type: number }
        reserved_usd: { type: number }
        daily_available_usd: { type: number }
        monthly_available_usd: { type: number }

    PlatformBalance:
      type: object
      description: Phase 6a-γ — Subsystem-B platform resale ledger.
      required:
        - free_tier_allowance_usd
        - free_tier_used_usd
        - free_tier_remaining_usd
        - credits_balance_usd
        - reserved_usd
      properties:
        free_tier_allowance_usd: { type: number }
        free_tier_used_usd: { type: number }
        free_tier_remaining_usd: { type: number }
        credits_balance_usd: { type: number }
        reserved_usd: { type: number }

    AdminUsageLogListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/UsageLog'
        total:
          type: integer
          minimum: 0

    CreateReconciliationRequest:
      type: object
      required: [period_start, period_end]
      properties:
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        dry_run:
          type: boolean
          default: true

    ReconciliationReport:
      type: object
      required: [report_id, period_start, period_end, status, created_at]
      properties:
        report_id:
          type: string
          format: uuid
        period_start:
          type: string
          format: date-time
        period_end:
          type: string
          format: date-time
        status:
          type: string
          enum: [queued, completed, failed]
        summary:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
