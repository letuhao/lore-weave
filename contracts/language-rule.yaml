# contracts/language-rule.yaml — I3 invariant amendment (LOCKED 2026-05-29)
#
# Maps services/<name>/ → expected language. Consumed by
# scripts/language-rule-lint.sh (L1.K.10). The lint walks every services/<name>/
# directory, detects its language by toolchain marker (Cargo.toml | go.mod |
# pyproject.toml | package.json) and FAILS if detected != expected.
#
# Source of truth for the amendment text: docs/plans/2026-05-29-foundation-mega-task/I3_INVARIANT_AMENDMENT.md §5
# Companion service map updates: same doc §4
# Locked Q-IDs: Q-L1K-2 ("same commit as I3 amendment")
#
# Convention:
#   - Languages: rust | go | python | typescript
#   - "missing": directory exists but is intentionally an empty stub (services
#     scheduled to ship in later cycles); the lint logs a NOTE but does not
#     fail. Promote to a real language once the scaffold lands.
#
# Cycle 7 (L1.K.10) ships this file + the lint. Future cycles MUST add a
# row when a new services/<name>/ directory is introduced — the
# service-map-lint cross-check ensures drift can't slip through.

