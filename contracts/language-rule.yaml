# contracts/language-rule.yaml — I3 invariant amendment (LOCKED 2026-05-29)
#
# Maps services/<name>/ → expected language. Consumed by
# scripts/language-rule-lint.sh (L1.K.10). The lint walks every services/<name>/
# directory, detects its language by toolchain marker (Cargo.toml | go.mod |
# pyproject.toml/requirements.txt | package.json) and FAILS if detected != expected.
#
# Source of truth for the amendment text: docs/plans/2026-05-29-foundation-mega-task/I3_INVARIANT_AMENDMENT.md §5
# Locked Q-IDs: Q-L1K-2 ("same commit as I3 amendment")
#
# Convention:
#   - Languages: rust | go | python | typescript
#   - "missing": directory is NOT YET on disk (scheduled for a later cycle). The
#     lint allows this ONLY while the dir is genuinely absent; once a service
#     directory with a real toolchain marker exists it MUST be mapped to its
#     real language (the lint FAILS on declared-missing-but-present — PRR-16).
#
# Enforcement (hardened 2026-05-30, PRR-16 / PRR-21):
#   - declared lang != detected lang → FAIL
#   - declared "missing" but present on disk → FAIL (PRR-16)
#   - present on disk with a toolchain marker but NO row here → FAIL (PRR-21
#     completeness: a service can no longer be added in the wrong language and
#     slip past I3 by simply omitting its row)

