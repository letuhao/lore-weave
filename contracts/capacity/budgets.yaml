# contracts/capacity/budgets.yaml — L1.L.2
#
# Per-service capacity budgets. Consumed by:
#   * capacity-budget-lint.sh (L1.K.7) — every services/<name>/ MUST appear
#   * HPA/KEDA manifests (infra/k8s/) — derive min/max replicas + scale triggers
#   * SR08 capacity-planner — reality allocation respects per-shard budget
#
# Schema:
#   services:
#     - name: <service-name>
#       class: web|llm-gateway|worker|cron|library
#       v1:
#         min_replicas: <int>
#         max_replicas: <int>
#         cpu_per_replica: <decimal>     # CPU cores
#         memory_per_replica: <suffix>   # e.g., 512Mi, 2Gi
#         scale_trigger: <metric expr>   # KEDA / HPA trigger expression
#       v3:
#         min_replicas: <int>
#         max_replicas: <int>
#
# Class semantics (per R04 §12D.6 + SR08):
#   - web         : http/ws request-serving; HPA on req/s or queue depth
#   - llm-gateway : provider proxy; KEDA on inflight LLM calls
#   - worker      : background queue consumer; KEDA on queue lag
#   - cron        : scheduled; no autoscale; fixed replicas
#   - library     : not a deployable; manifest-less

version: 1

