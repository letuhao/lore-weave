# meta-sensitive-read-paths.yml — Q-L1B-2 resolution
#
# This file enumerates the READ paths that trigger a meta_read_audit row
# (S04 §12T.6).  Reads NOT in this file are NOT audited (performance choice).
#
# Q-L1B-2 resolution: "Platform owns initial set; security team CODEOWNERS
# approval on changes."  Initial set seeded by cycle 2 (L1.B).
#
# Each entry MUST specify:
#   - id            : stable kebab-case identifier (used in meta_read_audit.query_type)
#   - description   : human-readable purpose
#   - tables        : meta tables the path reads
#   - rationale     : why this is sensitive (PII, cross-user, bulk, audit, etc.)
#   - reviewers     : CODEOWNERS for changes (security team alias)
#
# Library callers tag their reads with the `id` (e.g., ReadSensitive(ctx, "audit_query", params)).
# Bypass detection: L1.K lint greps for direct SELECT on these tables outside the library.

version: 1
paths:
  - id: player_index_cross_user
    description: "SELECT * FROM player_character_index WHERE user_ref_id != $caller_user"
    tables:
      - player_character_index  # ships in cycle 8 (L1.A-2); listed early so the path id is stable
    rationale: "Cross-user PC visibility — identity-manipulation surface (L1.A §2.4 risk)"
    reviewers:
      - security-team

  - id: audit_query
    description: "Any SELECT FROM *_audit or *_log"
    tables:
      - meta_write_audit
      - meta_read_audit
      - lifecycle_transition_audit
      - reality_close_audit
      - archive_verification_log
      - reality_migration_audit
    rationale: "Audit-tampering / forensic-leak vector — must be observed"
    reviewers:
      - security-team

  - id: admin_bulk_export
    description: "Explicit admin-cli bulk export commands"
    tables:
      - reality_registry
      - publisher_heartbeats
      - session_cost_summary
    rationale: "Admin Tier-1 ops require audit trail (S04 §12T.6 admin actor)"
    reviewers:
      - security-team
      - sre-team

  - id: bulk_meta_query
    description: "Any query with LIMIT > 1000 or missing WHERE on a meta table"
    tables:
      - "*"  # catch-all — library helper flags any read matching the bulk pattern
    rationale: "Bulk scans can exfiltrate; library injects LIMIT cap or audits"
    reviewers:
      - security-team
