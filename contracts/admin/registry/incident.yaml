# L7.A incident-domain admin commands — RAID cycle 36 DPS 5.
# Many of these will be wired to cycle 37 incident-bot; cycle 36 ships CLI entry-points.

domain: incident
commands:
  - name: incident declare
    version: "1.0.0"
    summary: "Declare an incident (creates war room, posts severity card via incident-bot)."
    handler: incidentDeclare
    params:
      - {name: severity,  type: enum,   required: true, description: "sev0|sev1|sev2|sev3"}
      - {name: title,     type: string, required: true, description: "Incident short title"}
      - {name: summary,   type: string, required: true, description: "1-3 sentence description"}
      - {name: incident_commander, type: string, required: false, description: "IC user_ref (default: caller)"}
    impact_class: tier-2-griefing
    dry_run_required: true
    double_approval_required: false
    carry_forward_cycle: "37"  # wired in cycle 37 incident-bot
    locked_qs_consumed: [Q-L7A-1, Q-L7A-2]

  - name: incident statuspage-update
    version: "1.0.0"
    summary: "Post a status-page update (consumes cycle 37 L7.L Statuspage adapter)."
    handler: incidentStatuspageUpdate
    params:
      - {name: incident_id, type: uuid,   required: true, description: "Incident UUID"}
      - {name: status,      type: enum,   required: true, description: "investigating|identified|monitoring|resolved"}
      - {name: message,     type: string, required: true, description: "User-facing update"}
    impact_class: tier-2-griefing
    dry_run_required: true
    double_approval_required: false
    carry_forward_cycle: "37"
    locked_qs_consumed: [Q-L7A-1, Q-L7A-2, Q-L7L-1]

# NOTE: `incident postmortem-stub` is owned by cycle 37 (L7.D postmortem-bot) — it
# auto-creates the postmortem from incident-bot metadata; no admin-cli entry needed.
