# contracts/observability/inventory.yaml — L1.I.6 (RAID cycle 6)
#
# I19 observability inventory — the AUTHORITATIVE list of every metric +
# log channel + trace span the LoreWeave platform emits.
#
# Each entry MUST declare:
#   - name           — canonical metric/log/trace name
#   - kind           — counter | gauge | histogram | summary | log | trace
#   - layer          — L1 | L2 | L3 | L4 | L5 | L6 | L7
#   - shipped_cycle  — RAID cycle that landed it
#   - labels         — bounded list of label dimensions (cardinality controls)
#   - description    — one-line semantics
#   - owner          — service/team responsible
#
# The L1.K observability-inventory-lint.sh (cycle 7) enforces that:
#   1. every metric scraped by Prometheus appears here
#   2. no metric appears here without a Prometheus scrape config OR alert
#   3. label sets in inventory match label sets in actual emissions
#
# Cycle 6 enumerates EVERY metric emitted by cycles 1-6 (see below). Future
# cycles MUST append entries for each new metric.

version: 1

metrics:
  # ────────────────────────────────────────────────────────────────────
  # L1.E — Meta HA (cycle 1)
  # ────────────────────────────────────────────────────────────────────
  - name: pg_stat_replication_lag_bytes
    kind: gauge
    layer: L1
    shipped_cycle: 1
    labels: [application_name, shard_host, db_class]
    description: 'replication lag in bytes per replica'
    owner: sre
    source: postgres-exporter

  - name: pg_archive_last_archived_seconds
    kind: gauge
    layer: L1
    shipped_cycle: 1
    labels: [shard_host, db_class]
    description: 'unix seconds of last successful WAL archive'
    owner: sre
    source: postgres-exporter

  # ────────────────────────────────────────────────────────────────────
  # L1.A-1/2/3/4 + L1.B — Meta tables + library (cycles 2/3/4)
  # ────────────────────────────────────────────────────────────────────
  - name: pg_stat_user_tables_n_tup_ins
    kind: counter
    layer: L1
    shipped_cycle: 2
    labels: [relname, reality_id, shard_host, db_class]
    description: 'rows inserted per table — restricted to 7 audit tables for cardinality'
    owner: platform
    source: postgres-exporter
    cardinality_notes: 'relname is restricted to the 7 audit-table allowlist in infra/postgres-exporter/postgres-exporter.yaml'

  # ────────────────────────────────────────────────────────────────────
  # L1.C — Provisioner (cycle 5)
  # ────────────────────────────────────────────────────────────────────
  - name: lw_provisioner_steps_total
    kind: counter
    layer: L1
    shipped_cycle: 5
    labels: [step, outcome, shard_host]
    description: 'provisioner 11-step outcomes (done/skipped) per shard'
    owner: world-platform
    source: services/world-service
    cardinality_notes: 'step is from PROVISION_STEPS const (11 values); outcome ∈ {done, skipped}; shard_host is bounded by physical shard count'

  - name: lw_deprovisioner_steps_total
    kind: counter
    layer: L1
    shipped_cycle: 5
    labels: [step, outcome, shard_host]
    description: 'deprovisioner 6-step outcomes per shard'
    owner: world-platform
    source: services/world-service

  - name: shard_utilization_realities_used
    kind: gauge
    layer: L1
    shipped_cycle: 5
    labels: [shard_host]
    description: 'count of active realities per shard'
    owner: world-platform
    source: services/world-service

  - name: shard_utilization_realities_total
    kind: gauge
    layer: L1
    shipped_cycle: 5
    labels: [shard_host]
    description: 'capacity (total realities slot) per shard'
    owner: world-platform
    source: services/world-service

  # ────────────────────────────────────────────────────────────────────
  # L1.G — Pgbouncer pool metrics (cycle 5)
  # ────────────────────────────────────────────────────────────────────
  - name: pgbouncer_pool_active_connections
    kind: gauge
    layer: L1
    shipped_cycle: 5
    labels: [pool_name, database, shard_host]
    description: 'active backend connections per pgbouncer pool'
    owner: sre
    source: pgbouncer-exporter
    cardinality_notes: 'pool_name + database bounded by databases.ini entries'

  - name: pgbouncer_pool_waiting_clients
    kind: gauge
    layer: L1
    shipped_cycle: 5
    labels: [pool_name, database, shard_host]
    description: 'clients waiting for a backend connection'
    owner: sre
    source: pgbouncer-exporter

  # ────────────────────────────────────────────────────────────────────
  # L1.F — Redis cache (cycle 5)
  # ────────────────────────────────────────────────────────────────────
  - name: redis_memory_used_bytes
    kind: gauge
    layer: L1
    shipped_cycle: 5
    labels: [instance, role]
    description: 'redis memory in use'
    owner: sre
    source: redis-exporter

  - name: redis_keyspace_keys
    kind: gauge
    layer: L1
    shipped_cycle: 5
    labels: [instance, db]
    description: 'total keys per redis db'
    owner: sre
    source: redis-exporter

  - name: lw_cache_invalidation_propagation_seconds
    kind: histogram
    layer: L1
    shipped_cycle: 5
    labels: [key_kind]
    description: 'time from invalidation event to cache eviction across instances'
    owner: platform
    source: contracts/meta cache library

  # ────────────────────────────────────────────────────────────────────
  # L1.I — Per-DB metrics aggregation (cycle 6 — THIS CYCLE)
  # ────────────────────────────────────────────────────────────────────
  - name: pg_database_size_bytes
    kind: gauge
    layer: L1
    shipped_cycle: 6
    labels: [reality_id, shard_host, db_class]
    description: 'per-reality database size — bounded label set per L1.I.5 cardinality controls'
    owner: world-platform
    source: postgres-exporter

  - name: pg_stat_database_numbackends
    kind: gauge
    layer: L1
    shipped_cycle: 6
    labels: [reality_id, shard_host, db_class]
    description: 'active backends per reality DB'
    owner: world-platform
    source: postgres-exporter

  - name: pg_stat_database_xact_commit
    kind: counter
    layer: L1
    shipped_cycle: 6
    labels: [reality_id, shard_host, db_class]
    description: 'committed transactions per reality DB'
    owner: world-platform
    source: postgres-exporter

  - name: pg_stat_database_xact_rollback
    kind: counter
    layer: L1
    shipped_cycle: 6
    labels: [reality_id, shard_host, db_class]
    description: 'rolled-back transactions per reality DB'
    owner: world-platform
    source: postgres-exporter

  - name: pg_stat_database_tup_returned
    kind: counter
    layer: L1
    shipped_cycle: 6
    labels: [reality_id, shard_host, db_class]
    description: 'tuples returned (read throughput proxy)'
    owner: world-platform
    source: postgres-exporter

  - name: pg_stat_database_tup_inserted
    kind: counter
    layer: L1
    shipped_cycle: 6
    labels: [reality_id, shard_host, db_class]
    description: 'tuples inserted (write throughput proxy)'
    owner: world-platform
    source: postgres-exporter

  - name: pg_stat_database_tup_updated
    kind: counter
    layer: L1
    shipped_cycle: 6
    labels: [reality_id, shard_host, db_class]
    description: 'tuples updated'
    owner: world-platform
    source: postgres-exporter

  # Note: pg_stat_database_tup_deleted is intentionally NOT exposed in V1.
  # It tracks DELETE-row counts which are rarely actionable in our model
  # (we don't issue per-row DELETEs on per-reality data — soft-delete via
  # status enum is preferred). If a future cycle needs it, add the entry
  # AND bump the cardinality budget here + L1.I.9 test.

  # ── L1.D migration-orchestrator metrics (cycle 6)
  - name: lw_migration_orchestrator_active_runs
    kind: gauge
    layer: L1
    shipped_cycle: 6
    labels: []
    description: 'count of migration runs currently in-flight (cap = 10)'
    owner: sre
    source: services/migration-orchestrator

  - name: lw_migration_orchestrator_canary_aborted_total
    kind: counter
    layer: L1
    shipped_cycle: 6
    labels: [migration_id, reason]
    description: 'breaking-migration canary abort count'
    owner: sre
    source: services/migration-orchestrator
    cardinality_notes: 'migration_id bounded by manifest.yaml entries; reason ∈ {canary_apply_failed, canary_verification_timeout, canary_verification_*}'

  - name: lw_migration_orchestrator_attempts_total
    kind: counter
    layer: L1
    shipped_cycle: 6
    labels: [migration_id, outcome]
    description: 'migration attempt outcomes (succeeded/failed/transient_retry)'
    owner: sre
    source: services/migration-orchestrator

  # ────────────────────────────────────────────────────────────────────
  # L2.A — Events table (cycle 9)
  # ────────────────────────────────────────────────────────────────────
  - name: lw_events_appended_total
    kind: counter
    layer: L2
    shipped_cycle: 9
    labels: [reality_id, aggregate_type, event_type, outcome]
    description: 'event append attempts per aggregate_type + event_type; outcome ∈ {ok, conflict, schema_violation, error}'
    owner: world-platform
    source: contracts/events (write helper)
    cardinality_notes: 'aggregate_type bounded by _registry.yaml aggregates (~5); event_type bounded by _registry.yaml events (~3 V1, ~50 V3); reality_id × event_type is the dominant factor and is the same bound as L1.I per-reality budget'

  - name: lw_partition_manager_runs_total
    kind: counter
    layer: L2
    shipped_cycle: 9
    labels: [table, op, outcome]
    description: 'per-reality-partition-manager.sh run outcomes; table ∈ {events, event_audit}, op ∈ {create_ahead, detach_old, list}, outcome ∈ {ok, dry_run, error}'
    owner: world-platform
    source: scripts/per-reality-partition-manager.sh

  # ────────────────────────────────────────────────────────────────────
  # L2.B — Event audit (cycle 9)
  # ────────────────────────────────────────────────────────────────────
  - name: lw_event_audit_writes_total
    kind: counter
    layer: L2
    shipped_cycle: 9
    labels: [reality_id, actor_type, flagged]
    description: 'event_audit rows written; actor_type ∈ {system,user,service,llm}; flagged ∈ {true,false}'
    owner: world-platform
    source: contracts/events (audit_helpers)

  - name: lw_event_audit_retention_pruned_total
    kind: counter
    layer: L2
    shipped_cycle: 9
    labels: [class, partition_drop]
    description: 'rows pruned by event-audit-retention-cron.sh; class ∈ {flagged, non_flagged}; partition_drop ∈ {true, false}'
    owner: world-platform
    source: scripts/event-audit-retention-cron.sh

  # ────────────────────────────────────────────────────────────────────
  # L2.E — Aggregate snapshots (cycle 9)
  # ────────────────────────────────────────────────────────────────────
  - name: lw_aggregate_snapshots_taken_total
    kind: counter
    layer: L2
    shipped_cycle: 9
    labels: [reality_id, aggregate_type]
    description: 'snapshots persisted per aggregate_type (per snapshot_policy.yaml opt-in)'
    owner: world-platform
    source: crates/dp-kernel (snapshot worker — wired in cycle 14)

  - name: lw_aggregate_snapshots_loaded_total
    kind: counter
    layer: L2
    shipped_cycle: 9
    labels: [reality_id, aggregate_type, outcome]
    description: 'aggregate loader snapshot lookups; outcome ∈ {hit, miss_full_replay, schema_drift_fallback}'
    owner: world-platform
    source: crates/dp-kernel (loader — wired in cycle 12)

  # ────────────────────────────────────────────────────────────────────
  # L2.C — events_outbox (cycle 10 — THIS CYCLE)
  # ────────────────────────────────────────────────────────────────────
  - name: lw_outbox_enqueued_total
    kind: counter
    layer: L2
    shipped_cycle: 10
    labels: [reality_id, event_type]
    description: 'outbox rows enqueued (one per emitted event); written via events.OutboxWrite'
    owner: world-platform
    source: contracts/events (OutboxWrite helper)
    cardinality_notes: 'reality_id × event_type — same multiplicative cap as L2.A lw_events_appended_total'

  # ────────────────────────────────────────────────────────────────────
  # L2.D — Publisher (cycle 10)
  # ────────────────────────────────────────────────────────────────────
  - name: lw_outbox_lag_seconds
    kind: gauge
    layer: L2
    shipped_cycle: 10
    labels: [shard_host]
    description: 'now() - min(enqueued_at) WHERE published=FALSE AND dead_lettered_at IS NULL; SLO 1s P50 / 10s P99 (R06 §12F.3)'
    owner: sre
    source: services/publisher

  - name: lw_publisher_active_replicas
    kind: gauge
    layer: L2
    shipped_cycle: 10
    labels: [shard_host]
    description: 'count of publisher replicas currently active per shard (V1 always 1; V2+ counts leader-elected actives)'
    owner: sre
    source: services/publisher (heartbeat loop)

  - name: lw_publisher_xadd_total
    kind: counter
    layer: L2
    shipped_cycle: 10
    labels: [shard_host, event_type, outcome]
    description: 'publisher XADD outcomes; outcome ∈ {ok, transient_fail, dead_letter}'
    owner: world-platform
    source: services/publisher (poll_loop)

  - name: lw_outbox_dead_lettered_total
    kind: counter
    layer: L2
    shipped_cycle: 10
    labels: [shard_host, reality_id, event_type]
    description: 'rows transitioned to dead_lettered_at IS NOT NULL after attempts >= max_attempts'
    owner: sre
    source: services/publisher (retry policy)

  - name: lw_publisher_heartbeat_failures_total
    kind: counter
    layer: L2
    shipped_cycle: 10
    labels: [shard_host]
    description: 'consecutive heartbeat write failures; resets to 0 on success; 3 in a row → ServiceMode=Limited (L1.J)'
    owner: sre
    source: services/publisher (heartbeat)

  # ────────────────────────────────────────────────────────────────────
  # L2.L — xreality fanout + meta-worker (cycle 10)
  # ────────────────────────────────────────────────────────────────────
  - name: lw_xreality_fanout_total
    kind: counter
    layer: L2
    shipped_cycle: 10
    labels: [event_type, outcome]
    description: 'publisher xreality fanout outcomes; outcome ∈ {ok, error}; event_type bounded by xreality.* registry entries'
    owner: world-platform
    source: services/publisher (xreality_fanout)

  - name: lw_meta_worker_dispatch_total
    kind: counter
    layer: L2
    shipped_cycle: 10
    labels: [event_type, outcome]
    description: 'meta-worker xreality dispatcher outcomes; outcome ∈ {ok, no_handler, handler_error}'
    owner: world-platform
    source: services/meta-worker (internal/dispatch)

  - name: lw_meta_worker_lag_seconds
    kind: gauge
    layer: L2
    shipped_cycle: 10
    labels: []
    description: 'now() - max(xreality stream entry ts already consumed); SLO 2s P99 per L2.L acceptance'
    owner: sre
    source: services/meta-worker

  # ──────────────────────────────────────────────────────────────────
  # Cycle 11 — L2.J archive-worker + L2.K retention-worker
  # ──────────────────────────────────────────────────────────────────

  - name: lw_archive_partitions_archived_total
    kind: counter
    layer: L2
    shipped_cycle: 11
    labels: [outcome]
    description: 'archive-worker partition-archive outcomes; outcome ∈ {ok, upload_failed, verify_failed, drop_failed}; counts iterations not partitions'
    owner: world-platform
    source: services/archive-worker (pkg/archive_loop)

  - name: lw_archive_bytes_uploaded_total
    kind: counter
    layer: L2
    shipped_cycle: 11
    labels: []
    description: 'cumulative bytes uploaded to lw-event-archive bucket (post-ZSTD compression); used to track cold-tier storage growth'
    owner: world-platform
    source: services/archive-worker (pkg/archive_loop)

  - name: lw_archive_rows_archived_total
    kind: counter
    layer: L2
    shipped_cycle: 11
    labels: []
    description: 'cumulative event rows archived (sum of archive_state.row_count); cross-checked vs partition row counts pre-DROP'
    owner: world-platform
    source: services/archive-worker (pkg/archive_loop)

  - name: lw_archive_lag_hours
    kind: gauge
    layer: L2
    shipped_cycle: 11
    labels: [reality_id]
    description: 'now() - max(archive_state.archived_at) per reality; alert when > stale_alert_threshold (72h per archive-worker-cron.yaml)'
    owner: sre
    source: services/archive-worker
    cardinality_notes: 'reality_id — bounded by V1=100 / V1+30d=1000 realities; folded into per-reality budget'

  - name: lw_retention_outbox_pruned_total
    kind: counter
    layer: L2
    shipped_cycle: 11
    labels: []
    description: 'cumulative events_outbox rows DELETEd by retention-worker (addresses D-OUTBOX-PRUNE row 055). NEVER includes dead-letter rows.'
    owner: world-platform
    source: services/retention-worker (pkg/outbox_pruner)

  - name: lw_retention_audit_invocations_total
    kind: counter
    layer: L2
    shipped_cycle: 11
    labels: [outcome]
    description: 'retention-worker audit-script invocations; outcome ∈ {ok, error}; one per per-reality scheduling tick'
    owner: world-platform
    source: services/retention-worker (pkg/audit_invoker)

  # ────────────────────────────────────────────────────────────────────
  # L3.K — Drift detection metadata (cycle 13)
  # ────────────────────────────────────────────────────────────────────
  - name: lw_projection_drift_count
    kind: gauge
    layer: L3
    shipped_cycle: 13
    labels: [reality_id, table]
    description: 'per-projection-table drift count from last L3.E/F integrity sweep (= projection_drift_state.drift_count). 0 = healthy. Cycle 13 ships skeleton populator (scripts/projection-drift-check.sh) that always emits 0; cycle 14 L3.E integrity-checker writes real values from sample re-replay.'
    owner: world-platform
    source: services/integrity-checker (cycle 14) — placeholder script in cycle 13 (scripts/projection-drift-check.sh)
    cardinality_notes: 'table — bounded by 10 (L3.A allowlist enforced by projection_drift_table_name_allowlist CHECK in 0007_drift_metadata.up.sql). reality_id — bounded by per-reality budget. Total = 10 × N realities ≤ 10K series at V1+30d.'

  - name: lw_projection_drift_last_check_age_seconds
    kind: gauge
    layer: L3
    shipped_cycle: 13
    labels: [reality_id, table]
    description: 'now() - projection_drift_state.last_verified_at per (reality, table). Backs L3.J stale-verification alert (fire at > 7d per L3.K acceptance). NULL last_verified_at surfaces as -1 sentinel; downstream alert treats negative as STALE_NEVER.'
    owner: world-platform
    source: services/integrity-checker (cycle 14) — backed by projection_drift_state SELECT in cycle 13 cron skeleton
    cardinality_notes: 'identical bounds to lw_projection_drift_count'

  # ────────────────────────────────────────────────────────────────────
  # L3.J — Projection lag + check observability (cycle 15)
  # ────────────────────────────────────────────────────────────────────
  - name: lw_projection_lag_seconds
    kind: gauge
    layer: L3
    shipped_cycle: 15
    labels: [reality_id, table]
    description: 'wall-clock lag = NOW() - max(projection.applied_at) per (reality, table). Backs the LWProjectionLagWarning (60s) + LWProjectionLagCritical (300s) alerts in infra/prometheus/alerts/projection.yaml. Distinct from lw_projection_drift_last_check_age_seconds (cycle 13) — THIS metric measures publisher→projection latency; that one measures integrity-checker freshness.'
    owner: world-platform
    source: services/integrity-checker (pkg/metrics MetricProjectionLagSeconds)
    cardinality_notes: 'table — bounded by 10 (L3.A allowlist enforced by sampler+state_writer). reality_id — bounded by per-reality budget. Identical bounds to lw_projection_drift_count.'

  - name: lw_projection_check_duration_seconds
    kind: histogram
    layer: L3
    shipped_cycle: 15
    labels: [mode, table]
    description: 'wall-time of one (reality, table, mode) integrity-checker run. mode ∈ {daily, monthly}. Daily P99 expected < 30s per table; monthly P99 expected < 1h for 10K-aggregate reality (per L3.F acceptance). SRE uses this to spot a runaway full-scan early (e.g. 6h on a 1K-row table = bug).'
    owner: world-platform
    source: services/integrity-checker (pkg/metrics MetricProjectionCheckDurationSeconds)
    cardinality_notes: 'mode ∈ {daily, monthly} (bounded 2). table — bounded by 10 (L3.A allowlist). 2 × 10 = 20 series total (NOT multiplied by reality_id — duration is per (mode, table) aggregate; reality breakdown lives on the drift/lag gauges).'

  - name: lw_projection_check_runs_total
    kind: counter
    layer: L3
    shipped_cycle: 15
    labels: [mode, outcome]
    description: 'integrity-checker run counts. mode ∈ {daily, monthly}; outcome ∈ {ok, error}. error path includes loader failures, fetch failures, cursor stuck, ctx-cancelled mid-scan. Counts ALL across realities — per-reality breakdown lives on the drift/lag gauges.'
    owner: world-platform
    source: services/integrity-checker (pkg/metrics MetricProjectionCheckRunsTotal)
    cardinality_notes: 'mode × outcome = 4 series total. Fixed cardinality (no reality_id, no table).'

# ────────────────────────────────────────────────────────────────────
# CARDINALITY BUDGET (V1)
# ────────────────────────────────────────────────────────────────────
# Per-reality metrics: 7 (size + numbackends + xact_commit + xact_rollback +
#                       tup_returned + tup_inserted + tup_updated)
# Per-reality budget: 7 × N realities × ~5 shard_host distinct = 7N series
# (shard_host is 1:1 with N, so the multiplicative factor reduces to ~1.)
#
# At V1 = 100 realities ⇒ 700 series. At V1+30d = 1000 realities ⇒ 7000.
# At V3 = 10K realities ⇒ 70K series — still well below 1M (the typical
# Prometheus single-instance practical ceiling).
#
# tests/integration/metrics_cardinality_test.go injects 100 realities
# and asserts series count ≤ 7 × 100 = 700.

cardinality_budget:
  per_reality_metric_count: 7
  v1_realities: 100
  v1_target_series: 700
  v1_plus_30d_realities: 1000
  v1_plus_30d_target_series: 7000
  v3_realities: 10000
  v3_target_series: 70000
