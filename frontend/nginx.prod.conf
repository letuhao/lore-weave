server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100m;

    location /ws {
        access_log off;
        proxy_pass http://api-gateway-bff:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location = /v1/notifications/stream {
        access_log off;
        proxy_pass http://api-gateway-bff:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location ~ ^/v1/books/[^/]+/media/object$ {
        access_log off;
        proxy_pass http://api-gateway-bff:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~* \.mjs$ {
        types { } default_type application/javascript;
    }
    location ~* \.wasm$ {
        types { } default_type application/wasm;
    }

    location /health {
        proxy_pass http://api-gateway-bff:3000/health;
        proxy_set_header Host $host;
    }

    location /v1/ {
        proxy_pass http://api-gateway-bff:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Prod: no anonymous MinIO bucket proxy — media via authenticated API routes.

    location /languagetool/ {
        proxy_pass http://languagetool:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
