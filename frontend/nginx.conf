server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # MIME types for ONNX/WASM files (VAD, AI models)
    location ~* \.mjs$ {
        add_header Content-Type application/javascript;
    }
    location ~* \.wasm$ {
        add_header Content-Type application/wasm;
    }

    # Proxy WebSocket connections to the api-gateway-bff
    location /ws {
        proxy_pass http://api-gateway-bff:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy API calls to the api-gateway-bff
    location /v1/ {
        proxy_pass http://api-gateway-bff:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy grammar check to LanguageTool
    location /languagetool/ {
        proxy_pass http://languagetool:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
