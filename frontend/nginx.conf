server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # nginx defaults to 1m; book-service accepts uploads up to 200MB
    # (maxImportSize/maxPdfPeekSize) — without this, any PDF/manuscript
    # import over 1MB 413s here before ever reaching the gateway.
    client_max_body_size 200M;

    # MIME types for ONNX/WASM files (VAD, AI models)
    location ~* \.mjs$ {
        types { } default_type application/javascript;
    }
    location ~* \.wasm$ {
        types { } default_type application/wasm;
    }

    # Proxy WebSocket connections to the api-gateway-bff
    location /ws {
        proxy_pass http://api-gateway-bff:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Proxy API calls to the api-gateway-bff
    location /v1/ {
        proxy_pass http://api-gateway-bff:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy public MCP (external-agent entry) to the api-gateway-bff, which
    # forwards /mcp on to mcp-public-gateway internally. Without this block,
    # /mcp falls through to the SPA fallback below and 404s as index.html —
    # the single-port deployment (ngrok, etc.) can't reach MCP otherwise.
    location /mcp {
        proxy_pass http://api-gateway-bff:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # Proxy grammar check to LanguageTool
    location /languagetool/ {
        proxy_pass http://languagetool:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # Proxy browser-accessible MinIO object downloads (book covers, TTS/video
    # output, chat attachments) so a single-port deployment (e.g. ngrok) doesn't
    # need to expose MinIO's own port. Host header MUST pass through unchanged:
    # chat-service signs GET URLs with SigV4 against MINIO_EXTERNAL_URL's host,
    # and MinIO revalidates that signature against the Host it receives here.
    location /media/ {
        proxy_pass http://minio:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
