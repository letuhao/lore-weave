server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 100m;

    # Do not log JWT query params on WS / SSE (SEC-06)
    location /ws {
        access_log off;
        proxy_pass http://api-gateway-bff:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    location = /v1/notifications/stream {
        access_log off;
        proxy_pass http://api-gateway-bff:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 3600s;
        proxy_buffering off;
    }

    location ~ ^/v1/books/[^/]+/media/object$ {
        access_log off;
        proxy_pass http://api-gateway-bff:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # MIME types for ONNX/WASM files (VAD, AI models)
    location ~* \.mjs$ {
        types { } default_type application/javascript;
    }
    location ~* \.wasm$ {
        types { } default_type application/wasm;
    }

    # Proxy WebSocket connections to the api-gateway-bff (see /ws block above)
    # Proxy API calls to the api-gateway-bff
    location /health {
        proxy_pass http://api-gateway-bff:3000/health;
        proxy_set_header Host $host;
    }

    # Proxy API calls to the api-gateway-bff
    location /v1/ {
        proxy_pass http://api-gateway-bff:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 300s;
    }

    # MinIO path-style buckets — same-origin media (covers, audio, chat outputs).
    # MINIO_EXTERNAL_URL must match the browser-visible origin (PUBLIC_APP_URL).
    location ~ ^/(loreweave-dev-books|lw-chat|lore-enrichment-uploads|loreweave-audio-cache)/ {
        proxy_pass http://minio:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy grammar check to LanguageTool
    location /languagetool/ {
        proxy_pass http://languagetool:8010/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    # SPA fallback — serve index.html for all non-file routes
    location / {
        try_files $uri $uri/ /index.html;
    }
}
