# infra/docker-compose.meta-ha.yml
#
# L1.E + Q-L1B-5 — Foundation V1 dev-stack for meta-HA testing.
# Cycle 1 of foundation-mega-task.
#
# Per OPEN_QUESTIONS_LOCKED.md Q-L1B-5:
#   "Foundation ships `docker-compose.meta-ha.yml` with Patroni + etcd +
#    1 sync + 1 async"
#
# This is the V1 staging substitute for the AWS Terraform (infra/terraform/
# meta-postgres/*.tf, infra/etcd/etcd-cluster.tf) which targets V1+30d prod.
# Local dev + CI + L1.E.12 integration test all run against THIS stack.
#
# Stack:
#   - 1 etcd node (Patroni DCS — V1 single-node etcd; 3-node ships with
#     Terraform for prod V1+30d per Q-L1E-2)
#   - 1 primary Postgres + Patroni
#   - 1 sync replica + Patroni  (synchronous_standby_names = 'ANY 1 (sync_replica_a)')
#   - 1 async replica + Patroni  (nofailover, nosync tags)
#   - 1 MinIO node for WAL archive bucket lw-meta-wal-archive
#
# Usage:
#   docker compose -f infra/docker-compose.meta-ha.yml up -d
#   docker compose -f infra/docker-compose.meta-ha.yml down -v
#
# Ports (host:container):
#   etcd:     12379 (client) / 12380 (peer)
#   primary:  15432 (Postgres)  / 18008 (Patroni REST)
#   sync:     15433             / 18009
#   async:    15434             / 18010
#   minio:    19000 (API)       / 19001 (console)

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.13
    container_name: lw-meta-etcd
    command:
      - /usr/local/bin/etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-advertise-peer-urls=http://etcd:2380
      - --initial-cluster=etcd0=http://etcd:2380
      - --initial-cluster-state=new
      - --initial-cluster-token=lw-meta-etcd-cluster-1
    ports:
      - "127.0.0.1:12379:2379"
      - "127.0.0.1:12380:2380"
    tmpfs:
      - /etcd-data
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lw-meta

  minio:
    image: minio/minio:RELEASE.2024-08-17T01-24-54Z
    container_name: lw-meta-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    ports:
      - "127.0.0.1:19000:9000"
      - "127.0.0.1:19001:9001"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - lw-meta

  minio-bootstrap:
    image: minio/mc:RELEASE.2024-08-17T11-33-50Z
    container_name: lw-meta-minio-bootstrap
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
        mc mb --ignore-existing local/lw-meta-wal-archive;
        mc mb --ignore-existing local/lw-db-backups;
        echo 'buckets ready';
      "
    networks:
      - lw-meta

  primary:
    image: ghcr.io/zalando/spilo-16:3.3-p1     # Patroni-bundled Postgres image
    container_name: lw-meta-pg-primary
    depends_on:
      etcd:
        condition: service_healthy
      minio-bootstrap:
        condition: service_completed_successfully
    environment:
      ETCD3_HOSTS: etcd:2379
      SCOPE: lw-meta-pg
      PATRONI_NAME: primary
      PATRONI_REST_CONNECT_ADDRESS: primary:8008
      PATRONI_POSTGRES_CONNECT_ADDRESS: primary:5432
      PATRONI_NOFAILOVER: "false"
      PATRONI_NOSYNC: "false"
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD:-postgres}
      PATRONI_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD:-replicator}
      PATRONI_REST_PASSWORD: ${PATRONI_REST_PASSWORD:-admin}
      PATRONI_ETCD_PASSWORD: ${PATRONI_ETCD_PASSWORD:-}
      WAL_ARCHIVE_BUCKET: lw-meta-wal-archive
      WAL_ARCHIVE_ENDPOINT: http://minio:9000
      WAL_ARCHIVE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      WAL_ARCHIVE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./patroni/patroni.yml:/etc/patroni/patroni.yml:ro
      - ./postgres/postgresql.conf:/etc/postgres/postgresql.conf:ro
      - ./wal-archive/lw-wal-ship.sh:/usr/local/bin/lw-wal-ship.sh:ro
    ports:
      - "127.0.0.1:15432:5432"
      - "127.0.0.1:18008:8008"
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - lw-meta

  sync_replica_a:
    image: ghcr.io/zalando/spilo-16:3.3-p1
    container_name: lw-meta-pg-sync-a
    depends_on:
      primary:
        condition: service_started
    environment:
      ETCD3_HOSTS: etcd:2379
      SCOPE: lw-meta-pg
      PATRONI_NAME: sync_replica_a
      PATRONI_REST_CONNECT_ADDRESS: sync_replica_a:8008
      PATRONI_POSTGRES_CONNECT_ADDRESS: sync_replica_a:5432
      PATRONI_NOFAILOVER: "false"
      PATRONI_NOSYNC: "false"
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD:-postgres}
      PATRONI_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD:-replicator}
      PATRONI_REST_PASSWORD: ${PATRONI_REST_PASSWORD:-admin}
      PATRONI_ETCD_PASSWORD: ${PATRONI_ETCD_PASSWORD:-}
      WAL_ARCHIVE_BUCKET: lw-meta-wal-archive
      WAL_ARCHIVE_ENDPOINT: http://minio:9000
      WAL_ARCHIVE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      WAL_ARCHIVE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./patroni/patroni.yml:/etc/patroni/patroni.yml:ro
      - ./postgres/postgresql.conf:/etc/postgres/postgresql.conf:ro
      - ./wal-archive/lw-wal-ship.sh:/usr/local/bin/lw-wal-ship.sh:ro
    ports:
      - "127.0.0.1:15433:5432"
      - "127.0.0.1:18009:8008"
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - lw-meta

  async_replica_0:
    image: ghcr.io/zalando/spilo-16:3.3-p1
    container_name: lw-meta-pg-async-0
    depends_on:
      primary:
        condition: service_started
    environment:
      ETCD3_HOSTS: etcd:2379
      SCOPE: lw-meta-pg
      PATRONI_NAME: async_replica_0
      PATRONI_REST_CONNECT_ADDRESS: async_replica_0:8008
      PATRONI_POSTGRES_CONNECT_ADDRESS: async_replica_0:5432
      PATRONI_NOFAILOVER: "true"          # async NEVER promotes
      PATRONI_NOSYNC: "true"              # async excluded from sync set
      PATRONI_SUPERUSER_PASSWORD: ${PATRONI_SUPERUSER_PASSWORD:-postgres}
      PATRONI_REPLICATION_PASSWORD: ${PATRONI_REPLICATION_PASSWORD:-replicator}
      PATRONI_REST_PASSWORD: ${PATRONI_REST_PASSWORD:-admin}
      PATRONI_ETCD_PASSWORD: ${PATRONI_ETCD_PASSWORD:-}
      WAL_ARCHIVE_BUCKET: lw-meta-wal-archive
      WAL_ARCHIVE_ENDPOINT: http://minio:9000
      WAL_ARCHIVE_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      WAL_ARCHIVE_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - ./patroni/patroni.yml:/etc/patroni/patroni.yml:ro
      - ./postgres/postgresql.conf:/etc/postgres/postgresql.conf:ro
      - ./wal-archive/lw-wal-ship.sh:/usr/local/bin/lw-wal-ship.sh:ro
    ports:
      - "127.0.0.1:15434:5432"
      - "127.0.0.1:18010:8008"
    tmpfs:
      - /var/lib/postgresql/data
    networks:
      - lw-meta

networks:
  lw-meta:
    name: lw-meta-ha
    driver: bridge
