# infra/alertmanager/inhibition_rules.yaml — L7.J.3 (RAID cycle 34)
#
# Inhibition rules prevent the alert storm during major incidents.
# See SR2 §12AE.4 + cycle 19 L4.P alert envelope discipline.
#
# Authoritative source. main.yaml inlines a copy at start so amtool
# check-config can validate; any divergence between this file and
# main.yaml::inhibit_rules is a CI fail (verify-cycle-34.sh enforces).

version: 1
shipped_cycle: 34

rules:
  # ─────────────────────────────────────────────────────────────────
  # 1. SEV0 → suppresses SEV1 of the same SLI
  #
  # During an SLO breach (≥ 100% burn), the FREEZE alert (sev=1) of the
  # same SLI is informational — operators are already paged on sev0.
  # Suppressing sev1 avoids the noise of "freeze active" appearing in
  # PagerDuty as a separate page.
  # ─────────────────────────────────────────────────────────────────
  - name: sev0_suppresses_sev1_same_sli
    source_match:
      sev: '0'
    target_match:
      sev: '1'
    equal: ['sli_ref', 'tier']
    rationale: |
      Once a tier's SLO is breached, the freeze alert for the same
      (sli, tier) tuple carries no new information. Pager noise during
      sev0 = bad. Cycle 19 L4.P envelope says: "during a sev0,
      downstream alerts of the SAME root cause MUST inhibit."

  # ─────────────────────────────────────────────────────────────────
  # 2. SEV0 → suppresses warn-severity of the same SLI
  # ─────────────────────────────────────────────────────────────────
  - name: sev0_suppresses_warn_same_sli
    source_match:
      sev: '0'
    target_match:
      severity: warn
    equal: ['sli_ref', 'tier']
    rationale: |
      Warn-tier alerts (50-75% burn) for the same (sli, tier) are
      definitionally subsumed by the breach. Suppress.

  # ─────────────────────────────────────────────────────────────────
  # 3. SEV1 → suppresses warn-severity of the same SLI
  # ─────────────────────────────────────────────────────────────────
  - name: sev1_suppresses_warn_same_sli
    source_match:
      sev: '1'
    target_match:
      severity: warn
    equal: ['sli_ref', 'tier']
    rationale: |
      Same reasoning as rule #1 — during a freeze, warn alerts on the
      same (sli, tier) are noise.

  # ─────────────────────────────────────────────────────────────────
  # 4. Service-down → suppresses SLO burn for the same service
  #
  # Per SR2 §12AE.4 fallback chain — if the underlying service is
  # completely down, the SLO burn alert is downstream noise. Operator
  # needs to see the service-down page first.
  # ─────────────────────────────────────────────────────────────────
  - name: service_down_suppresses_slo_burn
    source_match_re:
      alertname: '^LW.*ServiceDown$'
    target_match_re:
      alertname: '^LWSLOBurn.*$'
    equal: ['service']
    rationale: |
      During a full service outage we don't need to page about SLO burn
      driven by that outage. Service-down alert is the root-cause page;
      SLO burn re-fires automatically post-recovery if the budget remains
      consumed.

# ────────────────────────────────────────────────────────────────────
# Drift guards (verify-cycle-34.sh)
# ────────────────────────────────────────────────────────────────────
expected_rule_count: 4
references:
  - 'SR2 §12AE.4 — alert routing matrix'
  - 'Cycle 19 L4.P — alert envelope discipline'
  - 'L7.J.3 layer plan artifact'
