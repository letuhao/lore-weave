      REDIS_URL: redis://redis:6379
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      AUTH_SERVICE_INTERNAL_URL: http://auth-service:8081
      REFRESH_INTERVAL: "600"
      # Phase 6c — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      book-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8214:8089"

  notification-service:
    # Phase 6c — repo-root build context so the Dockerfile can COPY
    # sdks/go/observability for the go.mod replace directive.
    build:
      context: ..
      dockerfile: services/notification-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_ADDR: ":8091"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_notification?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # Phase 2d — consume async LLM job terminal events from
      # `loreweave.events` topic and persist as notifications rows.
      # Empty/unset disables the consumer (REST API stays usable).
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      # Phase 6c — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8215:8091"

  api-gateway-bff:
    build:
      context: ../services/api-gateway-bff
      dockerfile: Dockerfile
      labels: *build-labels
    environment:
      PORT: "3000"
      AUTH_SERVICE_URL: http://auth-service:8081
      BOOK_SERVICE_URL: http://book-service:8082
      SHARING_SERVICE_URL: http://sharing-service:8083
      CATALOG_SERVICE_URL: http://catalog-service:8084
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      TRANSLATION_SERVICE_URL: http://translation-service:8087
      GLOSSARY_SERVICE_URL: http://glossary-service:8088
      CHAT_SERVICE_URL: http://chat-service:8090
      VIDEO_GEN_SERVICE_URL: http://video-gen-service:8088
      STATISTICS_SERVICE_URL: http://statistics-service:8089
      NOTIFICATION_SERVICE_URL: http://notification-service:8091
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      # Auto-Draft Factory S1 — campaign saga API (/v1/campaigns).
      CAMPAIGN_SERVICE_URL: http://campaign-service:8095
      LORE_ENRICHMENT_SERVICE_URL: http://lore-enrichment-service:8093
      LEARNING_SERVICE_URL: http://learning-service:8094
      # LOOM M7 — composition-service (co-writer). Same in-cluster pattern.
      COMPOSITION_SERVICE_URL: http://composition-service:8093
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # Phase 6c-γ — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      auth-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
      sharing-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy
      usage-billing-service:
        condition: service_healthy
      translation-service:
        condition: service_healthy
      glossary-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      statistics-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
      campaign-service:
        # Auto-Draft Factory S1 — start-ordering only (not a hard gate): the
        # gateway must not wedge the stack if the saga orchestrator is unhealthy.
        condition: service_started
      lore-enrichment-service:
        # C0 skeleton — start-ordering only, NOT a hard health gate: the gateway
        # must not wedge the whole stack if this nascent service is unhealthy
        # (adversary r2 BLOCK#1). Upgrade to service_healthy once it carries real
        # routes (post-C3).
        condition: service_started
      learning-service:
        # Phase B — start-ordering only (not a hard gate): the correction read
        # API is non-critical, so a learning-service hiccup must not wedge the
        # gateway/whole stack. Mirrors the lore-enrichment posture.
        condition: service_started
      composition-service:
        # LOOM M7 — start-ordering only (not a hard gate): a composition hiccup
        # must not wedge the gateway; the compositionProxy 503-on-down handler
        # degrades gracefully. Mirrors the learning/lore-enrichment posture.
        condition: service_started
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "3123:3000"

  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: Dockerfile
  #     args:
  #       VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3123}
  #   depends_on:
  #     - api-gateway-bff
