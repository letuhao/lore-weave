# Full stack: Postgres, Mailhog, auth-service, api-gateway-bff, frontend (nginx static build).
# From this directory: docker compose up --build
# Browser: http://localhost:5174  |  Gateway: http://localhost:3123  |  Auth: http://localhost:8204
# Optional env file: copy .env.example to .env and set JWT_SECRET (>= 32 chars) for production-like secrets.

# Stale-image guard (F-LIVE-1): every first-party build target stamps the git SHA +
# build time as image labels so scripts/check_stack_freshness.py can detect a running
# container that is behind HEAD. Set via scripts/build-stack.sh (exports GIT_SHA +
# BUILD_TIME before `docker compose build`); a plain build leaves them 'unknown' and
# the guard falls back to its timestamp proxy.
x-build-labels: &build-labels
  org.loreweave.git_sha: "${GIT_SHA:-unknown}"
  org.loreweave.build_time: "${BUILD_TIME:-unknown}"

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: loreweave
      POSTGRES_PASSWORD: loreweave_dev
      POSTGRES_DB: loreweave_auth
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5555:5432"
    volumes:
      - loreweave_pg:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - ./db-ensure.sh:/usr/local/bin/db-ensure.sh:ro
    healthcheck:
      # Healthcheck creates missing databases on EVERY start, then verifies readiness.
      # This replaces the old postgres-db-bootstrap container.
      test: ["CMD-SHELL", "sh /usr/local/bin/db-ensure.sh && pg_isready -U loreweave -d loreweave_auth"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 10s

  redis:
    image: valkey/valkey:8-alpine
    ports:
      - "6399:6379"
    volumes:
      - loreweave_redis:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: loreweave
      MINIO_ROOT_PASSWORD: loreweave_dev_minio_secret
    ports:
      - "9123:9000"
      - "9124:9001"
    volumes:
      - loreweave_minio:/data

  # Mock audio service (TTS/STT) — optional, activate with: docker compose --profile audio up
  mock-audio-service:
    build:
      context: ../infra/mock-audio-service
      dockerfile: Dockerfile
      labels: *build-labels
    ports:
      - "8600:8600"
    profiles:
      - audio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8600/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1148:1025"
      - "8148:8025"

  auth-service:
    # Phase 6c — repo-root build context so the Dockerfile can COPY
    # sdks/go/observability for the go.mod replace directive.
    build:
      context: ..
      dockerfile: services/auth-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_ADDR: ":8081"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_auth?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      ACCESS_TOKEN_TTL_SECONDS: "7200"
      REFRESH_TOKEN_TTL_SECONDS: "2592000"
      DEV_LOG_EMAIL_TOKENS: "1"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: "LoreWeave <noreply@loreweave.local>"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5174}
      NOTIFICATION_SERVICE_INTERNAL_URL: http://notification-service:8091
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # WS-1.0 (PO-2) — the deployment KEK that WRAPS each user's DEK. auth-service stores
      # only the wrapped blob; consumers unwrap with the SAME key from their own env, so
      # the plaintext key never crosses the network.
      #
      # ⚠️ PRODUCTION: this MUST come from a KMS/secret manager, never a compose default.
      # Losing it makes every diary unrecoverable; leaking it plus a DB dump undoes the
      # whole scheme. The dev default exists so the local stack boots — it is not a secret.
      # Rotating it? Put the OLD value in DIARY_ENCRYPTION_KEYS_RETIRED or you will orphan
      # every existing user's key.
      DIARY_ENCRYPTION_KEY: ${DIARY_ENCRYPTION_KEY:-loreweave_local_dev_diary_kek_change_me}
      DIARY_ENCRYPTION_KEYS_RETIRED: ${DIARY_ENCRYPTION_KEYS_RETIRED:-}
      # Q-GATE (public MCP): gate mcp_api_keys creation behind this flag (kill-switch).
      PUBLIC_MCP_ENABLED: ${PUBLIC_MCP_ENABLED:-false}
      # D-PMCP-SELFCONFIRM-ROUTES — Tier-W confirm replay (self-confirm + human-approve)
      # POSTs {URL}/v1/<domain>/actions/confirm with the internal token. Absent vars
      # leave that domain non-executable (AUTH_CONFIRM_DOMAIN_UNROUTABLE). See
      # config.go:loadDomainConfirmURLs — domain key → owning service base URL.
      BOOK_SERVICE_URL: http://book-service:8082
      COMPOSITION_SERVICE_URL: http://composition-service:8093
      TRANSLATION_SERVICE_URL: http://translation-service:8087
      GLOSSARY_SERVICE_URL: http://glossary-service:8088
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      # Phase 6c — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Admin-JWT issuance (admin CMS / D-GKA-SYSTEM-TIER-ADMIN). Disabled unless a
      # signing key is provided. DEV/self-hosted: set ADMIN_JWT_LOCAL_PRIVATE_KEY_PEM
      # (a base64-or-PEM RSA private key — see infra/gen-admin-dev-keys.ps1); PROD:
      # set KMS_ADMIN_SIGNING_KEY_ID instead (key never leaves KMS). The issuer/audit
      # secrets are dev defaults, only used when issuance is enabled.
      ADMIN_JWT_LOCAL_PRIVATE_KEY_PEM: ${ADMIN_JWT_LOCAL_PRIVATE_KEY_PEM:-}
      KMS_ADMIN_SIGNING_KEY_ID: ${KMS_ADMIN_SIGNING_KEY_ID:-}
      ADMIN_TOKEN_ISSUER_SECRET: ${ADMIN_TOKEN_ISSUER_SECRET:-dev_admin_issuer_secret_distinct_32chars!}
      ADMIN_AUDIT_HMAC_KEY: ${ADMIN_AUDIT_HMAC_KEY:-dev_admin_audit_hmac_key_at_least_32chars}
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8204:8081"

  book-service:
    # Phase 5e-β.1 — repo-root build context so the Go SDK at
    # sdks/go/llmgw is reachable for the go.mod replace directive.
    build:
      context: ..
      dockerfile: services/book-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_ADDR: ":8082"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_book?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      # MCP fan-out /review-impl — dedicated confirm-token signing secret (split
      # from JWT_SECRET so the Tier-W confirm HMAC key has a distinct blast radius).
      CONFIRM_TOKEN_SIGNING_SECRET: ${CONFIRM_TOKEN_SIGNING_SECRET:-loreweave_local_dev_confirm_signing_secret_change_me_32chars}
      BOOKS_STORAGE_BUCKET: loreweave-dev-books
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: loreweave
      MINIO_SECRET_KEY: loreweave_dev_minio_secret
      MINIO_USE_SSL: "false"
      MINIO_EXTERNAL_URL: ${MINIO_EXTERNAL_URL:-http://localhost:9123}
      SHARING_INTERNAL_URL: http://sharing-service:8083
      # Phase 5e-β.2 — PROVIDER_REGISTRY_SERVICE_URL dropped (audio.go was
      # its last consumer; now migrated to use llmgw SDK via LLM_GATEWAY_INTERNAL_URL).
      LLM_GATEWAY_INTERNAL_URL: http://provider-registry-service:8085
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      AUTH_SERVICE_INTERNAL_URL: http://auth-service:8081
      # C5 / SD-C5 (P-12) — diary encryption-at-rest. MUST be the SAME value as auth-service's
      # DIARY_ENCRYPTION_KEY: auth WRAPS each per-user DEK under this KEK, book-service UNWRAPS with
      # it. A dedicated key (never JWT_SECRET). Rotating? Add the OLD value to
      # DIARY_ENCRYPTION_KEYS_RETIRED on EVERY service at once or you orphan diaries.
      DIARY_ENCRYPTION_KEY: ${DIARY_ENCRYPTION_KEY:-loreweave_local_dev_diary_kek_change_me}
      DIARY_ENCRYPTION_KEYS_RETIRED: ${DIARY_ENCRYPTION_KEYS_RETIRED:-}
      # Phase 6c — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8205:8082"

  composition-service:
    # LOOM Composition V0 — lore-grounded co-writer. Repo-root build context
    # so the Dockerfile can COPY sdks/python (loreweave_obs/llm/eval).
    build:
      context: ..
      dockerfile: services/composition-service/Dockerfile
      labels: *build-labels
    environment:
      PORT: "8093"
      COMPOSITION_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_composition
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      # MCP fan-out /review-impl — dedicated confirm-token signing secret (split
      # from the envelope internal token so the Tier-W confirm HMAC key is distinct).
      CONFIRM_TOKEN_SIGNING_SECRET: ${CONFIRM_TOKEN_SIGNING_SECRET:-loreweave_local_dev_confirm_signing_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      REDIS_URL: redis://redis:6379
      # M4 decouple — the API enqueues batch ops only when this is on. MUST match
      # the composition-worker's flag (same env var): API on / worker off enqueues
      # jobs nothing consumes; API off (the bug this fixes — the var was never wired
      # to the service) silently runs every batch op inline + the worker idles.
      # Default TRUE (2026-06-28): the Tier-W motif jobs (mine / arc-import /
      # conformance, incl. the deep arc-conformance job) ALWAYS enqueue via the confirm
      # effect, so they only run if the worker consumes — a false default left them
      # pending forever. The batch endpoints (decompose/generate/stitch) become 202+poll
      # (the FE already polls GET /jobs/{id}).
      COMPOSITION_WORKER_ENABLED: ${COMPOSITION_WORKER_ENABLED:-true}
      # close-21-28 D-G5-DRIVE-EXEC — rules-mode propose auto-compiles its parsed arcs inline
      # (deterministic, $0, idempotent). Platform default ON (PO-decided 2026-07-16): rules mode is a
      # deterministic transcription with nothing to review between propose and compile, so structure_node>0
      # becomes a consequence of a governance-driven rules propose instead of a coin-flip on a weak agent
      # chaining a second plan_compile call (S06 DR-G5-REROLL). Set FALSE to restore a propose→review step.
      PLANFORGE_RULES_AUTOCOMPILE: ${PLANFORGE_RULES_AUTOCOMPILE:-true}
      # W5 motif-conformance — the per-scene producer (judge each generated scene vs
      # its bound motif) + the calibrated label. ENABLED 2026-06-28 (the W5 judge gate
      # is satisfied: kappa 1.0 / 0.762 ≥ thresholds). Single-local-judge, so the FE
      # still surfaces an advisory note; flip CALIBRATED off to fall back to 'unverified'.
      MOTIF_CONFORMANCE_ENABLED: ${MOTIF_CONFORMANCE_ENABLED:-true}
      MOTIF_CONFORMANCE_CALIBRATED: ${MOTIF_CONFORMANCE_CALIBRATED:-true}
      LOG_LEVEL: INFO
      # S2 — long-chapter state-compress threshold (chars of raw story-so-far
      # before the packer compresses the older portion). Default 6000; overridable.
      PACK_COMPRESS_RECENT_THRESHOLD_CHARS: ${PACK_COMPRESS_RECENT_THRESHOLD_CHARS:-6000}
      # Internal service URLs — consumed by the M3 client wrappers.
      KNOWLEDGE_INTERNAL_URL: http://knowledge-service:8092
      GLOSSARY_INTERNAL_URL: http://glossary-service:8088
      BOOK_INTERNAL_URL: http://book-service:8082
      LLM_GATEWAY_INTERNAL_URL: http://provider-registry-service:8085
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8093/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 5
    restart: unless-stopped
    ports:
      - "8217:8093"

  # LLM re-arch Phase 3 M4 — composition batch-job worker. Same image as
  # composition-service (CMD override → `python -m app.worker`), runs the
  # Redis-Streams composition_jobs consumer + stuck-job sweeper that drive the
  # decoupled batch ops (decompose / stitch / generate / chapter-gen). No HTTP
  # port. Flag-gated by COMPOSITION_WORKER_ENABLED (default false → idle), which
  # MUST match the API's flag: the API only enqueues 202 jobs when it's on.
  composition-worker:
    build:
      context: ..
      dockerfile: services/composition-service/Dockerfile
      labels: *build-labels
    command: ["python", "-m", "app.worker"]
    environment:
      COMPOSITION_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_composition
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      # MCP fan-out /review-impl — dedicated confirm-token signing secret (split
      # from the envelope internal token so the Tier-W confirm HMAC key is distinct).
      CONFIRM_TOKEN_SIGNING_SECRET: ${CONFIRM_TOKEN_SIGNING_SECRET:-loreweave_local_dev_confirm_signing_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
      # Must match composition-service (default TRUE 2026-06-28 — the Tier-W motif jobs
      # require a consuming worker; see the API block).
      COMPOSITION_WORKER_ENABLED: ${COMPOSITION_WORKER_ENABLED:-true}
      # W5 motif-conformance — mirror the API (the worker's conformance_run job +
      # any producer path reads these). ENABLED 2026-06-28 (gate satisfied).
      MOTIF_CONFORMANCE_ENABLED: ${MOTIF_CONFORMANCE_ENABLED:-true}
      MOTIF_CONFORMANCE_CALIBRATED: ${MOTIF_CONFORMANCE_CALIBRATED:-true}
      # Same internal service URLs as the API — the worker re-resolves pack context
      # (book/glossary/knowledge) + the internal-auth LLM for the compute half.
      KNOWLEDGE_INTERNAL_URL: http://knowledge-service:8092
      GLOSSARY_INTERNAL_URL: http://glossary-service:8088
      BOOK_INTERNAL_URL: http://book-service:8082
      LLM_GATEWAY_INTERNAL_URL: http://provider-registry-service:8085
      PACK_COMPRESS_RECENT_THRESHOLD_CHARS: ${PACK_COMPRESS_RECENT_THRESHOLD_CHARS:-6000}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  sharing-service:
    # Phase 6c — repo-root build context so the Dockerfile can COPY
    # sdks/go/observability for the go.mod replace directive.
    build:
      context: ..
      dockerfile: services/sharing-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_ADDR: ":8083"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_sharing?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # Phase 6c — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy

      book-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8206:8083"

  # WS-3.1 — the per-user scheduler (the platform's one true "time trigger" hole). Owns the clock;
  # claims due scheduled_agent_runs rows and posts eod_distill to the chat trigger (WS-3.2/WS-3.0).
  scheduler-service:
    build:
      context: ..
      dockerfile: services/scheduler-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_ADDR: ":8095"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_scheduler?sslmode=disable
      CHAT_SERVICE_INTERNAL_URL: http://chat:8090
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      SCHEDULER_TICK_INTERVAL: ${SCHEDULER_TICK_INTERVAL:-60s}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8095/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      # C7 — host 8213 collided with video-gen-service (which also mapped 8213); moved to a free port.
      - "8228:8095"

  catalog-service:
    # Phase 6c — repo-root build context so the Dockerfile can COPY
    # sdks/go/observability for the go.mod replace directive.
    build:
      context: ..
      dockerfile: services/catalog-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_ADDR: ":8084"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_catalog?sslmode=disable
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      SHARING_SERVICE_INTERNAL_URL: http://sharing-service:8083
      TRANSLATION_SERVICE_INTERNAL_URL: http://translation-service:8087
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # Phase 6c — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      book-service:
        condition: service_healthy
      sharing-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8207:8084"

  agent-registry-service:
    # Agent Extensibility Registry (docs/specs/2026-07-02-agent-extensibility-registry.md).
    # Repo-root build context so the Dockerfile can COPY sdks/go/observability
    # for the go.mod replace directive.
    build:
      context: ..
      dockerfile: services/agent-registry-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_ADDR: ":8099"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_agent_registry?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      ADMIN_JWT_PUBLIC_KEY_PEM: ${ADMIN_JWT_PUBLIC_KEY_PEM:-}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # DECISION-1 — dedicated AES-GCM vault key for MCP-server secrets (blast-radius
      # split from JWT_SECRET). Optional in dev (falls back to JWT_SECRET).
      AGENT_REGISTRY_VAULT_KEY: ${AGENT_REGISTRY_VAULT_KEY:-loreweave_local_dev_agent_registry_vault_key_change_me_32}
      # D-REG-BOOK-GRANT — book-service for E0 grant checks on book-tier writes.
      # Empty disables book-tier (they 501); set it to enable grant-gated book tier.
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      # REG-P3-01 — SSRF escape hatch. The P3 guard rejects user URLs that resolve
      # to internal/loopback/metadata (prod posture). In the dev stack we register
      # in-cluster MCP servers (agent-registry's own /mcp) to live-smoke the overlay/
      # scan/egress paths, so allow internal targets here. DEFAULT OFF (prod-safe).
      AGENT_REGISTRY_ALLOW_INTERNAL_MCP: ${AGENT_REGISTRY_ALLOW_INTERNAL_MCP:-1}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8099/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8230:8099"

  provider-registry-service:
    # Phase 6c — repo-root build context so the Dockerfile can COPY
    # sdks/go/observability for the go.mod replace directive.
    build:
      context: ..
      dockerfile: services/provider-registry-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_ADDR: ":8085"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_provider_registry?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      ADMIN_JWT_PUBLIC_KEY_PEM: ${ADMIN_JWT_PUBLIC_KEY_PEM:-}
      # MCP fan-out /review-impl — dedicated confirm-token signing secret (split
      # from JWT_SECRET so the Tier-W confirm HMAC key has a distinct blast radius).
      CONFIRM_TOKEN_SIGNING_SECRET: ${CONFIRM_TOKEN_SIGNING_SECRET:-loreweave_local_dev_confirm_signing_secret_change_me_32chars}
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # S-SETTINGS (MCP fan-out) — settings MCP server's profile tools call
      # auth-service's token-gated /internal/users/{id}/full-profile here (each
      # service owns its DB — no cross-service SQL). Optional; empty disables only
      # the two profile tools' backing call.
      AUTH_SERVICE_INTERNAL_URL: http://auth-service:8081
      # Phase 2c — async LLM job terminal events publish to
      # `loreweave.events` topic exchange. Empty/unset = NoopNotifier
      # (caller polls GET /v1/llm/jobs/{id}; no broker dependency).
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      # Phase 5e-β.2 — MinIO config for audio_gen URL-mode staging.
      # When unset, audio_gen URL mode disables (b64_json still works).
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: loreweave
      MINIO_SECRET_KEY: loreweave_dev_minio_secret
      MINIO_USE_SSL: "false"
      MINIO_EXTERNAL_URL: ${MINIO_EXTERNAL_URL:-http://localhost:9123}
      AUDIO_CACHE_BUCKET: loreweave-audio-cache
      # E5B rerank is now BYOK (D-RERANK-NOT-BYOK): /internal/rerank resolves the
      # user's rerank model from provider-registry like /internal/embed — no
      # platform RERANK_URL / RERANK_MODEL / RERANK_SERVICE_TOKEN config anymore.
      # Session-61 long-chapter perf fix — per-Read idle timeout on
      # streaming upstreams (see provider/streamer.go). Defense-in-depth
      # against LM Studio auto-evicting a loaded model mid-stream (the
      # sherlock_speckled_band stall: no `done`, no `err`, streamer
      # waits forever). 300s is generous — real models stream tokens
      # within seconds; 300s of upstream silence ≈ certainly dead.
      # Unset / "0" disables (preserves the historical no-timeout path).
      LLM_GATEWAY_STREAM_IDLE_TIMEOUT_S: ${LLM_GATEWAY_STREAM_IDLE_TIMEOUT_S:-300}
      # Phase 6a — spend-guardrail estimator tuning knobs. Optional;
      # code defaults apply when unset (token-count estimation, not
      # money limits). See LLM_PIPELINE_PHASE6A_DESIGN.md §3.6.
      MAX_OUTPUT_TOKENS_DEFAULT: ${MAX_OUTPUT_TOKENS_DEFAULT:-4096}
      EXTRACTION_OUTPUT_CEILING: ${EXTRACTION_OUTPUT_CEILING:-8192}
      SYSTEM_PROMPT_TOKEN_ESTIMATE: ${SYSTEM_PROMPT_TOKEN_ESTIMATE:-1024}
      # Phase 6b — transient-retry budget for a worker job. Optional; the
      # code default (3) applies when unset.
      JOB_MAX_RETRIES: ${JOB_MAX_RETRIES:-3}
      # S3a (G5) — per-provider concurrency governor + circuit-breaker on the
      # jobs-worker path. REDIS_URL enables it (unset = governance off). Tunables
      # have code defaults; set to override for the autonomous batch.
      REDIS_URL: redis://redis:6379
      GOVERNOR_CLOUD_MAX: ${GOVERNOR_CLOUD_MAX:-8}
      # LLM re-arch Phase 1 Commit 3 — the durable work queue is now the gate:
      # a job's per-kind semaphore (local→1) serialises BEFORE Process, so the
      # governor inside Process never sees >1 concurrent local call → no acquire
      # contention. With the queue ON the GOVERNOR_ACQUIRE_TIMEOUT_MS band-aid
      # (was 600000, the interim acquire-or-die mitigation) is REVERTED to the
      # 30s code default (D-REVERT-GOVERNOR-ACQUIRE-BANDAID) — overridable if ever
      # needed. The queue, not a long acquire wait, is what stops the cascade.
      LLM_JOB_QUEUE_ENABLED: ${LLM_JOB_QUEUE_ENABLED:-true}
      BREAKER_THRESHOLD: ${BREAKER_THRESHOLD:-5}
      BREAKER_COOLDOWN_S: ${BREAKER_COOLDOWN_S:-30}
      # S4b (decision C) — usage outbox relay → Redis streams (reuses REDIS_URL).
      # Streams: campaign-service (S4d) consumes :campaign_usage; usage-billing
      # (S4c) consumes :usage. MAXLEN bounds each (G8).
      USAGE_STREAM: ${USAGE_STREAM:-loreweave:events:usage}
      CAMPAIGN_USAGE_STREAM: ${CAMPAIGN_USAGE_STREAM:-loreweave:events:campaign_usage}
      USAGE_STREAM_MAXLEN: ${USAGE_STREAM_MAXLEN:-100000}
      CAMPAIGN_USAGE_STREAM_MAXLEN: ${CAMPAIGN_USAGE_STREAM_MAXLEN:-50000}
      # Phase 6c — OpenTelemetry trace export. Unset = no-op tracer (the
      # service still boots). Set it + bring up the `observability` profile
      # to wire tracing to the collector; see the otel-collector block.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      usage-billing-service:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8208:8085"

  usage-billing-service:
    # Phase 6c — repo-root build context so the Dockerfile can COPY
    # sdks/go/observability for the go.mod replace directive.
    build:
      context: ..
      dockerfile: services/usage-billing-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_ADDR: ":8086"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_usage_billing?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      ADMIN_JWT_PUBLIC_KEY_PEM: ${ADMIN_JWT_PUBLIC_KEY_PEM:-}
      # LLM payload encryption key (LOG-5 / P0-3) — DEDICATED, distinct from
      # JWT_SECRET, so rotating the JWT can't render logged prompts undecryptable
      # and a JWT leak doesn't expose them. >=32 chars; fail-to-start if unset or
      # equal to JWT_SECRET. Set a real value in prod (.env).
      LLM_PAYLOAD_ENCRYPTION_KEY: ${LLM_PAYLOAD_ENCRYPTION_KEY:-loreweave_local_dev_llm_payload_key_change_me_32c}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # Phase 6a — spend-guardrail default budgets (USD). REQUIRED — the
      # service fails to start if unset (no hardcoded literal, billing
      # ADR P5). Effectively-unlimited for the test/UAT environment.
      # CEILING: spend_guardrails/platform_balances columns are
      # numeric(16,8) — absolute value must be < 10^8, so 99_000_000 is
      # the largest round "unlimited" default that does not overflow the
      # seed INSERT. RESERVATION_TTL is the leaked-hold sweeper horizon;
      # the code default (45m) exceeds the longest job timeout.
      GUARDRAIL_DEFAULT_DAILY_USD: ${GUARDRAIL_DEFAULT_DAILY_USD:-99000000}
      GUARDRAIL_DEFAULT_MONTHLY_USD: ${GUARDRAIL_DEFAULT_MONTHLY_USD:-99000000}
      RESERVATION_TTL: ${RESERVATION_TTL:-45m}
      # Phase 6a-β — Subsystem B platform free-tier allowance (USD). REQUIRED
      # — the service fails to start if unset (no DDL default, billing ADR
      # P5). Generous for the test/UAT environment so it never gates.
      # Same numeric(16,8) ceiling as the guardrail budgets above.
      PLATFORM_FREE_TIER_USD: ${PLATFORM_FREE_TIER_USD:-99000000}
      # S4c — usage audit stream consumer. Consumes the S4b loreweave:events:usage
      # stream (provider-registry relay) → usage_logs audit. Unset REDIS_URL = no
      # consumer (the /record streaming path still works).
      REDIS_URL: redis://redis:6379
      USAGE_STREAM: ${USAGE_STREAM:-loreweave:events:usage}
      USAGE_CONSUMER_GROUP: ${USAGE_CONSUMER_GROUP:-usage-biller}
      # Phase 6c — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8209:8086"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: loreweave
      RABBITMQ_DEFAULT_PASS: loreweave_dev
    ports:
      - "5795:5672"
      - "15795:15672"
    volumes:
      - loreweave_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  translation-service:
    # Phase 4c-α: context bumped to repo root so the Dockerfile can
    # COPY sdks/python alongside the service code (mirrors knowledge-
    # service Phase 4a-α + worker-ai Phase 4b-γ pattern).
    build:
      context: ..
      dockerfile: services/translation-service/Dockerfile
      labels: *build-labels
    environment:
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_translation
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      # MCP fan-out /review-impl — dedicated confirm-token signing secret (split
      # from the envelope internal token so the Tier-W confirm HMAC key is distinct).
      CONFIRM_TOKEN_SIGNING_SECRET: ${CONFIRM_TOKEN_SIGNING_SECRET:-loreweave_local_dev_confirm_signing_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      # Phase 4c-α: SDK install. Same host as legacy URL but separate
      # env var for naming consistency with knowledge-service + worker-ai.
      PROVIDER_REGISTRY_INTERNAL_URL: http://provider-registry-service:8085
      GLOSSARY_SERVICE_INTERNAL_URL: http://glossary-service:8088
      # M4a: V3 knowledge layer (relations → pronoun/honorific). Empty disables it.
      KNOWLEDGE_SERVICE_INTERNAL_URL: http://knowledge-service:8092
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      NOTIFICATION_SERVICE_INTERNAL_URL: http://notification-service:8091
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # M5c: consume glossary change events (Redis Stream) to flag stale translations.
      REDIS_URL: redis://redis:6379
      # LLM re-arch Phase 2b: event-driven decouple of translation (v2 text/block +
      # V3 verify/correct + V3 cold-start). ON ⇒ this API runs the llm-terminal-resume
      # consumer + sweeper and the worker takes the submit-and-release branch.
      # Default ON (2026-06-12): review-cleared + live-smoked (block round-trip, V3
      # loop, stuck-resume sweeper). Set to false to revert to the synchronous path.
      TRANSLATION_DECOUPLE_ENABLED: ${TRANSLATION_DECOUPLE_ENABLED:-true}
      # P5 — fair scheduling. MUST match the worker's flag: in the decoupled path the
      # llm_terminal_consumer runs HERE (API container) and releases the chapter's WFQ
      # slot at finalize (_check_job_completion), so the per-owner cap only bounds
      # in-flight LLM concurrency when P5 is on in BOTH containers. (Same worker/API
      # coupling as TRANSLATION_DECOUPLE_ENABLED.) Default OFF.
      P5_SCHED_ENABLED: ${P5_SCHED_ENABLED:-true}
      P5_OWNER_CAP: ${P5_OWNER_CAP:-5}
      P5_GLOBAL_BUDGET: ${P5_GLOBAL_BUDGET:-0}
      # CACHE/M6 raw-output offload (D-RAWCACHE-MINIO-OFFLOAD): cold-archive the bulky
      # verbatim raw_response to MinIO. OPTIONAL — a blank MINIO_SECRET_KEY disables it,
      # so the service boots fine without object storage; set the secret to enable the sweep.
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-loreweave}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-loreweave_dev_minio_secret}
      MINIO_USE_SSL: ${MINIO_USE_SSL:-false}
      MINIO_BUCKET: ${TRANSLATION_RAW_BUCKET:-lw-extraction-raw}
      PORT: "8087"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      book-service:
        condition: service_healthy
      glossary-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8087/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8210:8087"

  campaign-service:
    # Auto-Draft Factory S1 — saga orchestrator + per-chapter projection.
    # Context = repo root so the Dockerfile can COPY sdks/python (loreweave_obs)
    # alongside the service code (same pattern as translation/knowledge).
    build:
      context: ..
      dockerfile: services/campaign-service/Dockerfile
      labels: *build-labels
    environment:
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_campaign
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      TRANSLATION_SERVICE_INTERNAL_URL: http://translation-service:8087
      KNOWLEDGE_SERVICE_INTERNAL_URL: http://knowledge-service:8092
      # Projection consumer reads the existing event spine (chapter/translation/
      # knowledge streams). Reconnect loop tolerates redis startup races, so
      # redis is NOT a hard depends_on (matches translation-service).
      REDIS_URL: redis://redis:6379
      PORT: "8095"
      # D-CAMPAIGN-BESTEFFORT-EMIT-REDIS — stuck-`dispatched` self-heal window.
      # Overridable for live-smokes (default 900s = 15 min).
      STUCK_DISPATCH_TIMEOUT_S: ${STUCK_DISPATCH_TIMEOUT_S:-900}
    depends_on:
      postgres:
        condition: service_healthy
      book-service:
        condition: service_healthy
      translation-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8223:8095"

  jobs-service:
    # Unified Job Control Plane P2 — central job projection + read API + SSE.
    # Consumes loreweave:events:jobs (outbox-relayed by worker-infra) into a
    # unified job_projection table; serves /v1/jobs (list/detail/SSE). Context =
    # repo root so the Dockerfile can COPY sdks/python (loreweave_jobs +
    # loreweave_obs). Makes NO provider calls; control routing (P3) is S2S only.
    build:
      context: ..
      dockerfile: services/jobs-service/Dockerfile
      labels: *build-labels
    environment:
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_jobs
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # Projection consumer reads loreweave:events:jobs. Reconnect loop tolerates
      # redis startup races, so redis is NOT a hard depends_on.
      REDIS_URL: redis://redis:6379
      PORT: "8096"
      # P5 — read-only fair-scheduling observability for the GUI ("N queued behind your
      # cap"). MUST mirror the owning services' P5_SCHED_ENABLED / P5_OWNER_CAP (the
      # fairness endpoint reads the same p5:* Redis keys those services write).
      P5_SCHED_ENABLED: ${P5_SCHED_ENABLED:-true}
      P5_OWNER_CAP: ${P5_OWNER_CAP:-5}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8096/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8224:8096"

  translation-worker:
    # Phase 4c-α: context bumped to repo root for SDK install.
    # restart policy matches sibling background workers (worker-infra/worker-ai):
    # without it, a stack restart that exits the worker leaves translation
    # silently broken (jobs enqueue to RabbitMQ but nothing consumes them).
    restart: unless-stopped
    build:
      context: ..
      dockerfile: services/translation-service/Dockerfile.worker
      labels: *build-labels
    environment:
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_translation
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      # MCP fan-out /review-impl — dedicated confirm-token signing secret (split
      # from the envelope internal token so the Tier-W confirm HMAC key is distinct).
      CONFIRM_TOKEN_SIGNING_SECRET: ${CONFIRM_TOKEN_SIGNING_SECRET:-loreweave_local_dev_confirm_signing_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      # Phase 4c-α: SDK install. Same host as legacy URL.
      PROVIDER_REGISTRY_INTERNAL_URL: http://provider-registry-service:8085
      GLOSSARY_SERVICE_INTERNAL_URL: http://glossary-service:8088
      # M4a: V3 knowledge layer (relations → pronoun/honorific). Empty disables it.
      KNOWLEDGE_SERVICE_INTERNAL_URL: http://knowledge-service:8092
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      NOTIFICATION_SERVICE_INTERNAL_URL: http://notification-service:8091
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      REDIS_URL: redis://redis:6379
      # LLM re-arch Phase 2b: must match the API's flag — the worker takes the
      # submit-and-release branch only when this is on. Default ON (2026-06-12).
      TRANSLATION_DECOUPLE_ENABLED: ${TRANSLATION_DECOUPLE_ENABLED:-true}
      # P5 — fair scheduling (per-tenant WFQ). OFF by default → legacy direct fan-out.
      # ON ⇒ the coordinator enqueues chapter units into the per-owner WFQ and the
      # dispatcher loop releases them round-robin (≤ cap in-flight per owner), so one
      # owner's giant job can't monopolize the chapter-worker fleet.
      P5_SCHED_ENABLED: ${P5_SCHED_ENABLED:-true}
      P5_OWNER_CAP: ${P5_OWNER_CAP:-5}
      P5_GLOBAL_BUDGET: ${P5_GLOBAL_BUDGET:-0}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      book-service:
        condition: service_healthy
      glossary-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy

  glossary-service:
    # Phase 6c — repo-root build context so the Dockerfile can COPY
    # sdks/go/observability for the go.mod replace directive.
    build:
      context: ..
      dockerfile: services/glossary-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_ADDR: ":8088"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_glossary?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      AUTH_SERVICE_URL: http://auth-service:8081
      BOOK_SERVICE_URL: http://book-service:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # DEFERRED-044: the C5 wiki-from-KG renderer reads an entity's KG
      # neighbourhood from knowledge-service when this is set, and degrades to a
      # name/kind/attributes-only body when unset (no hard dependency — so no
      # depends_on coupling). Without it, /wiki/generate omits the KG relationship
      # sections in the dev/prod stack.
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      # S5 deep-research: reach the BYOK web_search capability via provider-registry's
      # /internal/web-search (the outward search call lives only there — provider-gateway
      # invariant). This is the SERVICE URL (like BOOK_SERVICE_URL), NOT a model/key.
      PROVIDER_REGISTRY_URL: http://provider-registry-service:8085
      # Per-episode translation surface (§6B/§7.6): the canonical-snapshot translation cache
      # fills a miss by calling translation-service's /internal/translation/translate-text (BYOK
      # MT via provider-registry — no LLM in glossary). SERVICE URL (like BOOK_SERVICE_URL), NOT a
      # model/key. Unset → the surface returns a clear `failed/unconfigured`; rest of svc unaffected.
      TRANSLATION_SERVICE_URL: http://translation-service:8087
      # VG-1: glossary entity versioning. When set, glossary-service runs the
      # revision-projection consumer on loreweave:events:glossary (whole-entity
      # snapshots into entity_revisions — the recovery/undo substrate). Unset =
      # feature dormant. Recovery-critical (PO 2026-06-07), so wired in the stack.
      REDIS_URL: redis://redis:6379
      # Phase 6c — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # D-GKA-SYSTEM-TIER-ADMIN — SPKI/PKIX PEM of the platform admin-signing key
      # (public half of the auth-service KMS key). When set, the System-tier admin
      # write endpoints verify an RS256 admin JWT against it; unset → they fail
      # closed (503). Optional — the rest of the service runs without it.
      ADMIN_JWT_PUBLIC_KEY_PEM: ${ADMIN_JWT_PUBLIC_KEY_PEM:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      book-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8211:8088"

  video-gen-service:
    build:
      # Phase 5e-α: context bumped to repo root so Dockerfile can COPY
      # sdks/python alongside the service code. Mirrors chat-service +
      # translation-service patterns.
      context: ..
      dockerfile: services/video-gen-service/Dockerfile
      labels: *build-labels
    environment:
      HTTP_PORT: "8088"
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      # Phase 5e-α: SDK reads PROVIDER_REGISTRY_INTERNAL_URL (Settings
      # field). Legacy PROVIDER_REGISTRY_URL removed per /review-impl(DESIGN)
      # MED#2 — was only used by the deleted resolve_credentials() flow.
      PROVIDER_REGISTRY_INTERNAL_URL: http://provider-registry-service:8085
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # Phase 6c-γ — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-loreweave}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-loreweave_dev_minio_secret}
      MINIO_EXTERNAL_URL: ${MINIO_EXTERNAL_URL:-http://localhost:9123}
      # LLM re-arch Phase 3 M5 — decoupled video-gen. DB + Redis back the
      # job-row + terminal-event path; the flag (default false) keeps the
      # inline 201 path verbatim until the worker is turned on.
      VIDEO_GEN_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_video_gen
      REDIS_URL: redis://redis:6379
      VIDEO_GEN_DECOUPLE_ENABLED: ${VIDEO_GEN_DECOUPLE_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8213:8088"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 10s

  # LLM re-arch Phase 3 M5 — video-gen terminal-event worker. Same image as
  # video-gen-service (CMD override → `python -m app.worker`), runs the
  # loreweave:events:llm_job_terminal consumer + stuck-job sweeper that download
  # finished videos → MinIO → mark the job-row done. No HTTP port. Flag-gated by
  # VIDEO_GEN_DECOUPLE_ENABLED (default false → idle), which MUST match the API's
  # flag: the API only submits decoupled 202 jobs when it's on.
  video-gen-worker:
    build:
      context: ..
      dockerfile: services/video-gen-service/Dockerfile
      labels: *build-labels
    command: ["python", "-m", "app.worker"]
    environment:
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      PROVIDER_REGISTRY_INTERNAL_URL: http://provider-registry-service:8085
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-loreweave}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-loreweave_dev_minio_secret}
      MINIO_EXTERNAL_URL: ${MINIO_EXTERNAL_URL:-http://localhost:9123}
      VIDEO_GEN_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_video_gen
      REDIS_URL: redis://redis:6379
      # Must match video-gen-service: the worker resumes only jobs the API submits.
      VIDEO_GEN_DECOUPLE_ENABLED: ${VIDEO_GEN_DECOUPLE_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  chat-service:
    build:
      # Phase 1c-ii: build context shifted to repo root so the Dockerfile
      # can COPY both `services/chat-service/...` AND `sdks/python` (the
      # local loreweave_llm SDK). Other services keep their per-service
      # context until they migrate to the SDK.
      context: ..
      dockerfile: services/chat-service/Dockerfile
      labels: *build-labels
    environment:
      PORT: "8090"
      T5_INTENT_GATE_ENABLED: "${T5_INTENT_GATE_ENABLED:-false}"
      # Context Budget Law T4 (story_state Core Memory Block) + T6/D13a (reversible
      # dup-read collapse). Default OFF; flip on (with T5) for the compaction A/B —
      # T4's degraded-safety-net only fires when T5 gates grounding to empty, D13a only
      # fires on a compaction pass. See docs/eval/context-budget/.
      STORY_STATE_BLOCK_ENABLED: "${STORY_STATE_BLOCK_ENABLED:-false}"
      COMPACT_COLLAPSE_DUPLICATES_ENABLED: "${COMPACT_COLLAPSE_DUPLICATES_ENABLED:-false}"
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_chat
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      PROVIDER_REGISTRY_INTERNAL_URL: http://provider-registry-service:8085
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: loreweave
      MINIO_SECRET_KEY: loreweave_dev_minio_secret
      MINIO_BUCKET: lw-chat
      MINIO_USE_SSL: "false"
      MINIO_EXTERNAL_URL: ${MINIO_EXTERNAL_URL:-http://localhost:9123}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # R3 (D-PROACTIVE-DELIVERY) — the content-free proactive check-in push sink (best-effort).
      NOTIFICATION_SERVICE_INTERNAL_URL: http://notification-service:8091
      # WS-1.0 (review-impl) — the SAME deployment KEK auth-service uses to WRAP each DEK.
      # This consumer unwraps the DEK with it to decrypt the user's private content, so a
      # value here that differs from auth-service's is a total decrypt failure. Rotations
      # must add the old value to DIARY_ENCRYPTION_KEYS_RETIRED on EVERY service at once.
      DIARY_ENCRYPTION_KEY: ${DIARY_ENCRYPTION_KEY:-loreweave_local_dev_diary_kek_change_me}
      DIARY_ENCRYPTION_KEYS_RETIRED: ${DIARY_ENCRYPTION_KEYS_RETIRED:-}
      # Phase 6c-γ — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      REDIS_URL: redis://redis:6379
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      # ai-gateway P0: TOOLS (definitions + MCP execute) go through the gateway;
      # build_context (grounding) still targets KNOWLEDGE_SERVICE_URL above.
      AI_GATEWAY_URL: http://ai-gateway:8210
      # build_context is a fast read on the chat hot path — 500ms.
      KNOWLEDGE_CLIENT_TIMEOUT_S: "0.5"
      KNOWLEDGE_CLIENT_RETRIES: "1"
      # K21-B tool execution (memory_remember etc.) does real work —
      # injection-neutralisation + a Neo4j write — and routinely exceeds
      # 500ms. execute_tool uses this longer per-call timeout instead of
      # the build_context budget above (D-K21B-06 live-smoke finding).
      KNOWLEDGE_TOOL_TIMEOUT_S: "30"
      # RAID C1 (DR-C1) — per-book steering: fetched from book-service's
      # /internal/books/{id}/steering; failures degrade to [] (turn unaffected).
      BOOK_SERVICE_URL: http://book-service:8082
      BOOK_STEERING_TIMEOUT_S: "2"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy
      usage-billing-service:
        condition: service_healthy
      minio:
        condition: service_started
      ai-gateway:
        condition: service_healthy
    ports:
      - "8212:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 5

  # ai-gateway P0 — internal MCP federation gateway. MCP server upstream
  # (chat, composition) + MCP client downstream federating knowledge's /mcp.
  ai-gateway:
    build:
      context: ../services/ai-gateway
      dockerfile: Dockerfile
      labels: *build-labels
    environment:
      AI_GATEWAY_PORT: "8210"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      KNOWLEDGE_MCP_URL: http://knowledge-service:8092/mcp
      GLOSSARY_MCP_URL: http://glossary-service:8088/mcp
      # MCP fan-out COMPOSE B — federate every domain MCP provider via env (C-GW:
      # "adding a provider = an env entry, not a code edit"). Prefixes resolve from
      # the gateway's DEFAULT_PREFIX_MAP by name; a provider that's down degrades the
      # catalog to PARTIAL (H10) rather than blocking the gateway, so no hard
      # depends_on is required here. Wave 1: knowledge, glossary, jobs.
      # Wave 2: book, composition, translation, settings.
      # Provider name `lore_enrichment` (underscore) → derived prefix `lore_enrichment_`
      # (no DEFAULT_PREFIX_MAP entry needed), which matches the tool `lore_enrichment_auto_enrich`.
      # Wave 3 (P5 OD-7): catalog — public-discovery read tools (catalog_*).
      AI_GATEWAY_PROVIDERS: "knowledge=http://knowledge-service:8092/mcp,glossary=http://glossary-service:8088/mcp,jobs=http://jobs-service:8096/mcp,book=http://book-service:8082/mcp,composition=http://composition-service:8093/mcp,translation=http://translation-service:8087/mcp,settings=http://provider-registry-service:8085/mcp,lore_enrichment=http://lore-enrichment-service:8093/mcp,catalog=http://catalog-service:8084/mcp,registry=http://agent-registry-service:8099/mcp"
      # REG-P2-03 — per-user federation overlay. Default OFF ⇒ the catalog is
      # byte-identical to today; set true to merge a user's registered MCP servers
      # (from agent-registry) over the static System catalog under a u_/b_ prefix.
      REGISTRY_OVERLAY_ENABLED: ${REGISTRY_OVERLAY_ENABLED:-false}
      AGENT_REGISTRY_INTERNAL_URL: http://agent-registry-service:8099
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      knowledge-service:
        condition: service_healthy
      glossary-service:
        condition: service_healthy
    ports:
      - "8218:8210"
    healthcheck:
      # node is always present in the image (wget/curl are not) — a wget probe
      # left the gateway permanently "unhealthy", blocking dependents' depends_on.
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8210/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5

  # PUBLIC MCP security edge — authenticates external-agent credentials, strips the
  # inbound x-* namespace, mints the internal envelope, and relays to ai-gateway/mcp
  # ONLY (never /mcp/admin). OFF by default (PUBLIC_MCP_ENABLED). Reached externally
  # via api-gateway-bff /mcp. P0: envelope hop only (static test credential).
  mcp-public-gateway:
    build:
      context: ../services/mcp-public-gateway
      dockerfile: Dockerfile
      labels: *build-labels
    environment:
      MCP_PUBLIC_GATEWAY_PORT: "8211"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      AI_GATEWAY_URL: http://ai-gateway:8210
      # P1: resolve real keys via auth-service credential store.
      AUTH_SERVICE_URL: http://auth-service:8081
      PUBLIC_MCP_ENABLED: ${PUBLIC_MCP_ENABLED:-false}
      # P5 OAuth (S9 audience binding): the edge verifies third-party OAuth access
      # tokens LOCALLY (RS256 via auth-service /oauth/jwks) and pins the audience.
      # MCP_RESOURCE_URL MUST equal auth-service's OAUTH_RESOURCE (defaults to
      # <PUBLIC_APP_URL>/mcp on both sides) or an audience-confused token is rejected.
      MCP_RESOURCE_URL: ${MCP_RESOURCE_URL:-http://localhost:5174/mcp}
      OAUTH_ISSUER: ${OAUTH_ISSUER:-loreweave-mcp-oauth}
      # P3 (PUB-8): per-key rate-limit counter store. Unset → limiter disabled (dev).
      REDIS_URL: redis://redis:6379
      # DEV/SMOKE static credential (optional). Empty = disabled (real keys via auth).
      MCP_PUBLIC_TEST_KEY: ${MCP_PUBLIC_TEST_KEY:-}
      MCP_PUBLIC_TEST_USER_ID: ${MCP_PUBLIC_TEST_USER_ID:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      ai-gateway:
        condition: service_healthy
      auth-service:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8219:8211"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:8211/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 5

  knowledge-service:
    build:
      # Phase 4a-α: context is repo root so Dockerfile can COPY sdks/python.
      # Mirrors chat-service Phase 1c-ii setup.
      context: ..
      dockerfile: services/knowledge-service/Dockerfile
      labels: *build-labels
    environment:
      PORT: "8092"
      KNOWLEDGE_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_knowledge
      GLOSSARY_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_glossary
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # WS-1.0 (review-impl) — the SAME deployment KEK auth-service uses to WRAP each DEK.
      # This consumer unwraps the DEK with it to decrypt the user's private content, so a
      # value here that differs from auth-service's is a total decrypt failure. Rotations
      # must add the old value to DIARY_ENCRYPTION_KEYS_RETIRED on EVERY service at once.
      DIARY_ENCRYPTION_KEY: ${DIARY_ENCRYPTION_KEY:-loreweave_local_dev_diary_kek_change_me}
      DIARY_ENCRYPTION_KEYS_RETIRED: ${DIARY_ENCRYPTION_KEYS_RETIRED:-}
      # KM5 (D-KM5-M3) — SPKI/PKIX PEM (or base64) of the platform admin-signing
      # key's public half (same value glossary-service gets). When set, the System-
      # tier admin write endpoints + the /mcp/admin server verify an RS256 admin JWT
      # against it; unset → admin is disabled (callers 503). DEV keys via
      # infra/gen-admin-dev-keys.ps1; PROD = the public half of the auth-service KMS key.
      ADMIN_JWT_PUBLIC_KEY_PEM: ${ADMIN_JWT_PUBLIC_KEY_PEM:-}
      # Phase 6c-γ — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
      # K11.1 — Neo4j connection (Track 2). Defaults to the in-compose
      # neo4j service so the full Track 2/3 graph (entities, timeline,
      # passage vector index, K21 memory tools) works out of the box.
      # K11.2 driver init fail-fasts on an unreachable URI, hence the
      # `depends_on: neo4j` below. Override NEO4J_URI= (empty) for a
      # deliberate Track-1-only run without the neo4j container.
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-loreweave_dev_neo4j}
      # Pass-2 precision filter — NO env config (D-WX-PRECISION-FILTER-MODEL-ARCH).
      # Was a hardcoded env UUID of one user's model, submitted as user_model scoped
      # to the request's user → 404 for every other user → decoupled fold stall (D-WX
      # live-smoke). Now configured PER-PROJECT via extraction_config.precision_filter
      # (model_ref + source + categories + policy), FE-set, DB-stored, resolved per-user.
      # No KNOWLEDGE_EXTRACTION_PRECISION_FILTER_* env exists. (Filter remains the +2.2pp
      # F1 / relation-only default behavior — those knobs now live on the project override.)
      # Cycle 73d — entity recovery (3-tier glossary→hints→LLM). OFF by
      # default until eval validates the +F1 win justifies +latency.
      # Override to claude-4.7-opus UUID to enable.
      KNOWLEDGE_EXTRACTION_ENTITY_RECOVERY_MODEL_REF: ${KNOWLEDGE_EXTRACTION_ENTITY_RECOVERY_MODEL_REF:-}
      KNOWLEDGE_EXTRACTION_ENTITY_RECOVERY_MODEL_SOURCE: ${KNOWLEDGE_EXTRACTION_ENTITY_RECOVERY_MODEL_SOURCE:-user_model}
      KNOWLEDGE_EXTRACTION_ENTITY_RECOVERY_MAX_BATCH: ${KNOWLEDGE_EXTRACTION_ENTITY_RECOVERY_MAX_BATCH:-5}
      # Cycle 73e — Pass2 writer autocreate (Tier B). OFF by default
      # until eval validates the realized-F1 lift justifies the graph-
      # pollution risk. Tier A.1 (chapter name repair) + A.2 (anchor
      # pre-check) always run; only Tier B (MERGE new :Entity with
      # auto_created=true, kind=concept) is gated. Cap defaults 20/ch.
      # Override ENABLED=true to enable; MAX_PER_CHAPTER tunes the cap.
      KNOWLEDGE_EXTRACTION_WRITER_AUTOCREATE_ENABLED: ${KNOWLEDGE_EXTRACTION_WRITER_AUTOCREATE_ENABLED:-false}
      KNOWLEDGE_EXTRACTION_WRITER_AUTOCREATE_MAX_PER_CHAPTER: ${KNOWLEDGE_EXTRACTION_WRITER_AUTOCREATE_MAX_PER_CHAPTER:-20}
      # wiki-llm M1 (option A) — read the authored de-bias BookProfile from
      # lore-enrichment over the internal token to shape the wiki-gen prompt.
      LORE_ENRICHMENT_SERVICE_URL: http://lore-enrichment-service:8093
      # wiki-llm M6 — batch wiki-generation consumer. OFF by default (spends
      # tokens); set true to drain loreweave:events:wiki-gen and generate.
      WIKI_GEN_ENABLED: ${KNOWLEDGE_WIKI_GEN_ENABLED:-false}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      glossary-service:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    ports:
      - "8216:8092"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # KAL — the Knowledge Access Layer gateway (temporal-knowledge F4). The single typed
  # read/write boundary over entity_facts (glossary SSOT) + the KG (knowledge-service).
  # Consumers reach it via KNOWLEDGE_GATEWAY_URL; it federates the owning services'
  # /internal/* knowledge routes (INV-KAL). Internal-token guarded.
  knowledge-gateway:
    build:
      context: ../services/knowledge-gateway
      dockerfile: Dockerfile
      labels: *build-labels
    environment:
      PORT: "3000"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # Dual-auth user mode (FE via the BFF): validate the platform HS256 JWT (same secret
      # glossary/knowledge use) + grant-check the book against book-service before forwarding.
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOK_SERVICE_URL: http://book-service:8082
      GLOSSARY_SERVICE_URL: http://glossary-service:8088
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      KG_TEMPORAL_ENABLED: ${KG_TEMPORAL_ENABLED:-true}
      LOG_LEVEL: INFO
    depends_on:
      glossary-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
    ports:
      - "3210:3000"
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3000/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      start_period: 15s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  lore-enrichment-service:
    build:
      # Repo-root context so a later cycle can COPY sdks/python (loreweave_llm).
      context: ..
      dockerfile: services/lore-enrichment-service/Dockerfile
      labels: *build-labels
    environment:
      PORT: "8093"
      LORE_ENRICHMENT_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_lore_enrichment
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # Read-dependency URLs — C1 wires the clients; defaults match in-net svc names.
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      GLOSSARY_SERVICE_URL: http://glossary-service:8088
      BOOK_SERVICE_URL: http://book-service:8082
      PROVIDER_REGISTRY_INTERNAL_URL: http://provider-registry-service:8085
      REDIS_URL: redis://redis:6379
      # Unified Job Control Plane P5 — per-owner concurrent-job cap (the enrichment runner
      # is synchronous in-process, so the lane `lore-enrichment:job` caps concurrent jobs;
      # at cap → 429). Default OFF until live-smoked → then default on.
      P5_SCHED_ENABLED: ${P5_SCHED_ENABLED:-true}
      P5_OWNER_CAP: ${P5_OWNER_CAP:-5}
      P5_LEASE_TTL_MS: ${P5_LEASE_TTL_MS:-3600000}
      # C18 — OpenTelemetry trace export (mirrors api-gateway-bff / the other
      # FastAPI services). Empty default → setup_tracing is a no-op (dev). Set to
      # the collector endpoint to enable tracing.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # Compose slice 3 (mode F) — MinIO object storage for uploaded files.
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: loreweave
      MINIO_SECRET_KEY: loreweave_dev_minio_secret
      MINIO_BUCKET: lore-enrichment-uploads
      MINIO_USE_SSL: "false"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8221:8093"
    # Liveness probe — /health is constant-ok (no DB). C18 added /ready (DB-
    # readiness, SELECT 1, 503 on failure) for orchestrator traffic-gating; the
    # compose healthcheck stays on /health so a brief DB blip does NOT crash-loop
    # the container (DEFERRED-042 cleared — see RUNBOOK.md /health vs /ready).
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8093/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 5
    restart: unless-stopped

  # F-C14-1/051 — background resume worker. Same image as lore-enrichment-service
  # (CMD override), runs the Redis-Streams resume consumer that re-drives
  # cost-cap-paused jobs (skipping already-done gaps). No HTTP port.
  lore-enrichment-worker:
    build:
      context: ..
      dockerfile: services/lore-enrichment-service/Dockerfile
      labels: *build-labels
    command: ["python", "-m", "app.worker"]
    environment:
      LORE_ENRICHMENT_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_lore_enrichment
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      GLOSSARY_SERVICE_URL: http://glossary-service:8088
      BOOK_SERVICE_URL: http://book-service:8082
      PROVIDER_REGISTRY_INTERNAL_URL: http://provider-registry-service:8085
      REDIS_URL: redis://redis:6379
      RESUME_CONSUMER_ENABLED: ${RESUME_CONSUMER_ENABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      # The reaper's orphan-object sweep (D-COMPOSE-S3-UPLOAD-REAPER) deletes row-less
      # MinIO objects, so the worker needs the SAME bucket config as the service.
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: loreweave
      MINIO_SECRET_KEY: loreweave_dev_minio_secret
      MINIO_BUCKET: lore-enrichment-uploads
      MINIO_USE_SSL: "false"
    # LE-062: the worker is a headless consumer (no HTTP server), so override the
    # image's HTTP /health probe with a heartbeat-file freshness check. The worker
    # touches the heartbeat from a background task while its event loop is alive
    # (stays fresh during long generations; goes stale only on a real hang/crash).
    healthcheck:
      test: ["CMD", "python", "-m", "app.worker.healthcheck"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  learning-service:
    # Phase B — Axis-1 correction capture. Consumes the correction event spine
    # (glossary.entity_updated [user-only] + knowledge.*_corrected) off Redis
    # Streams and persists to the `corrections` log; exposes a read API.
    # Repo-root context for parity with the other Python services (no sdks COPY
    # — learning-service makes no LLM calls this cycle).
    build:
      context: ..
      dockerfile: services/learning-service/Dockerfile
    environment:
      PORT: "8094"
      LEARNING_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_learning
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8222:8094"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8094/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 5
    restart: unless-stopped

  worker-infra:
    # Phase 6c — repo-root build context so the Dockerfile can COPY
    # sdks/go/observability for the go.mod replace directive.
    build:
      context: ..
      dockerfile: services/worker-infra/Dockerfile
      labels: *build-labels
    environment:
      WORKER_TASKS: "outbox-relay,outbox-cleanup,import-processor"
      EVENTS_DB_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_events
      REDIS_URL: redis://redis:6379
      # C4 (K14): glossary added so the relay ships glossary.entity_updated
      # rows (aggregate_type='glossary' → stream loreweave:events:glossary)
      # for knowledge-service's glossary-sync consumer. Additive — existing
      # book/translation/chat sources unchanged.
      # Phase B sub-session B: knowledge added so the relay ships KS's new
      # transactional outbox (knowledge.*_corrected, aggregate_type='knowledge')
      # to loreweave:events:knowledge for learning-service.
      # LOOM V1 correction-flywheel slice 1 (D-COMP-OUTBOX-NOT-RELAYED): composition
      # added so the relay ships its txn outbox (composition.generation_corrected +
      # the pre-existing M9 scene_committed, aggregate_type='composition') to
      # loreweave:events:composition. Until now composition wrote outbox rows that
      # were NEVER relayed (M9 telemetry was emitted-but-unconsumed).
      # D-S5BEVAL-LEARNING-OUTBOX: learning added so the relay ships the decoupled
      # fidelity judge's transactional outbox (translation.eval_judged,
      # aggregate_type='translation_eval') to loreweave:events:translation_eval for
      # the campaign projection. Replaces the prior best-effort XADD (lost emit =
      # dropped eval_fidelity_score).
      # D-C-PRODUCER-OUTBOX: auth added so the relay drains its NEW outbox — the
      # mcp_approval owner notification (aggregate_type='notification') is now written
      # in the approval tx and DELIVERED to notification-service (NOTIFICATION_SERVICE_URL
      # below), replacing the fire-and-forget POST. translation + composition already
      # emit 'notification' rows on their existing outboxes (same delivery path).
      OUTBOX_SOURCES: "book:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_book,translation:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_translation,chat:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_chat,glossary:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_glossary,knowledge:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_knowledge,composition:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_composition,campaign:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_campaign,lore_enrichment:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_lore_enrichment,video_gen:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_video_gen,learning:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_learning,auth:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_auth"
      # D-C-PRODUCER-OUTBOX — where the relay delivers notification-typed outbox rows.
      NOTIFICATION_SERVICE_URL: http://notification-service:8091
      # Phase B (§10.1): bumped 7→30 days. glossary now also feeds
      # learning-service's append-only correction log; a longer retention on the
      # source outbox rows + event_log is the replay backstop so a learning-
      # service outage can be backfilled (ReplayCorrections, D#049).
      OUTBOX_CLEANUP_RETAIN_DAYS: "30"
      BOOK_DB_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_book
      PANDOC_URL: http://pandoc-server:3030
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: loreweave
      MINIO_SECRET_KEY: loreweave_dev_minio_secret
      MINIO_BUCKET: loreweave-dev-books
      BOOK_SERVICE_URL: http://book-service:8082
      # 26 IX-12 — import tail decompiles imported prose into spec scenes + writes back source_scene_id.
      COMPOSITION_SERVICE_URL: http://composition-service:8093
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      # Phase 6c — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pandoc-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker-ai:
    # Phase 4b-γ: context bumped to repo root so the Dockerfile can
    # COPY sdks/python alongside the service code (mirrors knowledge-
    # service Phase 4a-α pattern). Worker-ai now runs Pass 2 LLM
    # extraction in-process via the loreweave_extraction library.
    build:
      context: ..
      dockerfile: services/worker-ai/Dockerfile
      labels: *build-labels
    environment:
      KNOWLEDGE_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_knowledge
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # WS-1.0 (review-impl) — the SAME deployment KEK auth-service uses to WRAP each DEK.
      # This consumer unwraps the DEK with it to decrypt the user's private content, so a
      # value here that differs from auth-service's is a total decrypt failure. Rotations
      # must add the old value to DIARY_ENCRYPTION_KEYS_RETIRED on EVERY service at once.
      DIARY_ENCRYPTION_KEY: ${DIARY_ENCRYPTION_KEY:-loreweave_local_dev_diary_kek_change_me}
      DIARY_ENCRYPTION_KEYS_RETIRED: ${DIARY_ENCRYPTION_KEYS_RETIRED:-}
      # Phase 6c-γ — OpenTelemetry trace export (see provider-registry-service).
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      BOOK_SERVICE_URL: http://book-service:8082
      # C13 — glossary-service internal base URL (entities/by-ids for pinning +
      # the existing glossary_sync entity listing). Glossary listens on :8088;
      # the code default was the stale :8082, so worker-ai's GlossaryClient calls
      # were silently failing ("All connection attempts failed") — this aligns it
      # with every other service's GLOSSARY_*_URL=:8088. NOT a model backend (a
      # plain service-to-service internal URL); auth reuses X-Internal-Token.
      GLOSSARY_SERVICE_URL: http://glossary-service:8088
      # Phase 4b-γ: SDK posts to provider-registry's internal LLM
      # gateway for entity/relation/event/fact extraction jobs.
      PROVIDER_REGISTRY_INTERNAL_URL: http://provider-registry-service:8085
      # WS-2.8: usage-billing internal API for the distiller's daily-cap degrade pre-check. :8086 is
      # usage-billing's HTTP_ADDR (mirrors USAGE_BILLING_SERVICE_URL elsewhere in this file) — same
      # stale-port trap the GLOSSARY_SERVICE_URL note above records; the pre-check fails OPEN anyway.
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      LOG_LEVEL: INFO
      POLL_INTERVAL_S: "5"
      # Pass-2 precision filter — NO env config (D-WX-PRECISION-FILTER-MODEL-ARCH).
      # The filter model was a hardcoded env UUID of one user's model, submitted as
      # user_model scoped to the campaign's user → 404 for every other user → decoupled
      # fold stall (D-WX live-smoke). The filter is now configured PER-PROJECT via
      # extraction_config.precision_filter (model_ref + source + categories + policy),
      # FE-set, DB-stored, resolved per-user. No WORKER_AI_PRECISION_FILTER_* env exists.
      # LLM re-arch Phase 2b WX-T3b — event-driven decouple of chapter extraction.
      # ON ⇒ the runner submits a chapter's entity job + releases, and the
      # llm_extract_consumer drives entity→trio→persist off the terminal events
      # (entity→trio→recovery→filter→persist; recovery/filter wired in Wave 4). Read by
      # BOTH app.main (consumer + sweeper) and runner.py (the branch) so worker +
      # consumer stay coherent. Default ON (2026-06-12): review-cleared + live-smoked
      # (5-chapter run, recovery/filter fan-outs, 0 double-spend). false ⇒ sync path.
      EXTRACTION_DECOUPLE_ENABLED: ${EXTRACTION_DECOUPLE_ENABLED:-true}
      # Unified Job Control Plane P1 — the decoupled-extraction terminal consumer runs
      # on the shared loreweave_jobs.BaseTerminalConsumer (ExtractTerminalConsumer).
      # Default ON (2026-06-15): live extraction E2E confirmed entity→trio→persist on
      # the SDK consumer (real chapter, 23 entities/27 relations, items_processed 0→1
      # bill-once, group/consumer-name continuity `worker-ai-extract-resume`). Set false
      # to fall back to the legacy functional consume_llm_terminal_stream if needed.
      EXTRACTION_CONSUMER_USE_SDK: ${EXTRACTION_CONSUMER_USE_SDK:-true}
      # Cycle 73d — entity recovery OFF by default; eval-validate first.
      WORKER_AI_ENTITY_RECOVERY_MODEL_REF: ${WORKER_AI_ENTITY_RECOVERY_MODEL_REF:-}
      WORKER_AI_ENTITY_RECOVERY_MODEL_SOURCE: ${WORKER_AI_ENTITY_RECOVERY_MODEL_SOURCE:-user_model}
      WORKER_AI_ENTITY_RECOVERY_MAX_BATCH: ${WORKER_AI_ENTITY_RECOVERY_MAX_BATCH:-5}
      # Cycle 73h — Prometheus /metrics endpoint on dedicated port.
      # Set to 0 to disable (e.g. when running multiple worker replicas
      # on the same host that would collide on the port).
      METRICS_PORT: "${WORKER_AI_METRICS_PORT:-8094}"
      # B2 follow-up — global env knob for writer autocreate.  Mirrors the
      # knowledge-service value so both services share one .env toggle.
      KNOWLEDGE_EXTRACTION_WRITER_AUTOCREATE_ENABLED: ${KNOWLEDGE_EXTRACTION_WRITER_AUTOCREATE_ENABLED:-false}
      # Unified Job Control Plane P5 — fair scheduling / per-tenant concurrency (the
      # noisy-neighbor fix). The PULL substrate: the poll loop iterates owners round-robin
      # and gates each decoupled chunk with a per-owner in-flight cap (acquire/release on
      # the lane `knowledge:extraction`). Default OFF until live-smoked → then default on.
      # redis_url falls back to the code default (redis://redis:6379) — no separate env.
      P5_SCHED_ENABLED: ${P5_SCHED_ENABLED:-true}
      P5_OWNER_CAP: ${P5_OWNER_CAP:-5}
      P5_LEASE_TTL_MS: ${P5_LEASE_TTL_MS:-3600000}
    depends_on:
      postgres:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
    ports:
      # Cycle 73h — Prometheus scrape target on 8226 (host) → 8094 (container).
      - "8226:8094"
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

