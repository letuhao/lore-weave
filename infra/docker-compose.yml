# Full stack: Postgres, Mailhog, auth-service, api-gateway-bff, frontend (nginx static build).
# From this directory: docker compose up --build
# Browser: http://localhost:5296  |  Gateway: http://localhost:3123  |  Auth: http://localhost:8204
# Optional env file: copy .env.example to .env and set JWT_SECRET (>= 32 chars) for production-like secrets.

services:
  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: loreweave
      POSTGRES_PASSWORD: loreweave_dev
      POSTGRES_DB: loreweave_auth
      PGDATA: /var/lib/postgresql/18/docker
    ports:
      - "5555:5432"
    volumes:
      - loreweave_pg:/var/lib/postgresql
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - ./db-ensure.sh:/usr/local/bin/db-ensure.sh:ro
    healthcheck:
      # Healthcheck creates missing databases on EVERY start, then verifies readiness.
      # This replaces the old postgres-db-bootstrap container.
      test: ["CMD-SHELL", "sh /usr/local/bin/db-ensure.sh && pg_isready -U loreweave -d loreweave_auth"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 10s

  redis:
    image: redis:7-alpine
    ports:
      - "6399:6379"
    volumes:
      - loreweave_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: loreweave
      MINIO_ROOT_PASSWORD: loreweave_dev_minio_secret
    ports:
      - "9123:9000"
      - "9124:9001"
    volumes:
      - loreweave_minio:/data

  # Mock audio service (TTS/STT) — optional, activate with: docker compose --profile audio up
  mock-audio-service:
    build:
      context: ../infra/mock-audio-service
      dockerfile: Dockerfile
    ports:
      - "8600:8600"
    profiles:
      - audio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8600/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1148:1025"
      - "8148:8025"

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8081"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_auth?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      ACCESS_TOKEN_TTL_SECONDS: "7200"
      REFRESH_TOKEN_TTL_SECONDS: "2592000"
      DEV_LOG_EMAIL_TOKENS: "1"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: "LoreWeave <noreply@loreweave.local>"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5296}
      NOTIFICATION_SERVICE_INTERNAL_URL: http://notification-service:8091
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy
      mailhog:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8204:8081"

  book-service:
    build:
      context: ../services/book-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8082"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_book?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOKS_STORAGE_BUCKET: loreweave-dev-books
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: loreweave
      MINIO_SECRET_KEY: loreweave_dev_minio_secret
      MINIO_USE_SSL: "false"
      MINIO_EXTERNAL_URL: http://localhost:9123
      SHARING_INTERNAL_URL: http://sharing-service:8083
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8205:8082"

  sharing-service:
    build:
      context: ../services/sharing-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8083"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_sharing?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy

      book-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8083/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8206:8083"

  catalog-service:
    build:
      context: ../services/catalog-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8084"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_catalog?sslmode=disable
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      SHARING_SERVICE_INTERNAL_URL: http://sharing-service:8083
      TRANSLATION_SERVICE_INTERNAL_URL: http://translation-service:8087
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy
      book-service:
        condition: service_healthy
      sharing-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8084/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8207:8084"

  provider-registry-service:
    build:
      context: ../services/provider-registry-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8085"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_provider_registry?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy

      usage-billing-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8085/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8208:8085"

  usage-billing-service:
    build:
      context: ../services/usage-billing-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8086"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_usage_billing?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8086/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8209:8086"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: loreweave
      RABBITMQ_DEFAULT_PASS: loreweave_dev
    ports:
      - "5795:5672"
      - "15795:15672"
    volumes:
      - loreweave_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  translation-service:
    build:
      context: ../services/translation-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_translation
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      GLOSSARY_SERVICE_INTERNAL_URL: http://glossary-service:8088
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      NOTIFICATION_SERVICE_INTERNAL_URL: http://notification-service:8091
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      PORT: "8087"
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      book-service:
        condition: service_healthy
      glossary-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8087/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8210:8087"

  translation-worker:
    build:
      context: ../services/translation-service
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_translation
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      GLOSSARY_SERVICE_INTERNAL_URL: http://glossary-service:8088
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      NOTIFICATION_SERVICE_INTERNAL_URL: http://notification-service:8091
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      book-service:
        condition: service_healthy
      glossary-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy

  glossary-service:
    build:
      context: ../services/glossary-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8088"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_glossary?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      AUTH_SERVICE_URL: http://auth-service:8081
      BOOK_SERVICE_URL: http://book-service:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy

      book-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8088/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8211:8088"

  video-gen-service:
    build:
      context: ../services/video-gen-service
      dockerfile: Dockerfile
    environment:
      HTTP_PORT: "8088"
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      PROVIDER_REGISTRY_URL: http://provider-registry-service:8085
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_EXTERNAL_URL: ${MINIO_EXTERNAL_URL:-http://localhost:9123}
    ports:
      - "8213:8088"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8088/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 10s

  chat-service:
    build:
      context: ../services/chat-service
      dockerfile: Dockerfile
    environment:
      PORT: "8090"
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_chat
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      PROVIDER_REGISTRY_INTERNAL_URL: http://provider-registry-service:8085
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: loreweave
      MINIO_SECRET_KEY: loreweave_dev_minio_secret
      MINIO_BUCKET: lw-chat
      MINIO_USE_SSL: "false"
      MINIO_EXTERNAL_URL: http://localhost:9123
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      REDIS_URL: redis://redis:6379
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      KNOWLEDGE_CLIENT_TIMEOUT_S: "0.5"
      KNOWLEDGE_CLIENT_RETRIES: "1"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy
      usage-billing-service:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8212:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 5

  knowledge-service:
    build:
      context: ../services/knowledge-service
      dockerfile: Dockerfile
    environment:
      PORT: "8092"
      KNOWLEDGE_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_knowledge
      GLOSSARY_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_glossary
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: INFO
      # K11.1 — Neo4j connection (Track 2). Empty NEO4J_URI means
      # "skip Neo4j init at startup" — Track 1 dev keeps working.
      # Set NEO4J_URI=bolt://neo4j:7687 (and bring up the neo4j
      # service via `--profile neo4j`) to enable Track 2 features.
      NEO4J_URI: ${NEO4J_URI:-}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-loreweave_dev_neo4j}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      glossary-service:
        condition: service_healthy
    ports:
      - "8216:8092"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8092/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 5
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  worker-infra:
    build:
      context: ../services/worker-infra
      dockerfile: Dockerfile
    environment:
      WORKER_TASKS: "outbox-relay,outbox-cleanup,import-processor"
      EVENTS_DB_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_events
      REDIS_URL: redis://redis:6379
      OUTBOX_SOURCES: "book:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_book,translation:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_translation,chat:postgres://loreweave:loreweave_dev@postgres:5432/loreweave_chat"
      OUTBOX_CLEANUP_RETAIN_DAYS: "7"
      BOOK_DB_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_book
      PANDOC_URL: http://pandoc-server:3030
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: loreweave
      MINIO_SECRET_KEY: loreweave_dev_minio_secret
      MINIO_BUCKET: loreweave-dev-books
      BOOK_SERVICE_URL: http://book-service:8082
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      pandoc-server:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped

  worker-ai:
    build:
      context: ../services/worker-ai
      dockerfile: Dockerfile
    environment:
      KNOWLEDGE_DB_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_knowledge
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      BOOK_SERVICE_URL: http://book-service:8082
      LOG_LEVEL: INFO
      POLL_INTERVAL_S: "5"
    depends_on:
      postgres:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  statistics-service:
    build:
      context: ../services/statistics-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8089"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_statistics?sslmode=disable
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      REDIS_URL: redis://redis:6379
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      AUTH_SERVICE_INTERNAL_URL: http://auth-service:8081
      REFRESH_INTERVAL: "600"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      book-service:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8089/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8214:8089"

  notification-service:
    build:
      context: ../services/notification-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8091"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_notification?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8091/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "8215:8091"

  api-gateway-bff:
    build:
      context: ../services/api-gateway-bff
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      AUTH_SERVICE_URL: http://auth-service:8081
      BOOK_SERVICE_URL: http://book-service:8082
      SHARING_SERVICE_URL: http://sharing-service:8083
      CATALOG_SERVICE_URL: http://catalog-service:8084
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      TRANSLATION_SERVICE_URL: http://translation-service:8087
      GLOSSARY_SERVICE_URL: http://glossary-service:8088
      CHAT_SERVICE_URL: http://chat-service:8090
      VIDEO_GEN_SERVICE_URL: http://video-gen-service:8088
      STATISTICS_SERVICE_URL: http://statistics-service:8089
      NOTIFICATION_SERVICE_URL: http://notification-service:8091
      KNOWLEDGE_SERVICE_URL: http://knowledge-service:8092
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      auth-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
      sharing-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy
      usage-billing-service:
        condition: service_healthy
      translation-service:
        condition: service_healthy
      glossary-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      statistics-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      knowledge-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "3123:3000"

  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: Dockerfile
  #     args:
  #       VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3123}
  #   depends_on:
  #     - api-gateway-bff
  #   ports:
  #     - "5296:80"


  languagetool:
    image: erikvl87/languagetool:latest
    environment:
      Java_Xms: 256m
      Java_Xmx: 512m
    ports:
      - "8875:8010"
    volumes:
      - loreweave_languagetool:/LanguageTool/languagetool-data

  pandoc-server:
    image: pandoc/core:latest
    entrypoint: ["pandoc-server"]
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD-SHELL", "wget -qS --spider http://127.0.0.1:3030/ 2>&1 | grep -q '405\\|200' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3123}
    depends_on:
      - api-gateway-bff
      # Gate-5-I1: nginx.conf hard-references the `languagetool`
      # upstream and resolves all upstream hostnames at startup,
      # so without this dependency the frontend container exits
      # with `host not found in upstream "languagetool"` whenever
      # languagetool isn't already running.
      - languagetool
    ports:
      - "5174:80"
    # profiles:
    #   - v2

  # ── K11.1 — Neo4j for Track 2 extraction graph ────────────────────────
  # Hidden behind the `neo4j` profile so Track 1 dev doesn't pay the
  # ~4GB / ~60s startup cost. Bring up explicitly via:
  #   docker compose --profile neo4j up -d neo4j
  # Or as part of the full Track 2 stack (once the profile chain is
  # wired up):
  #   docker compose --profile extraction up -d
  #
  # knowledge-service does NOT depends_on neo4j so a Track 1
  # `docker compose up knowledge-service` continues to work without
  # Neo4j running. K11.2 driver init is gated on NEO4J_URI being
  # set in the env — unset = skip silently, set = fail-fast on
  # unreachable.
  neo4j:
    image: neo4j:2026.03-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-loreweave_dev_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      # Memory ceilings — community edition has soft caps but
      # explicit values keep dev machines stable.
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    ports:
      # Host ports offset by +1 so we don't collide with other
      # Neo4j installations on the dev machine. Containers inside
      # the compose network still talk to `neo4j:7687` directly,
      # so K11.2 driver config is unaffected.
      - "7475:7474"   # HTTP (browser UI), host: http://localhost:7475
      - "7688:7687"   # Bolt (driver protocol), host: bolt://localhost:7688
    volumes:
      - loreweave_neo4j_data:/data
      - loreweave_neo4j_logs:/logs
    healthcheck:
      # Neo4j 2025+ exposes /db/manage/server/version on 7474 once
      # ready. Wget against it; -q -O- suppresses output, exit
      # status is what we care about.
      test: ["CMD-SHELL", "wget -q -O- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 4G
    profiles:
      - neo4j
      - extraction
      - full

volumes:
  loreweave_pg:
  loreweave_redis:
  loreweave_minio:
  loreweave_rabbitmq:
  loreweave_languagetool:
  loreweave_neo4j_data:
  loreweave_neo4j_logs:
