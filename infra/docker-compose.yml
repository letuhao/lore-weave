  languagetool:
    image: erikvl87/languagetool:latest
    # restart policy added 2026-05-31: the service block existed but the
    # container was never started (same class as the translation-worker gap),
    # so the editor grammar check 500'd. unless-stopped keeps it alive across
    # daemon restarts; the frontend container hard-depends on it (see below).
    restart: unless-stopped
    environment:
      # D-LANGUAGETOOL-502-BOOT-RACE (cont'd): 512m was too small for real
      # usage, not just an idle-service size — live-verified 512m Xmx OOMs
      # ("java.lang.OutOfMemoryError: Java heap space") within minutes of
      # opening a real multi-chapter book in the Studio editor (many
      # concurrent per-paragraph grammar checks + a non-English language
      # model loaded). The JVM crashes and `restart: unless-stopped` brings
      # it back, but every request during that crash/restart window 500s —
      # the exact "bad gateway"-shaped symptom the frontend's circuit breaker
      # sees, recurring at ANY time during normal use, not just container
      # startup. The host has ample RAM headroom; bumped well past
      # LanguageTool's own documented minimum (1g).
      Java_Xms: 512m
      Java_Xmx: 2g
    ports:
      - "8875:8010"
    volumes:
      - loreweave_languagetool:/LanguageTool/languagetool-data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8010/v2/languages >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

  pandoc-server:
    image: pandoc/core:latest
    entrypoint: ["pandoc-server"]
    ports:
      - "3030:3030"
    healthcheck:
      test: ["CMD-SHELL", "wget -qS --spider http://127.0.0.1:3030/ 2>&1 | grep -q '405\\|200' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      labels: *build-labels
      args:
        # Empty = relative (browser calls same-origin /v1, which this container's
        # nginx.conf proxies to api-gateway-bff). This is what makes the frontend
        # reachable through a single port/domain (ngrok, LAN IP, prod domain, ...) —
        # a non-empty absolute value here bakes a fixed host into the JS bundle,
        # which breaks the moment the app is served from any other origin.
        VITE_API_BASE: ${VITE_API_BASE:-}
    depends_on:
      api-gateway-bff:
        condition: service_started
      # nginx.conf also proxies /media/ to minio:9000 (browser-accessible
      # object downloads behind the single frontend port) — same DNS-at-
      # startup requirement as the languagetool note below.
      minio:
        condition: service_started
      # Gate-5-I1: nginx.conf hard-references the `languagetool`
      # upstream and resolves all upstream hostnames at startup,
      # so without this dependency the frontend container exits
      # with `host not found in upstream "languagetool"` whenever
      # languagetool isn't already running.
      #
      # D-LANGUAGETOOL-502-BOOT-RACE: service_started (start-order only)
      # was enough to satisfy nginx's DNS resolution, but LanguageTool's
      # JVM takes up to its 40s start_period (often longer) to actually
      # accept connections on :8010. Any grammar-check request that hit
      # nginx in that window got a 502 from the upstream, which the FE's
      # circuit breaker (frontend/src/features/grammar/api.ts) then reads
      # as "service is down" and disables checking for 60s. Gating on
      # condition: service_healthy makes `docker compose up` actually
      # wait for the healthcheck (wget /v2/languages) to pass before the
      # frontend container starts, closing the race instead of just
      # papering over it with a longer breaker cooldown.
      languagetool:
        condition: service_healthy
    ports:
      - "5174:80"
    # profiles:
    #   - v2

  # ── Admin CMS (System-tier glossary standards) ────────────────────────
  # Thin internal admin UI (separate from the main app). Talks to the same
  # gateway at /v1; manages the System tier via the admin endpoints, which
  # require an admin session (auth-service /v1/admin/session — needs admin
  # issuance enabled + the caller to be an admin_principal).
  cms-frontend:
    build:
      context: ../cms-frontend
      dockerfile: Dockerfile
      labels: *build-labels
      args:
        # Same reasoning as frontend's VITE_API_BASE above — relative, proxied
        # by this container's own nginx.conf /v1/ block.
        VITE_API_BASE: ${VITE_API_BASE:-}
    depends_on:
      - api-gateway-bff
    ports:
      - "5175:80"

  # ── K11.1 — Neo4j for the Track 2/3 knowledge graph ───────────────────
  # Default-on: Tracks 1-3 are feature-complete and the graph (entities,
  # relations, events, timeline, passage vector index, K21 memory tools)
  # is core product surface — a profile-gated default silently degraded
  # all of it. knowledge-service `depends_on: neo4j` (condition healthy)
  # so its K11.2 driver init — which fail-fasts on an unreachable URI —
  # doesn't race startup. Costs ~4GB / ~60s. For a deliberate lightweight
  # Track-1-only run, start with `NEO4J_URI= docker compose up -d`
  # (empty URI skips the driver) and the neo4j container can be left
  # stopped.
  neo4j:
    image: neo4j:2026.03-community
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-loreweave_dev_neo4j}
      NEO4J_PLUGINS: '["apoc"]'
      # Memory ceilings — community edition has soft caps but
      # explicit values keep dev machines stable.
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 2G
      NEO4J_server_memory_pagecache_size: 1G
    ports:
      # Host ports offset by +1 so we don't collide with other
      # Neo4j installations on the dev machine. Containers inside
      # the compose network still talk to `neo4j:7687` directly,
      # so K11.2 driver config is unaffected.
      - "7475:7474"   # HTTP (browser UI), host: http://localhost:7475
      - "7688:7687"   # Bolt (driver protocol), host: bolt://localhost:7688
    volumes:
      - loreweave_neo4j_data:/data
      - loreweave_neo4j_logs:/logs
    healthcheck:
      # Neo4j 2025+ exposes /db/manage/server/version on 7474 once
      # ready. Wget against it; -q -O- suppresses output, exit
      # status is what we care about.
      test: ["CMD-SHELL", "wget -q -O- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      start_period: 60s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 4G

  # ── Phase 6c — OpenTelemetry tracing stack ────────────────────────────
  # Distributed tracing for the LLM pipeline (6c-α); 6c-β/γ extend it to
  # every service. Hidden behind the `observability` profile so a plain
  # `docker compose up` doesn't pay for 3 extra containers. Enable with:
  #   OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318 \
  #     docker compose --profile observability up
  # Then open Grafana at http://localhost:3200 (Explore → Tempo). Host
  # port 3200, not 3000 — 3000 is ContextHub MCP. Services keep a no-op
  # tracer while OTEL_EXPORTER_OTLP_ENDPOINT is unset, so they boot fine
  # with the profile off — no service depends_on the collector.
  otel-collector:
    # Pin a concrete release tag, never `latest`.
    image: otel/opentelemetry-collector-contrib:0.123.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/collector-config.yaml:/etc/otelcol/config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC
      - "4318:4318"   # OTLP HTTP
    depends_on:
      - tempo
    profiles:
      - observability
      - full

  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./otel/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - loreweave_tempo:/var/tempo
    profiles:
      - observability
      - full

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      # Dev-only: anonymous admin, no login form. NOT for any shared env.
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Admin
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./otel/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/tempo.yaml:ro
    ports:
      - "3200:3000"
    depends_on:
      - tempo
    profiles:
      - observability
      - full

  # tilemap-service — procedural tilemap generation (Rust). Stateless:
  # the full TilemapTemplate is supplied per request; no Postgres or DP
  # dependency yet (Phase 4+ adds them). Build context is the REPO ROOT
  # because the Rust workspace lives at the top of the tree.
  #
  # Port allocation note (LOW-3 from /review-impl 2026-05-24): external
  # 8217-19 are deliberately RESERVED for upcoming core-domain services
  # (likely future auth/book companions). tilemap-service claims 8220 to
  # leave that gap intentional. New service entries SHOULD pick 8221+
  # unless they belong to the core-domain band.
  tilemap-service:
    build:
      context: ..
      dockerfile: services/tilemap-service/Dockerfile
      labels: *build-labels
    environment:
      # Env name rewrite (LOW-2 from /review-impl 2026-05-24): the host /
      # .env reads `INTERNAL_SERVICE_TOKEN` (matching auth-service /
      # book-service convention); we re-expose it under the name the Rust
      # binary actually consumes (`LOREWEAVE_INTERNAL_TOKEN`). Setting
      # `LOREWEAVE_INTERNAL_TOKEN` on the HOST has NO effect — compose
      # always rewrites from `INTERNAL_SERVICE_TOKEN`.
      LOREWEAVE_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      TILEMAP_HTTP_BIND: "0.0.0.0:7100"
      # CORS origins for browser smoke (Session D V0 demo, spec AC-FG-13).
      # Comma-separated; defaults to frontend-game dev server on :5174.
      # Prod goes through api-gateway-bff (single-origin per spec §8).
      LOREWEAVE_CORS_ORIGINS: ${LOREWEAVE_CORS_ORIGINS:-http://localhost:5174}
      RUST_LOG: ${RUST_LOG:-info,tilemap_service=debug}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7100/livez"]
      interval: 10s
      timeout: 5s
      retries: 3
      # MED-1 from /review-impl 2026-05-24: give the Rust binary a window
      # to bind the port on cold start. Without start_period, the first
      # 1-3 checks can hit "connection refused" on slow hosts and mark
      # the container unhealthy before it has actually finished booting.
      start_period: 10s
    # LOW-6 from /review-impl 2026-05-24: bound the restart count so a
    # bad LOREWEAVE_INTERNAL_TOKEN doesn't lead to an infinite crash
    # loop. Project-wide pattern: other services in this file lack any
    # `restart:` directive — adopting on a per-service basis here.
    restart: on-failure:5
    ports:
      - "8220:7100"
    # COSMETIC-8 from /review-impl 2026-05-24: opt-in via profile so
    # contributors running a minimal stack (e.g. just `auth` + `book`)
    # don't pay the ~30 MB Rust image build cost. `docker compose up`
    # without --profile excludes tilemap; `--profile tilemap` or
    # `--profile full` includes it.
    profiles:
      - tilemap
      - full

  # ────────────────────────────────────────────────────────────────
  # roleplay-service — first USER-FACING Rust service (scripts + actor-memory
  # + start-orchestration; the MMO roleplay-service seed). Per-service DB
  # `loreweave_roleplay`; validates the user JWT itself (HS256, same JWT_SECRET
  # as the gateway) and calls chat-service over X-Internal-Token at /start (R1).
  # Built on crates/service-http. NOT profile-gated — the FE Roleplay
  # destination (R2) reaches it through the gateway `/v1/roleplay` proxy.
  # Host port 8225 (8221 is taken by lore-enrichment-service).
  # ────────────────────────────────────────────────────────────────
  roleplay-service:
    build:
      context: ..
      dockerfile: services/roleplay-service/Dockerfile
      labels: *build-labels
    environment:
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_roleplay
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      # Compose rewrites INTERNAL_SERVICE_TOKEN → the binary-facing name
      # (tilemap convention); setting LOREWEAVE_INTERNAL_TOKEN on the host has
      # no effect.
      LOREWEAVE_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      CHAT_SERVICE_URL: http://chat-service:8090
      ROLEPLAY_HTTP_BIND: "0.0.0.0:7110"
      LOREWEAVE_CORS_ORIGINS: ${LOREWEAVE_CORS_ORIGINS:-http://localhost:5174}
      RUST_LOG: ${RUST_LOG:-info,roleplay_service=debug}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:7110/livez"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8225:7110"

  # ────────────────────────────────────────────────────────────────
  # game-server — Node + TypeScript + Colyseus.
  # V0 ships EchoRoom for Session E WS path validation. V1+ adds real
  # game rooms (zone instances, combat, chat) per spec §17.
  # Port 2567 is Colyseus convention.
  # ────────────────────────────────────────────────────────────────
  game-server:
    build:
      context: ../services/game-server
      dockerfile: Dockerfile
      labels: *build-labels
    environment:
      PORT: "2567"
      # Dev auth token — EchoRoom.onAuth checks options.jwt against this.
      # Same env name convention as tilemap-service for cross-service consistency.
      LOREWEAVE_INTERNAL_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
      # CORS for matchmaking HTTP endpoint (POST /matchmake/<room>);
      # WS upgrade itself doesn't preflight. Default frontend-game dev :5174.
      LOREWEAVE_CORS_ORIGINS: ${LOREWEAVE_CORS_ORIGINS:-http://localhost:5174}
      NODE_ENV: production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:2567/livez"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: on-failure:5
    ports:
      - "2567:2567"
    profiles:
      - game
      - full

  # ────────────────────────────────────────────────────────────────
  # frontend-game — Static SPA served by nginx.
  # V0 final piece (Session F per spec §16) — completes the
  # one-command local stack: `docker compose --profile full up`
  # boots tilemap-service + game-server + frontend-game and the user
  # opens http://localhost:5174 for the V0 demo (iso tilemap +
  # click-to-walk Player + HUD reading /livez + WS echo panel).
  # Build context = repo root (pnpm-workspace.yaml lives there +
  # frontend-game depends on @loreweave/* packages).
  # ────────────────────────────────────────────────────────────────
  frontend-game:
    build:
      context: ..
      dockerfile: frontend-game/Dockerfile
      labels: *build-labels
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5174/livez"]
      interval: 10s
      timeout: 5s
      retries: 3
      # nginx itself boots in <1s; give it a moment for any first-load
      # warmup in case Docker is slow on a cold cache.
      start_period: 5s
    restart: on-failure:5
    ports:
      - "5174:5174"
    # V0 demo: frontend-game's bundled JS still hardcodes
    # localhost:8220 (tilemap-service) and localhost:2567 (game-server).
    # Both are exposed to host via compose port maps; browser sees them
    # as separate localhost services. V1+ wires env-var injection for
    # production deploys behind api-gateway-bff.
    profiles:
      - game
      - full

volumes:
  loreweave_pg:
  loreweave_redis:
  loreweave_minio:
  loreweave_rabbitmq:
  loreweave_languagetool:
  loreweave_neo4j_data:
  loreweave_neo4j_logs:
  loreweave_tempo:
