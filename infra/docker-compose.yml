# Full stack: Postgres, Mailhog, auth-service, api-gateway-bff, frontend (nginx static build).
# From this directory: docker compose up --build
# Browser: http://localhost:5296  |  Gateway: http://localhost:3123  |  Auth: http://localhost:8204
# Optional env file: copy .env.example to .env and set JWT_SECRET (>= 32 chars) for production-like secrets.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loreweave
      POSTGRES_PASSWORD: loreweave_dev
      POSTGRES_DB: loreweave_auth
    ports:
      - "5555:5432"
    volumes:
      - loreweave_pg:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
      - ./db-ensure.sh:/usr/local/bin/db-ensure.sh:ro
    healthcheck:
      # Healthcheck creates missing databases on EVERY start, then verifies readiness.
      # This replaces the old postgres-db-bootstrap container.
      test: ["CMD-SHELL", "sh /usr/local/bin/db-ensure.sh && pg_isready -U loreweave -d loreweave_auth"]
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 10s

  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: loreweave
      MINIO_ROOT_PASSWORD: loreweave_dev_minio_secret
    ports:
      - "9123:9000"
      - "9124:9001"
    volumes:
      - loreweave_minio:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1148:1025"
      - "8148:8025"

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8081"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_auth?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      ACCESS_TOKEN_TTL_SECONDS: "7200"
      REFRESH_TOKEN_TTL_SECONDS: "2592000"
      DEV_LOG_EMAIL_TOKENS: "1"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: "LoreWeave <noreply@loreweave.local>"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5296}
    depends_on:
      postgres:
        condition: service_healthy

      mailhog:
        condition: service_started
    ports:
      - "8204:8081"

  book-service:
    build:
      context: ../services/book-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8082"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_book?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOKS_STORAGE_BUCKET: loreweave-dev-books
    depends_on:
      postgres:
        condition: service_healthy

      minio:
        condition: service_started
    ports:
      - "8205:8082"

  sharing-service:
    build:
      context: ../services/sharing-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8083"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_sharing?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
    depends_on:
      postgres:
        condition: service_healthy

      book-service:
        condition: service_healthy
    ports:
      - "8206:8083"

  catalog-service:
    build:
      context: ../services/catalog-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8084"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_catalog?sslmode=disable
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      SHARING_SERVICE_INTERNAL_URL: http://sharing-service:8083
    depends_on:
      postgres:
        condition: service_healthy

      book-service:
        condition: service_healthy
      sharing-service:
        condition: service_healthy
    ports:
      - "8207:8084"

  provider-registry-service:
    build:
      context: ../services/provider-registry-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8085"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_provider_registry?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy

      usage-billing-service:
        condition: service_healthy
    ports:
      - "8208:8085"

  usage-billing-service:
    build:
      context: ../services/usage-billing-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8086"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_usage_billing?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
    depends_on:
      postgres:
        condition: service_healthy

    ports:
      - "8209:8086"

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: loreweave
      RABBITMQ_DEFAULT_PASS: loreweave_dev
    ports:
      - "5795:5672"
      - "15795:15672"
    volumes:
      - loreweave_rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10

  translation-service:
    build:
      context: ../services/translation-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_translation
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      PORT: "8087"
    depends_on:
      postgres:
        condition: service_healthy

      rabbitmq:
        condition: service_healthy
      book-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy
    ports:
      - "8210:8087"

  translation-worker:
    build:
      context: ../services/translation-service
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_translation
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
    depends_on:
      postgres:
        condition: service_healthy

      rabbitmq:
        condition: service_healthy
      book-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy

  glossary-service:
    build:
      context: ../services/glossary-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8088"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_glossary?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      AUTH_SERVICE_URL: http://auth-service:8081
      BOOK_SERVICE_URL: http://book-service:8082
    depends_on:
      postgres:
        condition: service_healthy

      book-service:
        condition: service_healthy
    ports:
      - "8211:8088"

  chat-service:
    build:
      context: ../services/chat-service
      dockerfile: Dockerfile
    environment:
      PORT: "8090"
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_chat
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      PROVIDER_REGISTRY_INTERNAL_URL: http://provider-registry-service:8085
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: loreweave
      MINIO_SECRET_KEY: loreweave_dev_minio_secret
      MINIO_BUCKET: lw-chat
      MINIO_USE_SSL: "false"
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      postgres:
        condition: service_healthy

      provider-registry-service:
        condition: service_healthy
      usage-billing-service:
        condition: service_healthy
      minio:
        condition: service_started
    ports:
      - "8212:8090"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8090/health')\" || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 20s
      retries: 5

  api-gateway-bff:
    build:
      context: ../services/api-gateway-bff
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      AUTH_SERVICE_URL: http://auth-service:8081
      BOOK_SERVICE_URL: http://book-service:8082
      SHARING_SERVICE_URL: http://sharing-service:8083
      CATALOG_SERVICE_URL: http://catalog-service:8084
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      TRANSLATION_SERVICE_URL: http://translation-service:8087
      GLOSSARY_SERVICE_URL: http://glossary-service:8088
      CHAT_SERVICE_URL: http://chat-service:8090
      RABBITMQ_URL: amqp://loreweave:loreweave_dev@rabbitmq:5672/
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      INTERNAL_SERVICE_TOKEN: ${INTERNAL_SERVICE_TOKEN:-dev_internal_token}
    depends_on:
      auth-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
      sharing-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy
      usage-billing-service:
        condition: service_healthy
      translation-service:
        condition: service_healthy
      glossary-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3123:3000"

  # frontend:
  #   build:
  #     context: ../frontend
  #     dockerfile: Dockerfile
  #     args:
  #       VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3123}
  #   depends_on:
  #     - api-gateway-bff
  #   ports:
  #     - "5296:80"


  languagetool:
    image: erikvl87/languagetool:latest
    environment:
      Java_Xms: 256m
      Java_Xmx: 512m
    ports:
      - "8875:8010"
    volumes:
      - loreweave_languagetool:/LanguageTool/languagetool-data

  # Frontend V2 — run with: docker compose --profile v2 up frontend-v2
  frontend:
    build:
      context: ../frontend-v2
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3123}
    depends_on:
      - api-gateway-bff
    ports:
      - "5174:80"
    # profiles:
    #   - v2

volumes:
  loreweave_pg:
  loreweave_minio:
  loreweave_rabbitmq:
  loreweave_languagetool:
