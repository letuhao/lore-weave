# Full stack: Postgres, Mailhog, auth-service, api-gateway-bff, frontend (nginx static build).
# From this directory: docker compose up --build
# Browser: http://localhost:5173  |  Gateway: http://localhost:3000  |  Auth: http://localhost:8081
# Optional env file: copy .env.example to .env and set JWT_SECRET (>= 32 chars) for production-like secrets.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: loreweave
      POSTGRES_PASSWORD: loreweave_dev
      POSTGRES_DB: loreweave_auth
    ports:
      - "5432:5432"
    volumes:
      - loreweave_pg:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U loreweave -d loreweave_auth"]
      interval: 3s
      timeout: 5s
      retries: 10

  postgres-db-bootstrap:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: loreweave_dev
    entrypoint: ["/bin/sh", "-c"]
    command: >
      set -e;
      until pg_isready -h postgres -U loreweave -d postgres; do sleep 1; done;
      psql -h postgres -U loreweave -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='loreweave_auth'" | grep -q 1 || psql -h postgres -U loreweave -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE loreweave_auth";
      psql -h postgres -U loreweave -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='loreweave_book'" | grep -q 1 || psql -h postgres -U loreweave -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE loreweave_book";
      psql -h postgres -U loreweave -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='loreweave_sharing'" | grep -q 1 || psql -h postgres -U loreweave -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE loreweave_sharing";
      psql -h postgres -U loreweave -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='loreweave_catalog'" | grep -q 1 || psql -h postgres -U loreweave -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE loreweave_catalog";
      psql -h postgres -U loreweave -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='loreweave_provider_registry'" | grep -q 1 || psql -h postgres -U loreweave -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE loreweave_provider_registry";
      psql -h postgres -U loreweave -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='loreweave_usage_billing'" | grep -q 1 || psql -h postgres -U loreweave -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE loreweave_usage_billing";
      psql -h postgres -U loreweave -d postgres -tAc "SELECT 1 FROM pg_database WHERE datname='loreweave_translation'" | grep -q 1 || psql -h postgres -U loreweave -d postgres -v ON_ERROR_STOP=1 -c "CREATE DATABASE loreweave_translation";
    restart: "no"

  minio:
    image: minio/minio:RELEASE.2024-08-03T04-33-23Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: loreweave
      MINIO_ROOT_PASSWORD: loreweave_dev_minio_secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - loreweave_minio:/data

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  auth-service:
    build:
      context: ../services/auth-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8081"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_auth?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      DEV_LOG_EMAIL_TOKENS: "1"
      SMTP_HOST: mailhog
      SMTP_PORT: "1025"
      SMTP_FROM: "LoreWeave <noreply@loreweave.local>"
      PUBLIC_APP_URL: ${PUBLIC_APP_URL:-http://localhost:5173}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-bootstrap:
        condition: service_completed_successfully
      mailhog:
        condition: service_started
    ports:
      - "8081:8081"

  book-service:
    build:
      context: ../services/book-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8082"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_book?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOKS_STORAGE_BUCKET: loreweave-dev-books
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-bootstrap:
        condition: service_completed_successfully
      minio:
        condition: service_started
    ports:
      - "8082:8082"

  sharing-service:
    build:
      context: ../services/sharing-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8083"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_sharing?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-bootstrap:
        condition: service_completed_successfully
      book-service:
        condition: service_healthy
    ports:
      - "8083:8083"

  catalog-service:
    build:
      context: ../services/catalog-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8084"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_catalog?sslmode=disable
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      SHARING_SERVICE_INTERNAL_URL: http://sharing-service:8083
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-bootstrap:
        condition: service_completed_successfully
      book-service:
        condition: service_healthy
      sharing-service:
        condition: service_healthy
    ports:
      - "8084:8084"

  provider-registry-service:
    build:
      context: ../services/provider-registry-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8085"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_provider_registry?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-bootstrap:
        condition: service_completed_successfully
      usage-billing-service:
        condition: service_healthy
    ports:
      - "8085:8085"

  usage-billing-service:
    build:
      context: ../services/usage-billing-service
      dockerfile: Dockerfile
    environment:
      HTTP_ADDR: ":8086"
      DATABASE_URL: postgres://loreweave:loreweave_dev@postgres:5432/loreweave_usage_billing?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-bootstrap:
        condition: service_completed_successfully
    ports:
      - "8086:8086"

  translation-service:
    build:
      context: ../services/translation-service
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://loreweave:loreweave_dev@postgres:5432/loreweave_translation
      JWT_SECRET: ${JWT_SECRET:-loreweave_local_dev_jwt_secret_change_me_32chars}
      BOOK_SERVICE_INTERNAL_URL: http://book-service:8082
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      PORT: "8087"
    depends_on:
      postgres:
        condition: service_healthy
      postgres-db-bootstrap:
        condition: service_completed_successfully
      book-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy
    ports:
      - "8087:8087"

  api-gateway-bff:
    build:
      context: ../services/api-gateway-bff
      dockerfile: Dockerfile
    environment:
      PORT: "3000"
      AUTH_SERVICE_URL: http://auth-service:8081
      BOOK_SERVICE_URL: http://book-service:8082
      SHARING_SERVICE_URL: http://sharing-service:8083
      CATALOG_SERVICE_URL: http://catalog-service:8084
      PROVIDER_REGISTRY_SERVICE_URL: http://provider-registry-service:8085
      USAGE_BILLING_SERVICE_URL: http://usage-billing-service:8086
      TRANSLATION_SERVICE_URL: http://translation-service:8087
    depends_on:
      auth-service:
        condition: service_healthy
      book-service:
        condition: service_healthy
      sharing-service:
        condition: service_healthy
      catalog-service:
        condition: service_healthy
      provider-registry-service:
        condition: service_healthy
      usage-billing-service:
        condition: service_healthy
      translation-service:
        condition: service_healthy
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: ${VITE_API_BASE:-http://localhost:3000}
    depends_on:
      - api-gateway-bff
    ports:
      - "5173:80"

volumes:
  loreweave_pg:
  loreweave_minio:
