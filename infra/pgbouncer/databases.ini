; databases.ini — DYNAMIC; populated by the L1.C.1 provisioner step 6.
;
; Cycle 5 ships this file as an empty stub so pgbouncer can start cleanly
; under the docker-compose stack. The provisioner appends one line per
; provisioned reality:
;
;   lw_reality_<short> = host=pg-shard-0.internal dbname=lw_reality_<short> pool_size=25
;
; After each append, the provisioner sends `RELOAD` to the pgbouncer admin
; DB (pgbouncer reads this file on SIGHUP/RELOAD; no restart needed).
;
; DO NOT manually edit this file — it gets clobbered by the provisioner.
; If you need a manual override, use a separate %include in pgbouncer.ini.

