; infra/pgbouncer/pgbouncer.ini — L1.G.2
;
; Per-shard pgbouncer config (1:1 with Postgres shard host per R04 §12D.4).
; LOCKED Q-L1G-1: pgbouncer V1; revisit V3 if transaction-pool limits hit.
;
; ## Capacity arithmetic
;
;   max_client_conn        5000   ; virtual cap surface to app (R04 §12D.4)
;   default_pool_size       25    ; backend conns per (db, user) pair
;   reserve_pool_size        5    ; emergency spill above default_pool_size
;   min_pool_size            5    ; warm pool baseline
;   max_db_connections     500    ; HARD per-host backend cap (matches db_pool.rs MAX_BACKEND_CONNECTIONS)
;
; Multiplex ratio: up to 5000 clients ÷ 500 backend = 10x.
;
; ## Pool mode rationale
;
; pool_mode = transaction
;   - server-side connection is returned to the pool at COMMIT/ROLLBACK
;   - no session-scoped state survives across statements
;   - DISALLOWS: session_replication_role, LISTEN/NOTIFY, advisory locks,
;     SET (use SET LOCAL inside a TX instead), unprepared statement chains
;   - REQUIRED for the 10x multiplex ratio above
;
; ## Per-reality DB list (dynamic)
;
; The databases.ini file is **generated and SIGHUP'd** by the L1.C provisioner
; (step 6, register_with_pgbouncer). pgbouncer does NOT enumerate per-reality
; DBs in this static config; instead it reads `databases.ini` on every SIGHUP.
; Cycle 5 ships an empty `databases.ini` template; cycle 6 (L1.D) wires the
; provisioner's update mechanism.

[pgbouncer]

; Listen socket — internal-only; external traffic enters via api-gateway-bff.
listen_addr = 0.0.0.0
listen_port = 6432

; ─── Pool mode (LOCKED transaction) ─────────────────────────────────────
pool_mode = transaction

; ─── Capacity caps (matches services/world-service/src/db_pool.rs) ──────
max_client_conn = 5000
default_pool_size = 25
reserve_pool_size = 5
min_pool_size = 5
reserve_pool_timeout = 3
max_db_connections = 500
max_user_connections = 500

; ─── Auth ───────────────────────────────────────────────────────────────
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
; SVID-based auth ships V1+30d alongside the service mesh decision (Q-L7-3).
; Until then we keep userlist.txt with hashed shared secrets per env.

; ─── Per-reality DB list (dynamic file maintained by provisioner) ───────
%include /etc/pgbouncer/databases.ini

; ─── Observability ──────────────────────────────────────────────────────
; The pgbouncer admin DB is also scraped by Prometheus (L1.I cycle 6).
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats
ignore_startup_parameters = extra_float_digits

; ─── Operational tuning ─────────────────────────────────────────────────
server_round_robin = 1
; query_timeout left at default; the app sets statement_timeout in code.

; ─── Logging ────────────────────────────────────────────────────────────
log_connections = 0
log_disconnections = 0
log_pooler_errors = 1
log_stats = 0      ; we scrape stats via the admin DB, no need to log them
