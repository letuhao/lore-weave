# Grafana Tempo config — Phase 6c. Single-binary, local-filesystem block
# storage. DEV ONLY — not durable; a real deployment needs object storage
# + retention (see D-PHASE6C-TEMPO-DURABILITY).
stream_over_http_enabled: true

server:
  http_listen_port: 3200

distributor:
  receivers:
    otlp:
      protocols:
        grpc:
          endpoint: 0.0.0.0:4317
        http:
          endpoint: 0.0.0.0:4318

ingester:
  max_block_duration: 5m

storage:
  trace:
    backend: local
    wal:
      path: /var/tempo/wal
    local:
      path: /var/tempo/blocks

usage_report:
  reporting_enabled: false
