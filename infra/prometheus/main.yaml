#     queue_config:
#       capacity: 10000
#       max_shards: 50
#       min_shards: 1
#       max_samples_per_send: 5000
#       batch_send_deadline: 5s

# ─────────────────────────────────────────────────────────────────────
# alerting — Alertmanager wiring (cycle 35 L7.J)
# ─────────────────────────────────────────────────────────────────────
#
# Cycle 33 V1: alertmanager is a STUB target. Cycle 35 wires the actual
# Alertmanager (L7.J). For now, alerts fire to a no-op endpoint to
# verify the rule engine works without committing to L7.J shape.
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager-stub.internal:9093
      # Cycle 35 L7.J: replace with real alertmanager pair config.
