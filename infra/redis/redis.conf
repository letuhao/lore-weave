# infra/redis/redis.conf — L1.F.3
#
# Per Q-L1F-1 (locked): shared Sentinel cluster V1; per-AZ V3+.
# This config is the SHARED meta cache instance (one per cluster V1).
#
# ## Persistence policy
#
# AOF every 1s — survives a single-instance crash with ≤ 1s of writes
# lost. Cache is NOT the source of truth (Postgres meta is), so even
# losing more than 1s would not cause correctness issues — just a cold
# cache requiring warm-up (scripts/cache-warmup.sh).
#
# ## Eviction
#
# allkeys-lru — when memory fills, evict the least-recently-used key.
# Cache values are derived from Postgres; eviction is safe (next read
# repopulates).
#
# ## Append-only file rewrite
#
# Default settings; let Redis trigger compaction automatically when AOF
# grows to 100% over the previous rewrite. Larger than default to keep
# disk I/O low for the V1 dev box.

# ─── Network ─────────────────────────────────────────────────────────────
bind 0.0.0.0
port 6379
protected-mode no
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ─── Persistence: AOF (LOCKED Q-L1F-1) ──────────────────────────────────
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Disable RDB snapshots — AOF is enough for the cache use case.
save ""

# ─── Memory + eviction (LOCKED Q-L1F-1: allkeys-lru) ────────────────────
# Set explicit cap; production override via env or sysctl mapping.
maxmemory 1gb
maxmemory-policy allkeys-lru
maxmemory-samples 5

# ─── Sentinel (master discovery from app side) ──────────────────────────
# Sentinel is configured separately (infra/redis/sentinel.conf). The
# master is named `lw-meta-cache`; apps resolve via the Sentinel API
# rather than hardcoding the master IP.
# replica-announce-ip / replica-announce-port left at defaults; Sentinel
# tracks them through replication.

# ─── Logging ────────────────────────────────────────────────────────────
loglevel notice
logfile ""

# ─── Slow log ───────────────────────────────────────────────────────────
slowlog-log-slower-than 10000
slowlog-max-len 128

# ─── Notification (used by event-driven invalidator) ────────────────────
# Enable keyspace events for `K` (keyspace) + `E` (keyevent) on `g`
# (generic) and `x` (expired). The invalidator subscribes to
# `__keyevent@0__:del` / `__keyevent@0__:expired` so it can log
# eviction-vs-explicit-del separately.
notify-keyspace-events "KEgx"
