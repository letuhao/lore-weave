# infra/redis/sentinel.conf — L1.F.3 Sentinel config (Q-L1F-1 shared cluster V1)
#
# Each Sentinel instance MONITORS the master `lw-meta-cache` and
# coordinates failover with peers via the Sentinel quorum mechanism.
# V1 ships a single-instance Sentinel co-located with the master in
# docker-compose (quorum=1 — degenerate, no failover protection);
# production V1+30d ships 3 Sentinels across distinct hosts.

port 26379

# Master to monitor. Format: <name> <host> <port> <quorum>.
sentinel monitor lw-meta-cache 127.0.0.1 6379 1

# Failover thresholds. 5s down before declaring DOWN; 30s for parallel
# syncs (one replica at a time per Sentinel docs recommendation).
sentinel down-after-milliseconds lw-meta-cache 5000
sentinel parallel-syncs lw-meta-cache 1
sentinel failover-timeout lw-meta-cache 30000

# Notify scripts left empty for V1 — alerting wires up in cycle 7 with
# the rest of the Prometheus + Alertmanager stack.
# sentinel notification-script lw-meta-cache /usr/local/bin/notify.sh
# sentinel client-reconfig-script lw-meta-cache /usr/local/bin/reconfig.sh
