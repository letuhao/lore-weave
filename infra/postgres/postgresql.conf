# infra/postgres/postgresql.conf
#
# L1.E.6 — Meta Postgres base configuration
# Cycle 1 of foundation-mega-task.
#
# Mounted into all meta Postgres nodes (primary, sync replica, async replica)
# by infra/docker-compose.meta-ha.yml. Patroni (see ../patroni/patroni.yml)
# overlays runtime parameters via DCS, but this file defines the bootstrap
# baseline and the synchronous-commit invariants that MUST hold from cycle 1
# onward.
#
# Per parent layer plan L1.E acceptance criteria + OPEN_QUESTIONS_LOCKED Q-L1B-5.

# ─── Connections ──────────────────────────────────────────────────────────────
listen_addresses = '*'
port             = 5432
max_connections  = 500        # pgbouncer multiplex (L1.G) sits in front; app pool size enforced there

# ─── Memory ───────────────────────────────────────────────────────────────────
shared_buffers      = '512MB'      # V1 staging baseline; tune at V1+30d profiling
work_mem            = '8MB'
maintenance_work_mem = '128MB'

# ─── Write-Ahead Log ──────────────────────────────────────────────────────────
wal_level                 = replica       # Patroni mandates >= replica
max_wal_senders           = 10
wal_keep_size             = '2GB'
hot_standby               = on
hot_standby_feedback      = on

# ─── Synchronous replication (THE L1.E INVARIANT) ─────────────────────────────
# Per parent layer plan L1.E.6:
#   synchronous_commit=on with synchronous_standby_names='ANY 1 (sync_replica_a)'
# Locks the durability contract: a meta WRITE returns OK only after the sync
# replica has fsynced the WAL. This is what L1.E exists to guarantee.
synchronous_commit         = on
synchronous_standby_names  = 'ANY 1 (sync_replica_a)'

# ─── WAL archiving (60s ship to MinIO bucket lw-meta-wal-archive) ─────────────
# See L1.E.7 infra/wal-archive/ for the archive_command script.
archive_mode    = on
archive_command = '/usr/local/bin/lw-wal-ship.sh %p %f'
archive_timeout = 60   # seconds — bounds RPO to 60s in absence of writes

# ─── Logging ──────────────────────────────────────────────────────────────────
logging_collector       = on
log_directory           = '/var/log/postgresql'
log_filename            = 'postgresql-%Y-%m-%d.log'
log_line_prefix         = '%t [%p]: user=%u,db=%d,client=%h '
log_statement           = 'ddl'
log_min_duration_statement = 500    # ms; flag slow queries for L1.I metric scrape
log_checkpoints         = on
log_lock_waits          = on
log_temp_files          = 0

# ─── Statistics + extensions for L1.I per-DB metrics ──────────────────────────
shared_preload_libraries = 'pg_stat_statements'
track_io_timing          = on
track_functions          = 'pl'
pg_stat_statements.max   = 10000
pg_stat_statements.track = 'all'

# ─── Locale + timezone ────────────────────────────────────────────────────────
timezone        = 'UTC'
log_timezone    = 'UTC'
default_text_search_config = 'pg_catalog.english'
