; infra/grafana/grafana.ini — L7.H.5 (RAID cycle 33)
;
; Grafana configuration. Foundation V1: anonymous-disabled, SSO via
; auth-service planned (cycle 36 L7.K integration); for cycle 33 ship,
; admin-only via env-var-supplied admin credential.
;
; Cycle 33 scope: provision Grafana ready-to-go with Prometheus HA pair,
; Loki, and Thanos (stubbed) datasources.

[server]
http_port = 3000
domain = grafana.internal
root_url = http://grafana.internal:3000/
serve_from_sub_path = false

[security]
; Admin password sourced from env at startup — never hardcoded.
; See infra/docker-compose.observability.yml env block.
admin_user = ${GF_SECURITY_ADMIN_USER}
admin_password = ${GF_SECURITY_ADMIN_PASSWORD}
disable_gravatar = true
cookie_secure = true
cookie_samesite = strict
strict_transport_security = true

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

[auth]
; SSO via auth-service: cycle 36 L7.K. For now, local-only admin.
; Cycle 33 ships skeleton with the OAuth section disabled but PROVISIONED;
; cycle 36 will flip `enabled = true` after auth-service ships OIDC discovery.
disable_login_form = false
disable_signout_menu = false

[auth.generic_oauth]
enabled = false
name = LoreWeave Auth
allow_sign_up = false
client_id = ${GF_AUTH_OAUTH_CLIENT_ID}
client_secret = ${GF_AUTH_OAUTH_CLIENT_SECRET}
scopes = openid email profile
auth_url = https://auth-service.internal/oauth/authorize
token_url = https://auth-service.internal/oauth/token
api_url = https://auth-service.internal/userinfo

[dashboards]
default_home_dashboard_path = /etc/grafana/provisioning/dashboards/_library/TEMPLATE.json
; Default dashboard placeholder until cycle-34 SLO dashboard ships.

[unified_alerting]
enabled = false
; Cycle 33: Grafana unified alerting OFF — using Prometheus + Alertmanager
; (cycle 35 L7.J). Grafana is read-only visualization here.

[log]
mode = console
level = info

[analytics]
reporting_enabled = false
check_for_updates = false
check_for_plugin_updates = false

[snapshots]
external_enabled = false

[explore]
enabled = true

[panels]
disable_sanitize_html = false

[plugins]
allow_loading_unsigned_plugins =
plugin_admin_enabled = false
