apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: world-service
  namespace: lw-foundation
  labels:
    app: world-service
    capacity-class: worker
    foundation-cycle: "7"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: world-service
  minReplicas: 2
  maxReplicas: 4
  metrics:
    # Queue depth metric — preferred over CPU% per L1.L design notes:
    # CPU is a lagging indicator; queue depth signals load BEFORE saturation.
    - type: External
      external:
        metric:
          name: lw_world_service_queue_depth
        target:
          type: AverageValue
          averageValue: "200"
    # CPU fallback — kicks in only if queue metric is unavailable
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max
