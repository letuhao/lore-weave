# infra/k8s/retention-worker-deployment.yaml — L2.K.1
#
# V1 single replica (Q-L2K-1 separate binary from archive-worker).
#
# Capacity budget: contracts/capacity/budgets.yaml → retention-worker class=cron
# V1: min=1 max=1 cpu=0.5 mem=512Mi
# V3: min=1 max=2
#
# Cadence: hourly (vs archive-worker daily). Both reuse publisher_heartbeats
# table with namespaced publisher_id.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: retention-worker
  namespace: lw-foundation
  labels:
    app.kubernetes.io/name: retention-worker
    app.kubernetes.io/component: data-platform
    lw.shipped.cycle: "11"
spec:
  replicas: 1  # V1 single replica.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: retention-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: retention-worker
        app.kubernetes.io/component: data-platform
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: retention-worker
      containers:
        - name: retention-worker
          image: ghcr.io/loreweave/retention-worker:0.1.0
          imagePullPolicy: IfNotPresent
          resources:
            requests: { cpu: "500m", memory: "512Mi" }
            limits:   { cpu: "1",    memory: "1Gi"   }
          env:
            - name: LW_RETENTION_WORKER_ID
              valueFrom:
                fieldRef: { fieldPath: metadata.name }
            - name: LW_SHARD_HOST
              valueFrom:
                fieldRef: { fieldPath: spec.nodeName }
            - name: LW_META_DSN
              valueFrom:
                secretKeyRef: { name: lw-meta-dsn, key: dsn }
          ports:
            - containerPort: 9090
              name: metrics
          livenessProbe:
            httpGet: { path: /healthz, port: 9090 }
            initialDelaySeconds: 15
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet: { path: /readyz, port: 9090 }
            initialDelaySeconds: 5
            periodSeconds: 10
      tolerations:
        - key: "shard-host"
          operator: "Exists"
