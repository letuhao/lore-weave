# Foundation-dev docker-compose — B5 isolation from existing prod
# Per RAID_WORKFLOW.md §13.5.
#
# This is the DEDICATED dev environment for foundation cycles 1-37 work.
# It is ISOLATED from existing prod (different ports, different volumes,
# different network).
#
# Use:
#   docker compose -f infra/foundation-dev/docker-compose.yml up -d
#   docker compose -f infra/foundation-dev/docker-compose.yml down -v
#
# Foundation cycles target THIS env, NEVER existing prod.loreweave.app.

services:
  postgres-foundation:
    # Cycle 16 (L3.I) switched from `postgres:16-alpine` to
    # `pgvector/pgvector:pg16` so the `vector` extension is preinstalled in
    # the image. The image is a thin layer on top of the official Postgres
    # 16 image — same volume layout, same env vars, same default user.
    # See https://hub.docker.com/r/pgvector/pgvector.
    #
    # Per-reality DBs created by the world-service provisioner (cycle 5
    # `apply_initial_migration` step) inherit this image since they're
    # CREATE DATABASE'd on the same cluster. The extension itself is
    # installed per-database by 0008_pgvector_setup.up.sql.
    image: pgvector/pgvector:pg16
    container_name: foundation-dev-postgres
    environment:
      POSTGRES_USER: foundation
      POSTGRES_PASSWORD: foundation
      POSTGRES_DB: foundation
    ports:
      - "127.0.0.1:5432:5432"  # foundation-dev uses standard 5432; existing prod uses 5555
    volumes:
      - foundation-pg-data:/var/lib/postgresql/data
      # Cycle 16 (L3.I) — init script that runs once on first container
      # boot (when /var/lib/postgresql/data is empty). Creates the `vector`
      # extension in the `foundation` template database so any per-reality
      # DB cloned from template inherits it. Per-reality DB migrations
      # (0008_pgvector_setup) still run `CREATE EXTENSION IF NOT EXISTS`
      # for explicitness + dev databases not cloned from template.
      - ./pgvector-init.sh:/docker-entrypoint-initdb.d/10-pgvector.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foundation -d foundation"]
      interval: 5s
      retries: 10

  # Note: Patroni HA + etcd cluster (C1 L1.E deliverable) added in cycle 1.
  # C0 ships the skeleton compose; cycle 1 extends with patroni-1/2/3 + etcd-1/2/3.

  redis-foundation:
    image: redis:7-alpine
    container_name: foundation-dev-redis
    ports:
      - "127.0.0.1:6379:6379"  # foundation-dev uses 6379; existing prod uses 6399
    volumes:
      - foundation-redis-data:/data

  minio-foundation:
    image: minio/minio:latest
    container_name: foundation-dev-minio
    environment:
      MINIO_ROOT_USER: foundation
      MINIO_ROOT_PASSWORD: foundation-secret-dev-only
    command: server /data --console-address ":9001"
    ports:
      - "127.0.0.1:9000:9000"   # foundation-dev uses 9000 (existing prod uses 9123)
      - "127.0.0.1:9001:9001"
    volumes:
      - foundation-minio-data:/data

volumes:
  foundation-pg-data:
  foundation-redis-data:
  foundation-minio-data:
