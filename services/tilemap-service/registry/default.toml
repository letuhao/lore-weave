  { terrain = "forest", weight = 15.0 },
  { terrain = "rough", weight = 10.0 },
]

[[biome]]
id = "lw:biome.tundra_frost"
label = "Frozen Tundra"
mix = [
  { terrain = "snow", weight = 70.0 },
  { terrain = "rough", weight = 20.0 },
  { terrain = "mountain", weight = 10.0 },
]
