# ── NEW xianxia-namespace tags (inert metadata in V2; V3 placement
#    engine will be registry-driven and able to spawn these). Included
#    to prove the per-book extension surface works end-to-end. ───────

[[object]]
id = "xianxia:dao-stone"
primitive = "trigger"
label = "Dao Comprehension Stone"
footprint = { width = 1, height = 1 }
properties = { condition = "on_meditate", comprehension_gain = 1.0, rarity = "epic" }

[[object]]
