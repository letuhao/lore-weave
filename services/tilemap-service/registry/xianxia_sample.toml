id = "xianxia:dao-stone"
primitive = "trigger"
label = "Dao Comprehension Stone"
footprint = { width = 1, height = 1 }
properties = { condition = "on_meditate", comprehension_gain = 1.0, rarity = "epic" }

[[object]]
