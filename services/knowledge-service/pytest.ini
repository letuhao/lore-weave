[pytest]
# Pin SDK resolution to THIS checkout's sdks/python (prepended to sys.path at
# session start) so a stray editable install from a sibling clone can't shadow
# the in-repo SDKs when pytest runs from inside the service dir.
pythonpath = ../../sdks/python
asyncio_mode = auto
testpaths = tests
markers =
    quality: opt-in K17.10 extraction quality evaluation (requires --run-quality and live LLM)
