    participants: [Watson]
  - summary: "Watson resolves to visit Sherlock Holmes again"
    participants: [Watson, Sherlock Holmes]

traps:
  # "A Study in Scarlet" is a book/case reference, not an event in this chapter.
  - kind: event
    summary: "Watson investigates the Study in Scarlet"
    reason: "Only referenced as a prior case; not happening in this text"
  # Cocaine is mentioned as a habit — extracting as entity/event is over-eager.
  - kind: entity
    name: cocaine
    reason: "Mentioned in narration as Holmes's habit; not an actor or event subject"
  # The patient Watson is returning from is mentioned but not named or present.
  - kind: entity
    name: patient
    reason: "Offscreen, unnamed, no identity"
