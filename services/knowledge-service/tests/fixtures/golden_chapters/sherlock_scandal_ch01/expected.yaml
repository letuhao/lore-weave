source:
  title: "The Adventures of Sherlock Holmes — A Scandal in Bohemia"
  author: "Arthur Conan Doyle"
  chapter: 1
  license: "Public domain (Project Gutenberg #1661)"

entities:
  - name: Sherlock Holmes
    kind: person
    aliases: ["Holmes"]
  - name: Irene Adler
    kind: person
    aliases: ["THE woman", "the woman"]
  - name: Watson
    kind: person
    aliases: ["I", "narrator"]
  - name: Baker Street
    kind: location
    aliases: []

relations:
