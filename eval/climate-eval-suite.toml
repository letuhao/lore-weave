# Climate eval suite — 11 fixed reference renders, scored against geographic
# LAWS (not Earth biome-distribution targets). See
# `docs/plans/2026-05-23-climate-eval-references.md` for methodology.
#
# v4 (2026-05-24): replaced "match Earth distribution" + "match Earth entropy"
# with "follow temperature-by-latitude law" + "follow precip-by-circulation law".
# Snowball / Hothouse / Desert scenarios now scored honestly against the laws
# they should follow — not penalized for non-Earth biome mix. Profile entries
# below carry only `description` + `profile` tag (the PROFILE_LAT_BANDS table
# in climate_eval.py varies the lat-allowed biome set per scenario; that's
# the only profile-specific data the eval uses now).

# Scoring weights (composite = weighted sum of 5 law-based sub-scores).
[weights]
temperature_gradient   = 0.25  # Pearson r(lat_dist, zone temp) → near -1.0
lat_banding            = 0.25  # % pixels in lat-allowed biome set
precipitation_gradient = 0.15  # Pearson r(observed precip, circulation_curve)
continentality         = 0.15  # entropy delta coast vs interior
sanity                 = 0.20  # forbidden-biome rate per lat band

# Regression thresholds (used by --baseline diff mode).
[regression]
composite_mean_min_improvement = 1.0  # batch claims improvement only if >= this
composite_per_render_max_regression = 5.0
subscore_mean_max_regression = 10.0

# Scenario profiles — kept for lat-band table selection (PROFILE_LAT_BANDS in
# climate_eval.py). The distribution tables that used to live here are
# REMOVED (v4 dropped Earth-matching metrics).
[profiles.earth]
description = "Earth-like — temperate Earth lat bands"

[profiles.snowball]
description = "Snowball — cold world, lat bands shift Ice/Tundra outward"

[profiles.hothouse]
description = "Hothouse — warm world, lat bands allow forests at poles"

[profiles.desert]
description = "Desert — dry world, lat bands shift HotDesert/Savanna outward"

